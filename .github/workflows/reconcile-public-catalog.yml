name: Reconcile Public Catalog

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Operation"
        required: true
        type: choice
        default: snapshot
        options:
          - snapshot
          - apply
          - rollback
      city_slugs:
        description: "Optional comma-separated city slugs for apply"
        required: false
        default: ""
      rollback_audit_ids:
        description: "Audit IDs separated by spaces; only for rollback"
        required: false
        default: ""
      confirm_phrase:
        description: "For apply/rollback enter RECONCILE"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: production-publication-reconciliation
  cancel-in-progress: false

jobs:
  reconcile:
    name: Reconcile production public catalog
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate reconciliation request
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          CONFIRM_PHRASE: ${{ inputs.confirm_phrase }}
          ROLLBACK_AUDIT_IDS: ${{ inputs.rollback_audit_ids }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "apply" ] || [ "$MODE" = "rollback" ]; then
            test "$CONFIRM_PHRASE" = "RECONCILE" || {
              echo "For production-changing operations enter RECONCILE in confirm_phrase." >&2
              exit 1
            }
          fi
          if [ -n "${{ inputs.city_slugs }}" ] && ! printf '%s' "${{ inputs.city_slugs }}" | grep -Eq '^[a-z0-9-]+(,[a-z0-9-]+)*

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64"
          test -n "$SSH_HOST"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3; do
            if timeout 20s ssh-keyscan -T 8 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              break
            fi
            sleep "$attempt"
          done

      - name: Run reconciliation
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || 22 }}
          MODE: ${{ inputs.mode }}
          CITY_SLUGS: ${{ inputs.city_slugs }}
          ROLLBACK_AUDIT_IDS: ${{ inputs.rollback_audit_ids }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          REMOTE_MODE=$(printf '%q' "$MODE")
          REMOTE_CITY_SLUGS=$(printf '%q' "$CITY_SLUGS")
          REMOTE_ROLLBACK_AUDIT_IDS=$(printf '%q' "$ROLLBACK_AUDIT_IDS")

          ssh             -o ConnectTimeout=20             -o ServerAliveInterval=15             -o ServerAliveCountMax=4             -o StrictHostKeyChecking=accept-new             -o UserKnownHostsFile=~/.ssh/known_hosts             -i ~/.ssh/deploy_key             -p "$DEPLOY_PORT"             "$DEPLOY_USER@$DEPLOY_HOST"             "MODE=$REMOTE_MODE CITY_SLUGS=$REMOTE_CITY_SLUGS ROLLBACK_AUDIT_IDS=$REMOTE_ROLLBACK_AUDIT_IDS bash -seu -o pipefail" <<'REMOTE' | tee artifacts/publication-reconciliation.json
          cd /srv/app
          if command -v docker-compose >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          elif docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          else
            echo "ERROR: Docker Compose is unavailable." >&2
            exit 127
          fi

          ARGS=""
          if [ -n "$CITY_SLUGS" ]; then
            for city_slug in $(printf '%s' "$CITY_SLUGS" | tr ',' ' '); do
              ARGS="$ARGS --city $city_slug"
            done
          fi

          case "$MODE" in
            snapshot)
              $COMPOSE exec -T backend python scripts/reconcile_publication_flags.py
              ;;
            apply)
              $COMPOSE exec -T backend sh -c "python scripts/reconcile_publication_flags.py --apply --confirm $ARGS"
              ;;
            rollback)
              $COMPOSE exec -T backend sh -c "python scripts/reconcile_publication_flags.py --rollback-audit-ids $ROLLBACK_AUDIT_IDS --confirm"
              ;;
            *)
              echo "ERROR: unsupported mode $MODE" >&2
              exit 2
              ;;
          esac
          REMOTE

      - name: Upload reconciliation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-publication-reconciliation
          path: artifacts/publication-reconciliation.json
          if-no-files-found: ignore
          retention-days: 30
; then
            echo "city_slugs must be comma-separated lowercase slugs." >&2
            exit 1
          fi
          if [ "$MODE" = "rollback" ]; then
            test -n "$ROLLBACK_AUDIT_IDS" || {
              echo "rollback_audit_ids is required for rollback." >&2
              exit 1
            }
            printf '%s' "$ROLLBACK_AUDIT_IDS" | grep -Eq '^[0-9]+( [0-9]+)*

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
