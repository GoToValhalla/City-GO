              ;;
            apply)
              $COMPOSE exec -T backend sh -c "python scripts/reconcile_publication_flags.py --apply --confirm $ARGS"
              ;;
            rollback)
              $COMPOSE exec -T backend sh -c "python scripts/reconcile_publication_flags.py --rollback-audit-ids $ROLLBACK_AUDIT_IDS --confirm"
              ;;
            *)
              echo "ERROR: unsupported mode $MODE" >&2
              exit 2
              ;;
          esac
          REMOTE

      - name: Upload reconciliation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-publication-reconciliation
          path: artifacts/publication-reconciliation.json
          if-no-files-found: ignore
          retention-days: 30
 || {
              echo "rollback_audit_ids must contain numeric IDs separated by spaces." >&2
              exit 1
            }
          fi

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
