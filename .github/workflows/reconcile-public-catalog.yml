              break
            fi
            sleep "$attempt"
          done

      - name: Run reconciliation
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || 22 }}
          MODE: ${{ inputs.mode }}
          CITY_SLUGS: ${{ inputs.city_slugs }}
          ROLLBACK_AUDIT_IDS: ${{ inputs.rollback_audit_ids }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          REMOTE_MODE=$(printf '%q' "$MODE")
          REMOTE_CITY_SLUGS=$(printf '%q' "$CITY_SLUGS")
          REMOTE_ROLLBACK_AUDIT_IDS=$(printf '%q' "$ROLLBACK_AUDIT_IDS")

          ssh             -o ConnectTimeout=20             -o ServerAliveInterval=15             -o ServerAliveCountMax=4             -o StrictHostKeyChecking=accept-new             -o UserKnownHostsFile=~/.ssh/known_hosts             -i ~/.ssh/deploy_key             -p "$DEPLOY_PORT"             "$DEPLOY_USER@$DEPLOY_HOST"             "MODE=$REMOTE_MODE CITY_SLUGS=$REMOTE_CITY_SLUGS ROLLBACK_AUDIT_IDS=$REMOTE_ROLLBACK_AUDIT_IDS bash -seu -o pipefail" <<'REMOTE' | tee artifacts/publication-reconciliation.json
          cd /srv/app
          if docker compose version >/dev/null 2>&1; then
