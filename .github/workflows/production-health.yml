name: Production Health

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read

jobs:
  health:
    name: Production health check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Validate monitoring secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Check production services
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=2 \
            -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" bash <<'EOF'
            set -euo pipefail
            cd /srv/app

            diagnostics() {
              echo "=== failure diagnostics ==="
              free -m || true
              docker stats --no-stream || true
              docker compose ps || true
              docker compose logs --tail=120 backend import-worker frontend || true
            }
            trap diagnostics ERR

            echo "=== compose ps ==="
            docker compose ps

            echo "=== required container states ==="
            for service in backend frontend db; do
              if ! docker compose ps "$service" | grep -q "Up"; then
                echo "ERROR: $service container is not Up"
                exit 1
              fi
            done

            echo "=== backend /health ==="
            curl --fail --silent --show-error --max-time 10 --retry 2 --retry-delay 2 \
              http://localhost:8000/health

            echo "=== frontend / ==="
            curl --fail --silent --show-error --max-time 10 --retry 2 --retry-delay 2 \
              http://localhost/ >/dev/null

            echo "=== frontend /api/health proxy ==="
            curl --fail --silent --show-error --max-time 10 --retry 2 --retry-delay 2 \
              http://localhost/api/health

            # Importing main starts a second application process and can exhaust a small
            # production host. Image-level import smoke belongs to the build workflow.
            echo "=== alembic current ==="
            docker compose exec -T backend alembic current

            echo "=== production resources ==="
            free -m
            docker stats --no-stream

            echo "=== health check OK ==="
          EOF

      - name: Notify Telegram on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram notification skipped: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is missing"
            exit 0
          fi
          TEXT="❌ City Go production health failed%0AWorkflow: ${GITHUB_WORKFLOW}%0ARun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"

      - name: Notify Telegram on recovery/manual success
        if: success() && github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram notification skipped: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is missing"
            exit 0
          fi
          TEXT="✅ City Go production health OK%0AWorkflow: ${GITHUB_WORKFLOW}%0ARun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
