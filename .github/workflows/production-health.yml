name: 84 · CITY GO · MON · Production Health

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read

concurrency:
  group: production-health
  cancel-in-progress: true

jobs:
  health:
    name: Production health check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Validate monitoring secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)
          test -n "$ADMIN_API_TOKEN" || (echo "ADMIN_API_TOKEN secret is missing" >&2; exit 1)

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Check production services and database
        timeout-minutes: 4
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_ADMIN_API_TOKEN=$(printf '%q' "$ADMIN_API_TOKEN")
          timeout --preserve-status 180s ssh \
            -o BatchMode=yes \
            -o RequestTTY=no \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=3 \
            -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "ADMIN_API_TOKEN=$REMOTE_ADMIN_API_TOKEN bash -Eeuo pipefail" <<'EOF'
            cd /srv/app

            diagnostics() {
              local exit_code=$?
              set +e
              echo "=== failure diagnostics ==="
              echo "failed_exit_code=${exit_code}"
              echo "=== memory ==="
              timeout 10s free -m || true
              echo "=== disk ==="
              timeout 10s df -h || true
              echo "=== docker stats ==="
              timeout 20s docker stats --no-stream || true
              echo "=== docker compose ps ==="
              timeout 20s docker compose ps || true
              echo "=== docker compose logs tail ==="
              timeout 45s docker compose logs --tail=80 db backend frontend || true
              echo "=== diagnostics PostgreSQL readiness ==="
              timeout 15s docker compose exec -T db pg_isready -U postgres -d city_guide || true
              echo "=== diagnostics pg_stat_activity ==="
              timeout 15s docker compose exec -T db psql -U postgres -d city_guide -P pager=off -c \
                "SELECT pid, state, wait_event_type, wait_event, age(clock_timestamp(), query_start) AS query_age, left(query, 180) AS query FROM pg_stat_activity WHERE datname=current_database() AND pid<>pg_backend_pid() ORDER BY query_start NULLS LAST LIMIT 20;" || true
              return "${exit_code}"
            }
            trap diagnostics ERR

            check_container_up() {
              local service="$1"
              echo "=== container ${service} state ==="
              timeout 20s docker compose ps "$service"
              timeout 20s docker compose ps "$service" | grep -q "Up"
              echo
            }

            check_url() {
              local label="$1"
              local timeout_seconds="$2"
              shift 2
              echo "=== ${label} ===" >&2
              timeout "$((timeout_seconds + 10))s" \
                curl --fail --silent --show-error \
                  --connect-timeout 10 \
                  --max-time "$timeout_seconds" \
                  --retry 2 \
                  --retry-delay 2 \
                  --retry-max-time "$timeout_seconds" \
                  "$@"
              echo >&2
            }

            echo "=== validate required containers ==="
            check_container_up db
            check_container_up backend
            check_container_up frontend

            echo "=== PostgreSQL readiness ==="
            timeout 20s docker compose exec -T db pg_isready -U postgres -d city_guide
            echo

            check_url "backend ready" 30 http://localhost:8000/ready
            check_url "nginx API ready proxy" 30 http://localhost/api/ready
            check_url "frontend root" 20 http://localhost/ >/dev/null

            echo "=== critical admin endpoint smoke ==="
            auth=(-H "Authorization: Bearer ${ADMIN_API_TOKEN}")
            check_url "admin places smoke" 30 "${auth[@]}" 'http://localhost:8000/admin/places?limit=1' >/dev/null
            check_url "admin taxonomy categories smoke" 30 "${auth[@]}" 'http://localhost:8000/admin/taxonomy/categories?limit=1' >/dev/null
            check_url "admin import jobs smoke" 30 "${auth[@]}" 'http://localhost:8000/admin/import-jobs?limit=1' >/dev/null

            echo "=== alembic current diagnostic (non-fatal) ==="
            timeout 30s docker compose exec -T backend alembic current || echo "alembic current failed: non-fatal for API readiness"
            echo

            echo "=== resources snapshot ==="
            timeout 10s free -m || true
            timeout 20s docker stats --no-stream || true
            echo "=== health check OK ==="
          EOF

      - name: Notify Telegram on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram notification skipped: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is missing"
            exit 0
          fi
          TEXT="❌ City Go production readiness failed%0AOne of production checks failed. Open workflow logs for the exact section name.%0ARun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"

      - name: Notify Telegram on recovery/manual success
        if: success() && github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            exit 0
          fi
          TEXT="✅ City Go production readiness OK%0AProduction checks passed.%0ARun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
