name: Admin Edge Watchdog

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: admin-edge-watchdog
  cancel-in-progress: false

jobs:
  check-admin-edge:
    name: Check production admin edge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve production base URL
        id: resolve-url
        shell: bash
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          BASE_URL="${PRODUCTION_BASE_URL:-}"
          if [ -z "$BASE_URL" ] && [ -n "${SSH_HOST:-}" ]; then
            BASE_URL="http://${SSH_HOST}"
          fi
          if [ -z "$BASE_URL" ]; then
            echo "No PRODUCTION_BASE_URL or SSH_HOST secret configured" >&2
            exit 2
          fi
          BASE_URL="${BASE_URL%/}"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Check public and admin edge status codes
        shell: bash
        env:
          BASE_URL: ${{ steps.resolve-url.outputs.base_url }}
        run: |
          set -euo pipefail
          REPORT=/tmp/admin-edge-watchdog.txt
          : > "$REPORT"

          check_exact() {
            local label="$1"
            local path="$2"
            local expected="$3"
            local status
            status=$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 12 "$BASE_URL$path" || true)
            printf '%s status=%s path=%s expected=%s\n' "$label" "$status" "$path" "$expected" | tee -a "$REPORT"
            test "$status" = "$expected"
          }

          check_admin_auth_gate() {
            local label="$1"
            local path="$2"
            local status
            status=$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 12 "$BASE_URL$path" || true)
            printf '%s status=%s path=%s expected=401_or_403\n' "$label" "$status" "$path" | tee -a "$REPORT"
            case "$status" in
              401|403) return 0 ;;
              *) return 1 ;;
            esac
          }

          check_exact 'frontend build metadata' '/build.json' '200'
          check_exact 'backend health via proxy' '/api/health' '200'
          check_exact 'backend readiness via proxy' '/api/ready' '200'
          check_admin_auth_gate 'admin cities auth gate' '/api/admin/cities?limit=1'
          check_admin_auth_gate 'admin verification summary auth gate' '/api/admin/place-verifications/summary'
          check_admin_auth_gate 'admin data quality summary auth gate' '/api/admin/data-quality/summary'

      - name: Add report to summary
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/admin-edge-watchdog.txt ]; then
            {
              echo '```text'
              cat /tmp/admin-edge-watchdog.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
