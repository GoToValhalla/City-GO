name: Catalog Data Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '5,15,25,35,45,55 * * * *'

permissions:
  contents: read

jobs:
  catalog-data-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PROD_HOST: ${{ secrets.SSH_HOST }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NOTIFICATION_FILE: /tmp/catalog-data-monitor-notification.txt
    steps:
      - name: Checkout monitor scripts
        uses: actions/checkout@v4

      - name: Validate public catalog data
        shell: bash
        run: |
          set -euo pipefail
          python scripts/catalog_data_monitor.py \
            --host "$PROD_HOST" \
            --notification-file "$NOTIFICATION_FILE"

      - name: Notify Telegram on catalog failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s "$NOTIFICATION_FILE" ]; then
            printf '%s\n' \
              '❌ City GO · Каталог не проверен' \
              "Хост: ${PROD_HOST:-не указан}" \
              'Проблема: monitor script завершился раньше, чем записал отчёт.' \
              'Что делать: открыть лог шага Validate public catalog data.' \
              "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              > "$NOTIFICATION_FILE"
          fi
          python scripts/send_telegram_notification.py --text-file "$NOTIFICATION_FILE" --allow-missing

      - name: Notify Telegram on manual recovery check
        if: success() && github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/send_telegram_notification.py --text-file "$NOTIFICATION_FILE" --allow-missing
