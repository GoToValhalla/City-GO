name: 03 · CITY GO · Admin Diagnostics

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Sample size for drilldown endpoints.
        required: false
        default: "1"
        type: string

permissions:
  contents: read

concurrency:
  group: admin-diagnostics
  cancel-in-progress: false

jobs:
  admin-diagnostics:
    name: Admin screen diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
    steps:
      - name: Run admin screen diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/admin-diagnostics

          BASE_URL="${PRODUCTION_BASE_URL:-}"
          BASE_URL="${BASE_URL%/}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="http://${SSH_HOST}"
          fi
          if [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "ADMIN_API_TOKEN secret is required" >&2
            exit 1
          fi

          request_json() {
            local path="$1"
            local budget_ms="$2"
            local timeout_sec="$3"
            local out_file="$4"
            local started ended elapsed
            started=$(date +%s%3N)
            curl --fail --silent --show-error --max-time "$timeout_sec" \
              -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
              -H "User-Agent: city-go-admin-diagnostics/2.0" \
              "${BASE_URL}${path}" \
              -o "$out_file"
            ended=$(date +%s%3N)
            elapsed=$((ended - started))
            echo "${path} ${elapsed} ms" | tee -a /tmp/admin-diagnostics/summary.txt
            if [ "$elapsed" -gt "$budget_ms" ]; then
              echo "${path} exceeded budget: ${elapsed} ms > ${budget_ms} ms" >&2
              exit 1
            fi
          }

          echo "CITY GO · ADMIN DIAGNOSTICS" > /tmp/admin-diagnostics/summary.txt
          echo "" >> /tmp/admin-diagnostics/summary.txt
          echo "Screen endpoints:" >> /tmp/admin-diagnostics/summary.txt

          request_json "/api/admin/overview" 2000 2 /tmp/admin-diagnostics/overview.json
          request_json "/api/admin/overview/backlog-breakdown" 20000 20 /tmp/admin-diagnostics/backlog-breakdown.json
          request_json "/api/admin/overview/backlog-reduction-plan" 20000 20 /tmp/admin-diagnostics/backlog-reduction-plan.json

          python - <<'PY'
          import json
          from pathlib import Path

          base = Path('/tmp/admin-diagnostics')
          overview = json.loads((base / 'overview.json').read_text(encoding='utf-8'))
          backlog = json.loads((base / 'backlog-breakdown.json').read_text(encoding='utf-8'))
          plan = json.loads((base / 'backlog-reduction-plan.json').read_text(encoding='utf-8'))

          cards = []
          for section in ('critical', 'data_quality', 'operations'):
              for card in overview.get(section, []) or []:
                  if isinstance(card, dict):
                      cards.append({
                          'section': section,
                          'code': card.get('code'),
                          'title': card.get('title'),
                          'count': card.get('count'),
                          'link_path': card.get('link_path'),
                      })

          report = {
              'overview_cards': cards,
              'backlog_summary': backlog.get('summary'),
              'backlog_reduction_summary': plan.get('summary'),
              'dry_run_smoke': 'skipped: screen diagnostics must not execute heavy reduction actions',
          }
          (base / 'report.json').write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8')

          with (base / 'summary.txt').open('a', encoding='utf-8') as fh:
              fh.write('\nOverview cards:\n')
              for card in cards:
                  fh.write(f"- {card['section']}.{card['code']}: {card['count']} · {card['title']} · {card['link_path']}\n")
              fh.write('\nBacklog summary:\n')
              for key, value in (backlog.get('summary') or {}).items():
                  fh.write(f'- {key}: {value}\n')
              fh.write('\nBacklog reduction summary:\n')
              for key, value in (plan.get('summary') or {}).items():
                  fh.write(f'- {key}: {value}\n')
              fh.write('\nDry-run smoke: skipped in this workflow\n')
          PY

          cat /tmp/admin-diagnostics/summary.txt

      - name: Upload admin diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-diagnostics-report
          path: /tmp/admin-diagnostics
          if-no-files-found: ignore
          retention-days: 7
