name: 03 · CITY GO · Admin Diagnostics

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Sample size for drilldown endpoints.
        required: false
        default: "1"
        type: string

permissions:
  contents: read

concurrency:
  group: admin-diagnostics
  cancel-in-progress: false

jobs:
  admin-diagnostics:
    name: Admin overview and drilldown diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      DIAGNOSTIC_LIMIT: ${{ inputs.limit || '1' }}
    steps:
      - name: Run admin diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/admin-diagnostics
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path
          from typing import Any

          def base_url() -> str:
              explicit = os.getenv("PRODUCTION_BASE_URL", "").strip().rstrip("/")
              if explicit:
                  return explicit
              ssh_host = os.getenv("SSH_HOST", "").strip()
              if ssh_host:
                  return f"http://{ssh_host}".rstrip("/")
              raise RuntimeError("PRODUCTION_BASE_URL or SSH_HOST secret is required")

          TOKEN = os.getenv("ADMIN_API_TOKEN", "").strip()
          if not TOKEN:
              raise RuntimeError("ADMIN_API_TOKEN secret is required")

          BASE_URL = base_url()
          LIMIT = os.getenv("DIAGNOSTIC_LIMIT", "1").strip() or "1"
          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "User-Agent": "city-go-admin-diagnostics/1.0",
          }

          def get_json(path: str) -> dict[str, Any]:
              url = f"{BASE_URL}/{path.lstrip('/')}"
              request = urllib.request.Request(url, headers=HEADERS, method="GET")
              try:
                  with urllib.request.urlopen(request, timeout=20) as response:  # noqa: S310
                      raw = response.read(2_000_000).decode("utf-8", errors="replace")
              except urllib.error.HTTPError as exc:
                  body = exc.read(4096).decode("utf-8", errors="replace")
                  raise RuntimeError(f"GET {path} failed with HTTP {exc.code}: {body[:500]}") from exc
              payload = json.loads(raw or "{}")
              if not isinstance(payload, dict):
                  raise RuntimeError(f"GET {path} returned non-object JSON")
              return payload

          overview = get_json("/api/admin/overview")
          cards = []
          for section in ("critical", "data_quality", "operations"):
              for card in overview.get(section, []) or []:
                  if not isinstance(card, dict):
                      continue
                  cards.append(
                      {
                          "section": section,
                          "code": card.get("code"),
                          "count": card.get("count"),
                          "title": card.get("title"),
                          "hint": card.get("hint"),
                          "action_label": card.get("action_label"),
                          "link_path": card.get("link_path"),
                      }
                  )

          drilldown_specs = {
              "manual_review": "/api/admin/places/search?publication_status=needs_review&limit={limit}",
              "auto_backlog": "/api/admin/places/search?publication_status=auto_backlog&limit={limit}",
              "needs_verification": "/api/admin/places/search?verification_status=needs_recheck&limit={limit}",
              "not_in_routes": "/api/admin/places/search?preset=not_in_routes&limit={limit}",
              "route_unknown": "/api/admin/places/search?preset=route_unknown&limit={limit}",
              "service_places": "/api/admin/places/search?preset=service_places&limit={limit}",
              "no_photo": "/api/admin/places/search?preset=no_photo&limit={limit}",
              "no_address": "/api/admin/places/search?preset=no_address&limit={limit}",
              "no_description": "/api/admin/places/search?preset=no_description&limit={limit}",
              "low_confidence": "/api/admin/places/search?low_confidence=true&limit={limit}",
          }
          drilldowns: dict[str, Any] = {}
          for code, template in drilldown_specs.items():
              path = template.format(limit=urllib.parse.quote(LIMIT))
              payload = get_json(path)
              items = payload.get("items") or []
              safe_items = []
              if isinstance(items, list):
                  for item in items[:3]:
                      if isinstance(item, dict):
                          safe_items.append(
                              {
                                  "id": item.get("id"),
                                  "slug": item.get("slug"),
                                  "title": item.get("title"),
                                  "publication_status": item.get("publication_status"),
                                  "verification_status": item.get("verification_status"),
                                  "category": item.get("category"),
                                  "canonical_category": item.get("canonical_category"),
                                  "is_published": item.get("is_published"),
                                  "is_route_eligible": item.get("is_route_eligible"),
                              }
                          )
              drilldowns[code] = {
                  "path": path,
                  "total": payload.get("total"),
                  "sample": safe_items,
              }

          card_by_code = {str(card.get("code")): card for card in cards}
          consistency = []
          mapping = {
              "manual_review": "manual_review",
              "auto_backlog": "auto_backlog",
              "needs_verification": "needs_verification",
              "route_blockers": "not_in_routes",
              "not_route_eligible": "not_in_routes",
              "route_unknown": "route_unknown",
              "route_excluded": "service_places",
              "no_photo": "no_photo",
              "no_address": "no_address",
              "no_description": "no_description",
              "low_confidence": "low_confidence",
          }
          for card_code, drill_code in mapping.items():
              if card_code in card_by_code and drill_code in drilldowns:
                  consistency.append(
                      {
                          "card_code": card_code,
                          "card_count": card_by_code[card_code].get("count"),
                          "drilldown_code": drill_code,
                          "drilldown_total": drilldowns[drill_code].get("total"),
                          "matches": card_by_code[card_code].get("count") == drilldowns[drill_code].get("total"),
                      }
                  )

          forbidden_terms = (
              "published/catalog",
              "route policy",
              "canonical category",
              "taxonomy",
              "enrichment/policy",
              "verification backlog",
              "critical confidence",
              "is_route_eligible",
          )
          technical_copy = []
          for card in cards:
              text = " ".join(str(card.get(key) or "") for key in ("title", "hint", "action_label")).lower()
              hits = [term for term in forbidden_terms if term in text]
              if hits:
                  technical_copy.append({"code": card.get("code"), "hits": hits})

          report = {
              "base_url_source": "PRODUCTION_BASE_URL" if os.getenv("PRODUCTION_BASE_URL", "").strip() else "SSH_HOST",
              "overview_cards": cards,
              "drilldowns": drilldowns,
              "consistency": consistency,
              "technical_copy": technical_copy,
          }
          Path("/tmp/admin-diagnostics/report.json").write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8")

          summary_lines = ["CITY GO · ADMIN DIAGNOSTICS", "", "Overview cards:"]
          for card in cards:
              summary_lines.append(f"- {card['section']}.{card['code']}: {card['count']} · {card['title']} · {card['link_path']}")
          summary_lines.append("")
          summary_lines.append("Drilldown consistency:")
          for row in consistency:
              mark = "OK" if row["matches"] else "MISMATCH"
              summary_lines.append(f"- {mark} {row['card_code']}: card={row['card_count']} drilldown={row['drilldown_total']} ({row['drilldown_code']})")
          summary_lines.append("")
          summary_lines.append("Technical copy hits:")
          if technical_copy:
              for row in technical_copy:
                  summary_lines.append(f"- {row['code']}: {', '.join(row['hits'])}")
          else:
              summary_lines.append("- none")
          Path("/tmp/admin-diagnostics/summary.txt").write_text("\n".join(summary_lines) + "\n", encoding="utf-8")
          print("\n".join(summary_lines))
          PY

      - name: Upload admin diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-diagnostics-report
          path: /tmp/admin-diagnostics
          if-no-files-found: ignore
          retention-days: 7
