name: CITY GO · TEST · PostgreSQL Integration (manual)

# Manual-only production-shaped regression lane. Runs the real concurrency/
# locking/JSONB tests in tests_postgres_integration/ against a real
# postgres:16 service container — this directory is intentionally excluded
# from `testpaths` in pytest.ini and is never collected by the default
# `pytest tests/` run or by ci.yml, so it cannot slow down or destabilize
# the normal PR pipeline. See docs/architecture/architecture_freeze_gate.md
# and docs/admin/publication_state_invariants.md for the invariants covered.

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type exactly RUN_POSTGRES_INTEGRATION to confirm.
        required: true
        type: string

permissions:
  contents: read

jobs:
  postgres-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: city_guide_pg_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d city_guide_pg_integration"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/city_guide_pg_integration
      ADMIN_API_TOKEN: pg-integration-admin-token
      APP_ENV: test
    steps:
      - name: Require exact confirmation text
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirmation }}" != "RUN_POSTGRES_INTEGRATION" ]; then
            echo "ERROR: confirmation input must be exactly RUN_POSTGRES_INTEGRATION (got: '${{ inputs.confirmation }}')." >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 1
          done

      - name: Apply Alembic migrations to the real PostgreSQL database
        run: alembic upgrade head

      - name: Run PostgreSQL integration tests
        run: python -m pytest tests_postgres_integration --no-cov -p no:cacheprovider -v

      - name: Confirm this lane never runs via the default suite
        run: |
          python -c "
          import configparser
          cfg = configparser.ConfigParser()
          cfg.read('pytest.ini')
          testpaths = cfg['pytest']['testpaths'].strip()
          assert testpaths == 'tests', f'pytest.ini testpaths changed to {testpaths!r} — tests_postgres_integration must stay excluded from the default collection.'
          print('OK: tests_postgres_integration is not part of testpaths, manual-only lane confirmed.')
          "
