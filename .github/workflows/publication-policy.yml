name: Publication Policy

on:
  schedule:
    # 03:00 Europe/Paris in summer time, after nightly enrichment/import windows.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        required: true
        default: shadow
        options:
          - shadow
          - apply
      city_slug:
        description: "Optional city slug"
        required: false
        default: ""
      limit:
        description: "Max places to evaluate"
        required: true
        default: "100"
      auto_publish_enabled:
        description: "Required for apply mode to publish high-trust places"
        type: boolean
        required: true
        default: false
      auto_publish_threshold:
        description: "Trust score threshold for auto-publication"
        required: true
        default: "90"

permissions:
  contents: read

concurrency:
  group: publication-policy
  cancel-in-progress: false

jobs:
  run:
    name: Evaluate publication policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      POLICY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'shadow' }}
      CITY_SLUG: ${{ github.event_name == 'workflow_dispatch' && inputs.city_slug || '' }}
      LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '100' }}
      AUTO_PUBLISH_ENABLED: ${{ github.event_name == 'workflow_dispatch' && inputs.auto_publish_enabled || false }}
      AUTO_PUBLISH_THRESHOLD: ${{ github.event_name == 'workflow_dispatch' && inputs.auto_publish_threshold || '90' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh /tmp/city-go-publication-policy
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 8 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Run publication policy on production backend
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          REMOTE_POLICY_MODE=$(printf '%q' "$POLICY_MODE")
          REMOTE_CITY_SLUG=$(printf '%q' "$CITY_SLUG")
          REMOTE_LIMIT=$(printf '%q' "$LIMIT")
          REMOTE_AUTO_PUBLISH_ENABLED=$(printf '%q' "$AUTO_PUBLISH_ENABLED")
          REMOTE_AUTO_PUBLISH_THRESHOLD=$(printf '%q' "$AUTO_PUBLISH_THRESHOLD")

          ssh \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            -i ~/.ssh/deploy_key \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "POLICY_MODE=$REMOTE_POLICY_MODE CITY_SLUG=$REMOTE_CITY_SLUG LIMIT=$REMOTE_LIMIT AUTO_PUBLISH_ENABLED=$REMOTE_AUTO_PUBLISH_ENABLED AUTO_PUBLISH_THRESHOLD=$REMOTE_AUTO_PUBLISH_THRESHOLD bash -seu -o pipefail" \
            < scripts/run_publication_policy_remote.sh 2>&1 | tee /tmp/city-go-publication-policy/run.log

      - name: Upload publication policy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publication-policy-log
          path: /tmp/city-go-publication-policy/run.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Build publication policy notification
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          SUMMARY_JSON=""
          if [ -f /tmp/city-go-publication-policy/run.log ]; then
            SUMMARY_JSON=$(grep '^PUBLICATION_POLICY_SUMMARY_JSON=' /tmp/city-go-publication-policy/run.log | tail -n 1 | sed 's/^PUBLICATION_POLICY_SUMMARY_JSON=//' || true)
          fi
          python - "$SUMMARY_JSON" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          def add_reasons(lines, title, rows):
              if not rows:
                  return
              lines.extend(["", title])
              for row in rows[:5]:
                  lines.append(f"{row.get('reason')}: {row.get('count')}")

          summary_json = sys.argv[1]
          status = os.environ.get("JOB_STATUS", "failure")
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          mode = os.environ.get("POLICY_MODE", "shadow")
          city = os.environ.get("CITY_SLUG") or "все города"
          threshold = os.environ.get("AUTO_PUBLISH_THRESHOLD", "90")

          if summary_json:
              payload = json.loads(summary_json)
              run = payload.get("run", {})
              last_7 = payload.get("last_7_days", {})
              by_decision = last_7.get("by_decision", {})
              trust = last_7.get("trust_score", {})
              cities = last_7.get("cities", [])[:6]
              blocked = last_7.get("recent_blocked", [])[:5]
              lines = [
                  "CITY GO · PUBLICATION POLICY",
                  f"Статус: {'✅ пройден' if status == 'success' else '❌ не пройден'}",
                  f"Запуск: mode={mode} · city={city} · threshold={threshold}",
                  "",
                  "ЭТОТ ЗАПУСК",
                  f"Проверено: {run.get('evaluated', 0)}",
                  f"Shadow auto: {run.get('shadow_auto_publish', 0)}",
                  f"Auto published: {run.get('auto_publish', 0)}",
                  f"Review: {run.get('send_to_review', 0)}",
                  f"Hidden: {run.get('hidden', 0)}",
                  "",
                  "7 ДНЕЙ",
                  f"Всего решений: {last_7.get('total_decisions', 0)}",
                  f"Auto published: {by_decision.get('auto_publish', 0)}",
                  f"Shadow auto: {by_decision.get('shadow_auto_publish', 0)}",
                  f"Review: {by_decision.get('send_to_review', 0)}",
                  f"Hidden: {by_decision.get('hidden', 0)}",
                  f"Trust avg/min/max: {trust.get('avg')}/{trust.get('min')}/{trust.get('max')}",
                  f"Open publication review: {last_7.get('open_publication_review_items', 0)}",
                  f"Open change review: {last_7.get('pending_change_reviews', 0)}",
              ]
              add_reasons(lines, "ПРИЧИНЫ", last_7.get("top_review_reasons", []))
              add_reasons(lines, "FAILED GATES", last_7.get("top_failed_gates", []))
              if blocked:
                  lines.extend(["", "BLOCKED"])
                  for item in blocked:
                      reasons = ", ".join(item.get("review_reasons") or item.get("failed_gates") or []) or "no_reason"
                      lines.append(
                          f"{item.get('city_name') or item.get('city_slug')}: "
                          f"{item.get('title') or 'без названия'} · score {item.get('trust_score')} · {reasons}"
                      )
              if cities:
                  lines.extend(["", "ГОРОДА"])
                  for city_row in cities:
                      decisions = city_row.get("decisions", {})
                      lines.append(
                          f"{city_row.get('name') or city_row.get('slug')}: "
                          f"auto {decisions.get('auto_publish', 0)} · "
                          f"shadow {decisions.get('shadow_auto_publish', 0)} · "
                          f"review {decisions.get('send_to_review', 0)} · "
                          f"hidden {decisions.get('hidden', 0)}"
                      )
              lines.extend(["", f"GitHub Actions: {run_url}"])
          else:
              tail = ""
              log_path = Path("/tmp/city-go-publication-policy/run.log")
              if log_path.exists():
                  tail = "\n".join(log_path.read_text(encoding="utf-8", errors="replace").splitlines()[-20:])
              lines = [
                  "CITY GO · PUBLICATION POLICY",
                  "Статус: ❌ не пройден",
                  f"Запуск: mode={mode} · city={city} · threshold={threshold}",
                  "Причина: summary JSON не найден в логе.",
                  "",
                  tail,
                  "",
                  f"GitHub Actions: {run_url}",
              ]
          Path("/tmp/city-go-publication-policy/notification.txt").write_text("\n".join(lines).strip() + "\n", encoding="utf-8")
          PY

      - name: Send publication policy Telegram notification
        if: always()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_telegram_notification.py --text-file /tmp/city-go-publication-policy/notification.txt
