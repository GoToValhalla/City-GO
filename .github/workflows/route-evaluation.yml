name: CITY GO · TEST · Route Evaluation CI Gate (manual)

# Manual-only invariant gate over tests/route_evaluation (CITYGO-358 dataset).
# Never runs on push/PR. Fails only on invariant / deterministic dataset failures.
# Isolated in-memory SQLite via pytest fixtures; no external HTTP.

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type exactly RUN_ROUTE_EVALUATION to confirm.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: route-evaluation-ci-gate
  cancel-in-progress: true

jobs:
  route-evaluation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: test
      # Fixture suite forces sqlite:///:memory:; keep URL local and offline.
      DATABASE_URL: "sqlite:///:memory:"
    steps:
      - name: Require exact confirmation text
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirmation }}" != "RUN_ROUTE_EVALUATION" ]; then
            echo "ERROR: confirmation input must be exactly RUN_ROUTE_EVALUATION (got: '${{ inputs.confirmation }}')." >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run route evaluation CI gate
        run: |
          set -euo pipefail
          mkdir -p artifacts/route-evaluation
          python scripts/run_route_evaluation_ci_gate.py artifacts/route-evaluation

      - name: Upload route evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-evaluation-report
          path: artifacts/route-evaluation
          if-no-files-found: error
          retention-days: 14
