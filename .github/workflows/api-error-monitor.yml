name: 80 · CITY GO · MON · API Errors

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: read

jobs:
  api-error-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROD_HOST: ${{ secrets.PRODUCTION_BASE_URL || vars.PRODUCTION_BASE_URL || 'https://citygo.autismishe.online' }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NOTIFICATION_FILE: /tmp/api-error-monitor-notification.txt
    steps:
      - name: Checkout monitor scripts
        uses: actions/checkout@v4

      - name: Check API endpoints
        shell: bash
        run: |
          set -euo pipefail
          python scripts/api_error_monitor.py \
            --host "$PROD_HOST" \
            --admin-token "${ADMIN_API_TOKEN:-}" \
            --notification-file "$NOTIFICATION_FILE"

      - name: Telegram alert on API failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s "$NOTIFICATION_FILE" ]; then
            printf '%s\n' \
              '❌ CITY GO · API MONITOR' \
              'Статус: мониторинг не смог сформировать основной отчёт' \
              "Хост: ${PROD_HOST:-не указан}" \
              'Где упало: шаг Check API endpoints' \
              'Факт: файл отчёта пустой или не создан' \
              'Что это значит: скрипт мониторинга завершился до записи результата; это отдельная проблема мониторинга, а не доказательство исправности API.' \
              'Что делать: открыть лог шага Check API endpoints и проверить Python exception, secrets и доступность host.' \
              "GitHub Actions: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              > "$NOTIFICATION_FILE"
          fi
          python scripts/send_telegram_notification.py --text-file "$NOTIFICATION_FILE" --allow-missing

      - name: Telegram OK on manual run
        if: success() && github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/send_telegram_notification.py --text-file "$NOTIFICATION_FILE" --allow-missing
