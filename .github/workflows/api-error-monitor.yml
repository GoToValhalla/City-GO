name: API Error Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: read

jobs:
  api-error-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROD_HOST: ${{ secrets.SSH_HOST }}
      SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Check public and admin API status codes
        shell: bash
        run: |
          set -euo pipefail
          test -n "${PROD_HOST:-}" || (echo "SSH_HOST secret is missing" >&2; exit 1)

          BASE_URL="http://${PROD_HOST}"
          FAILED=0
          REPORT=""

          encode_body() {
            head -c 6000 "$1" | tr '\n' ' ' | sed 's/%/%25/g; s/&/%26/g; s/</\&lt;/g; s/>/\&gt;/g'
          }

          check_get() {
            local name="$1"
            local path="$2"
            local auth="$3"
            local tmp
            tmp=$(mktemp)

            if [ "$auth" = "admin" ]; then
              if [ -z "${ADMIN_API_TOKEN:-}" ]; then
                echo "ERROR: ADMIN_API_TOKEN secret is missing" >&2
                FAILED=1
                REPORT+="❌ ${name} ${path} -> missing ADMIN_API_TOKEN%0A"
                return
              fi
              STATUS=$(curl -sS -o "$tmp" -w '%{http_code}' --connect-timeout 8 --max-time 25 \
                -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
                "${BASE_URL}${path}" || echo "000")
            else
              STATUS=$(curl -sS -o "$tmp" -w '%{http_code}' --connect-timeout 8 --max-time 25 \
                "${BASE_URL}${path}" || echo "000")
            fi

            BODY=$(encode_body "$tmp")
            rm -f "$tmp"

            echo "${name} ${path} -> ${STATUS}"
            if [ "$STATUS" = "000" ] || [ "$STATUS" -ge 400 ]; then
              FAILED=1
              REPORT+="❌ ${name} ${path} -> HTTP ${STATUS}%0A${BODY}%0A%0A"
            fi
          }

          check_post_json() {
            local name="$1"
            local path="$2"
            local body="$3"
            local tmp
            tmp=$(mktemp)

            STATUS=$(curl -sS -o "$tmp" -w '%{http_code}' --connect-timeout 8 --max-time 35 \
              -H 'Content-Type: application/json' \
              -d "$body" \
              "${BASE_URL}${path}" || echo "000")

            BODY=$(encode_body "$tmp")
            rm -f "$tmp"

            echo "${name} ${path} -> ${STATUS}"
            if [ "$STATUS" = "000" ] || [ "$STATUS" -ge 400 ]; then
              FAILED=1
              REPORT+="❌ ${name} ${path} -> HTTP ${STATUS}%0A${BODY}%0A%0A"
            fi
          }

          check_get "frontend" "/" "public"
          check_get "api_health_proxy" "/api/health" "public"
          check_get "backend_health_direct" ":8000/health" "public"

          check_get "admin_overview_proxy" "/api/admin/overview" "admin"
          check_get "admin_metrics_proxy" "/api/admin/metrics/summary" "admin"
          check_get "admin_coverage_proxy" "/api/admin/coverage/summary?limit=5" "admin"
          check_get "admin_verification_proxy" "/api/admin/place-verifications/summary" "admin"
          check_get "admin_route_eligibility_proxy" "/api/admin/routes/eligibility?limit=1" "admin"
          check_get "admin_route_readiness_proxy" "/api/admin/routes/readiness?limit=10" "admin"

          check_get "admin_overview_backend" ":8000/admin/overview" "admin"
          check_get "admin_coverage_backend" ":8000/admin/coverage/summary?limit=5" "admin"
          check_get "admin_route_readiness_backend" ":8000/admin/routes/readiness?limit=10" "admin"

          ROUTE_BODY='{"lat":40.1792,"lng":44.4991,"start_address":null,"start_source":"city_center","start":{"type":"city_center","lat":40.1792,"lng":44.4991,"address":null},"build_mode":"by_categories","time_budget_minutes":240,"time_of_day":null,"route_time_mode":"flexible","interests":["coffee","food","walk"],"avoided_categories":[],"excluded_place_ids":[],"budget_level":null,"pace_mode":null,"is_visiting":false,"city_id":"yerevan","visit_city_id":null,"visit_days":null,"user_id":"monitor"}'
          check_post_json "route_preview_yerevan_proxy" "/api/v1/user-routes/preview" "$ROUTE_BODY"
          check_post_json "route_preview_yerevan_backend" ":8000/v1/user-routes/preview" "$ROUTE_BODY"

          if [ "$FAILED" != "0" ]; then
            echo "API monitor failed"
            echo "$REPORT"
            echo "REPORT<<EOF" >> "$GITHUB_ENV"
            echo "$REPORT" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
            exit 1
          fi

      - name: Collect backend logs on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY_B64:-}" ] || [ -z "${SSH_USER:-}" ] || [ -z "${PROD_HOST:-}" ]; then
            echo "SSH diagnostics skipped: SSH secrets missing"
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$PROD_HOST" >> ~/.ssh/known_hosts

          set +e
          DIAG=$(ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$PROD_HOST" bash <<'REMOTE_EOF'
            cd /srv/app || exit 0
            echo "=== compose ps ==="
            docker compose ps || true
            echo "=== backend logs extracted ==="
            docker compose logs --tail=1600 backend | grep -Ei -A 50 -B 20 'traceback|exception|error|critical|undefinedcolumn|undefinedtable|programmingerror|operationalerror|integrityerror|validationerror|sqlalchemy' || true
            echo "=== backend logs tail ==="
            docker compose logs --tail=260 backend || true
          REMOTE_EOF
          )
          SSH_EXIT=$?
          set -e

          echo "$DIAG"
          ENCODED_DIAG=$(printf '%s' "$DIAG" | head -c 6000 | tr '\n' ' ' | sed 's/%/%25/g; s/&/%26/g; s/</\&lt;/g; s/>/\&gt;/g')
          echo "REPORT<<EOF" >> "$GITHUB_ENV"
          printf '%s%%0A%%0A%s\n' "${REPORT:-API monitor failed}" "$ENCODED_DIAG" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          exit 0

      - name: Telegram alert on API 4xx/5xx
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram notification skipped"
            exit 0
          fi
          TEXT="❌ City Go API monitor detected HTTP 4xx/5xx%0AHost: ${PROD_HOST}%0A${REPORT:-No report captured}%0ARun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"

      - name: Telegram OK on manual run
        if: success() && github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram notification skipped"
            exit 0
          fi
          TEXT="✅ City Go API monitor OK%0AHost: ${PROD_HOST}%0ARun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
