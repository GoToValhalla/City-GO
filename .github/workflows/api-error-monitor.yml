name: API Error Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: read

jobs:
  api-error-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROD_HOST: ${{ secrets.SSH_HOST }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NOTIFICATION_FILE: /tmp/api-error-monitor-notification.txt
    steps:
      - name: Checkout monitor scripts
        uses: actions/checkout@v4

      - name: Check API endpoints
        shell: bash
        run: |
          set -euo pipefail
          python scripts/api_error_monitor.py \
            --host "$PROD_HOST" \
            --admin-token "${ADMIN_API_TOKEN:-}" \
            --notification-file "$NOTIFICATION_FILE"

      - name: Telegram alert on API failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s "$NOTIFICATION_FILE" ]; then
            printf '%s\n' \
              '❌ City GO · API monitor упал без отчёта' \
              "Хост: ${PROD_HOST:-не указан}" \
              'Проблема: monitor script завершился раньше, чем записал отчёт.' \
              'Что делать: открыть лог шага Check API endpoints.' \
              "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              > "$NOTIFICATION_FILE"
          fi
          python scripts/send_telegram_notification.py --text-file "$NOTIFICATION_FILE" --allow-missing

      - name: Telegram OK on manual run
        if: success() && github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/send_telegram_notification.py --text-file "$NOTIFICATION_FILE" --allow-missing
