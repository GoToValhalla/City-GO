name: City Import

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  city-import:
    name: Manual city import placeholder
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: City import placeholder
        shell: bash
        run: |
          echo "City import scaffold is ready."
          echo "Real import commands will be added after migration."

      - name: Telegram mini report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram notification skipped"
            exit 0
          fi
          status="${{ job.status }}"
          icon="✅"
          if [ "$status" != "success" ]; then icon="❌"; fi
          message="${icon} City Go City Import
Status: ${status}
Worker: manual city import placeholder
Branch: ${GITHUB_REF_NAME}
Commit: ${GITHUB_SHA:0:7}
Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}" \
            -d "disable_web_page_preview=true"
