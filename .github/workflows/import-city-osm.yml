name: City OSM Import

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: city-osm-import-kutaisi-heritage
  cancel-in-progress: false

jobs:
  import:
    name: Kutaisi heritage dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CITY: kutaisi
      SCOPE: heritage_ne_ring
      PROFILE: heritage_religious
      MODE: dry-run
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh /tmp/city-go-import
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 8 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/tmp/city-go-import/ssh-keyscan.log || true

      - name: Run hardcoded import on production host
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          FLAG="--dry-run"
          {
            echo "city=$CITY"
            echo "scope=$SCOPE"
            echo "profile=$PROFILE"
            echo "mode=$MODE"
            echo "flag=$FLAG"
            echo "started_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > /tmp/city-go-import/import.log
          set +e
          ssh \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/deploy_key \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "CITY='$CITY' SCOPE='$SCOPE' PROFILE='$PROFILE' FLAG='$FLAG' bash -s" <<'REMOTE' 2>&1 | tee -a /tmp/city-go-import/import.log
          set -euo pipefail
          echo "remote_host=$(hostname)"
          echo "remote_started_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cd /srv/app
          echo "remote_pwd=$(pwd)"
          echo "backend_status_start"
          docker compose ps backend || true
          echo "backend_status_end"
          echo "script_probe_start"
          docker compose exec -T backend sh -lc 'pwd; python --version; test -f data/scripts/import_city_osm_v2.py && echo import_script_ok || echo import_script_missing' </dev/null
          echo "script_probe_end"
          echo "import_command_start"
          docker compose exec -T backend python data/scripts/import_city_osm_v2.py --city "$CITY" --scope "$SCOPE" --profile "$PROFILE" $FLAG </dev/null
          echo "import_command_end"
          REMOTE
          status=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$status" | tee -a /tmp/city-go-import/import.log
          echo "finished_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" | tee -a /tmp/city-go-import/import.log
          if ! grep -q "import_command_end" /tmp/city-go-import/import.log; then
            echo "Import command did not complete; see artifact log" >&2
            exit 1
          fi
          if [ "$status" -ne 0 ]; then
            echo "Import failed with exit code $status" >&2
            exit "$status"
          fi

      - name: Build import notification
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          ICON="✅"
          STATUS_TEXT="завершён"
          if [ "$JOB_STATUS" != "success" ]; then ICON="❌"; STATUS_TEXT="не прошёл"; fi
          {
            echo "$ICON CITY GO · OSM IMPORT"
            echo "Статус: $STATUS_TEXT"
            echo "Город: kutaisi"
            echo "Scope: heritage_ne_ring"
            echo "Profile: heritage_religious"
            echo "Mode: dry-run"
            echo "Проверить лог: $RUN_URL"
          } > /tmp/city-go-import/import-notification.txt

      - name: Send Telegram notification
        if: always()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_telegram_notification.py --text-file /tmp/city-go-import/import-notification.txt

      - name: Upload import log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: city-osm-import-log
          path: /tmp/city-go-import
          if-no-files-found: ignore
          retention-days: 14
