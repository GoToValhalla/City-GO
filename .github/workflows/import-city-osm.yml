name: Import Astrakhan OSM

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: city-import-astrakhan
  cancel-in-progress: false

jobs:
  import:
    name: Queue Astrakhan import
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CITY_SLUG: astrakhan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 2)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 2)
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 8 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Queue import and build compact report
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 2)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 2)
          test -n "$ADMIN_API_TOKEN" || (echo "ADMIN_API_TOKEN secret is missing" >&2; exit 2)

          ssh_base=(ssh -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST")
          remote_token=$(printf '%q' "$ADMIN_API_TOKEN")
          remote_city_slug=$(printf '%q' "$CITY_SLUG")

          echo "Checking backend readiness"
          "${ssh_base[@]}" "curl -fsS --max-time 15 http://localhost:8000/ready >/dev/null"

          echo "Resolving city_id for ${CITY_SLUG}"
          "${ssh_base[@]}" "ADMIN_API_TOKEN=$remote_token CITY_SLUG=$remote_city_slug bash -seu -o pipefail" <<'REMOTE' > workspace.json
          curl -fsS --max-time 20 -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
            "http://localhost:8000/admin/cities/by-slug/${CITY_SLUG}/workspace"
          REMOTE
          CITY_ID="$(jq -r '.city.id // .city_id // empty' workspace.json)"
          if [ -z "$CITY_ID" ] || [ "$CITY_ID" = "null" ]; then
            echo "City not found or city_id missing for ${CITY_SLUG}" >&2
            exit 2
          fi
          remote_city_id=$(printf '%q' "$CITY_ID")
          echo "City resolved"

          echo "Queueing import job"
          run_status="$("${ssh_base[@]}" "ADMIN_API_TOKEN=$remote_token CITY_ID=$remote_city_id bash -seu -o pipefail" <<'REMOTE'
          curl -sS -o /dev/null -w '%{http_code}' --max-time 30 -X POST \
            -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
            "http://localhost:8000/admin/import-jobs/${CITY_ID}/run" || true
          REMOTE
          )"
          echo "Run request status=${run_status}"
          case "$run_status" in
            2??) echo "Import job queued" ;;
            409) echo "Import job is already active or reviewable; reading current status" ;;
            *) echo "Import job request failed with status=${run_status}" >&2; exit 1 ;;
          esac

          "${ssh_base[@]}" "ADMIN_API_TOKEN=$remote_token CITY_ID=$remote_city_id bash -seu -o pipefail" <<'REMOTE' > import-status.json
          curl -fsS --max-time 20 -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
            "http://localhost:8000/admin/import-jobs/${CITY_ID}"
          REMOTE
          python3 scripts/build_import_status_summary.py < import-status.json | tee import-status-summary.env

          job_status="$(sed -n 's/^job_status=//p' import-status-summary.env | head -n 1)"
          current_step="$(sed -n 's/^current_step=//p' import-status-summary.env | head -n 1)"
          launch_status="$(sed -n 's/^launch_status=//p' import-status-summary.env | head -n 1)"
          case "$job_status:$current_step:$launch_status" in
            queued:*:*|running:*:*|success:*:*|success_with_warnings:*:*|partial_success:*:*|*:ready_for_review:*|*:review_required:*|*:*:published|*:*:review_required)
              echo "Import status accepted"
              ;;
            *)
              echo "Invalid import status: job_status=$job_status current_step=$current_step launch_status=$launch_status" >&2
              exit 1
              ;;
          esac

      - name: Upload import artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: astrakhan-import-status
          path: |
            import-status.json
            import-status-summary.env
          if-no-files-found: ignore
          retention-days: 14
