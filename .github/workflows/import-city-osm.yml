name: City OSM Import

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: city-import-kutaisi-queue
  cancel-in-progress: false

jobs:
  import:
    name: Queue Kutaisi import
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CITY_SLUG: kutaisi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh /tmp/city-go-import
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 8 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/tmp/city-go-import/ssh-keyscan.log || true

      - name: Queue import through admin API
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || 22 }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          {
            echo "city_slug=$CITY_SLUG"
            echo "mode=queue_import_worker"
            echo "started_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > /tmp/city-go-import/import.log
          set +e
          ssh \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/deploy_key \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "CITY_SLUG='$CITY_SLUG' ADMIN_API_TOKEN='$ADMIN_API_TOKEN' bash -s" <<'REMOTE' 2>&1 | tee -a /tmp/city-go-import/import.log
          set -euo pipefail
          BASE_URL="http://localhost:8000"
          echo "remote_host=$(hostname)"
          echo "remote_started_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "backend_ready_start"
          curl -fsS "$BASE_URL/ready"
          echo
          echo "backend_ready_end"
          echo "find_city_start"
          cities_json="$(curl -fsS -H "Authorization: Bearer $ADMIN_API_TOKEN" "$BASE_URL/admin/cities?limit=200")"
          city_id="$(CITIES_JSON="$cities_json" python - <<'PY'
          import json
          import os
          slug = os.environ["CITY_SLUG"]
          payload = json.loads(os.environ["CITIES_JSON"])
          for item in payload.get("items", []):
              if item.get("slug") == slug:
                  print(item.get("id"))
                  break
          PY
          )"
          if [ -z "$city_id" ] || [ "$city_id" = "None" ]; then
            echo "City not found: $CITY_SLUG" >&2
            exit 2
          fi
          echo "city_id=$city_id"
          echo "find_city_end"
          echo "queue_import_start"
          curl -fsS -X POST -H "Authorization: Bearer $ADMIN_API_TOKEN" "$BASE_URL/admin/import-jobs/$city_id/run"
          echo
          echo "queue_import_end"
          echo "queue_summary_start"
          curl -fsS -H "Authorization: Bearer $ADMIN_API_TOKEN" "$BASE_URL/admin/import-jobs/queue"
          echo
          echo "queue_summary_end"
          REMOTE
          status=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$status" | tee -a /tmp/city-go-import/import.log
          echo "finished_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" | tee -a /tmp/city-go-import/import.log
          if ! grep -q "queue_import_end" /tmp/city-go-import/import.log; then
            echo "Import was not queued; see artifact log" >&2
            exit 1
          fi
          if [ "$status" -ne 0 ]; then
            echo "Queue import failed with exit code $status" >&2
            exit "$status"
          fi

      - name: Build import notification
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          ICON="✅"
          STATUS_TEXT="поставлен в очередь"
          if [ "$JOB_STATUS" != "success" ]; then ICON="❌"; STATUS_TEXT="не поставлен в очередь"; fi
          {
            echo "$ICON CITY GO · IMPORT QUEUE"
            echo "Статус: $STATUS_TEXT"
            echo "Город: kutaisi"
            echo "Исполнитель: import-worker"
            echo "Проверить лог: $RUN_URL"
          } > /tmp/city-go-import/import-notification.txt

      - name: Send Telegram notification
        if: always()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_telegram_notification.py --text-file /tmp/city-go-import/import-notification.txt

      - name: Upload import log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: city-import-queue-log
          path: /tmp/city-go-import
          if-no-files-found: ignore
          retention-days: 14
