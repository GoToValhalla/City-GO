name: 01B · CITY GO · Production Route Secret Recovery

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy-recovery
  cancel-in-progress: false

jobs:
  recover:
    name: Provision route secret and restart production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Validate SSH configuration
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          PRODUCTION_BASE_URL: https://citygo.autismishe.online
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64"
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$PRODUCTION_BASE_URL"

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh /tmp/city-go-recovery
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 8 -p "$SSH_PORT" "$SSH_HOST" > ~/.ssh/known_hosts 2>/tmp/city-go-recovery/ssh-keyscan.log

      - name: Provision secret and restart
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -uo pipefail
          log=/tmp/city-go-recovery/recovery.log
          set +e
          ssh -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -s' \
            2>&1 <<'REMOTE' | tee "$log"
          set -Eeuo pipefail
          cd /srv/app
          touch .env

          current="$(grep -E '^USER_ROUTE_STATE_SECRET=' .env 2>/dev/null | tail -n1 | cut -d= -f2- || true)"
          if [ -z "$current" ]; then
            generated="$(python3 -c 'import secrets; print(secrets.token_hex(32))')"
            tmp="$(mktemp)"
            grep -v '^USER_ROUTE_STATE_SECRET=' .env > "$tmp" || true
            printf 'USER_ROUTE_STATE_SECRET=%s\n' "$generated" >> "$tmp"
            install -m 0600 "$tmp" .env
            rm -f "$tmp"
            current="$generated"
            echo "USER_ROUTE_STATE_SECRET generated and persisted."
          fi

          bytes="$(printf '%s' "$current" | wc -c | tr -d ' ')"
          if [ "$bytes" -lt 32 ]; then
            echo "ERROR: USER_ROUTE_STATE_SECRET contains ${bytes} bytes; at least 32 required." >&2
            exit 1
          fi

          docker compose config --quiet
          docker compose up -d --remove-orphans

          ready=0
          for attempt in $(seq 1 36); do
            if curl -fsS --max-time 5 http://localhost:8000/ready; then
              ready=1
              break
            fi
            sleep 5
          done

          if [ "$ready" != "1" ]; then
            docker compose ps -a
            docker compose logs --no-color --timestamps --tail=250 backend
            docker compose logs --no-color --timestamps --tail=250 frontend
            exit 1
          fi

          frontend_id="$(docker compose ps -q frontend)"
          test -n "$frontend_id"
          frontend_state="$(docker inspect -f '{{.State.Status}}' "$frontend_id")"
          if [ "$frontend_state" != "running" ]; then
            docker compose ps -a
            docker compose logs --no-color --timestamps --tail=250 frontend
            exit 1
          fi

          docker compose ps
          echo "Production backend and frontend restored."
          REMOTE
          ssh_status=${PIPESTATUS[0]}
          set -e
          if [ "$ssh_status" -ne 0 ]; then
            echo "Remote recovery failed with exit code ${ssh_status}." >&2
            exit "$ssh_status"
          fi

      - name: Verify public production edge
        env:
          PRODUCTION_BASE_URL: https://citygo.autismishe.online
        run: |
          set -euo pipefail
          base="${PRODUCTION_BASE_URL%/}"
          for attempt in $(seq 1 24); do
            root_status="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 "$base/" || true)"
            ready_status="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 "$base/api/ready" || true)"
            echo "attempt=${attempt} root=${root_status} ready=${ready_status}" | tee -a /tmp/city-go-recovery/public-edge.log
            if [ "$root_status" = "200" ] && [ "$ready_status" = "200" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: public production edge did not recover." >&2
          exit 1

      - name: Upload recovery diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-route-secret-recovery-log
          path: /tmp/city-go-recovery
          if-no-files-found: ignore
          retention-days: 7
