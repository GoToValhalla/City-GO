name: 01 · CITY GO · Production Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: Optional exact commit SHA to deploy. Leave empty to deploy the selected main ref.
        required: false
        type: string

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: production-deploy-${{ inputs.deploy_sha || github.sha }}
  cancel-in-progress: false

env:
  DEPLOY_TARGET_SHA: ${{ inputs.deploy_sha || github.sha }}
  DEPLOY_TARGET_REF: ${{ github.ref_name }}

jobs:
  resolve-and-gate:
    name: Resolve SHA and gate on CI validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    outputs:
      backend_image: ${{ steps.image-names.outputs.backend_image }}
      frontend_image: ${{ steps.image-names.outputs.frontend_image }}
      build_time: ${{ steps.build-metadata.outputs.build_time }}
    steps:
      - name: Checkout deploy target
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_TARGET_SHA }}

      - name: Verify full regression passed for deploy SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          STAGE_START=$(date +%s)
          SHA="${DEPLOY_TARGET_SHA}"
          WORKFLOW_ID="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml" --jq .id)"
          RUN_ID="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/${WORKFLOW_ID}/runs?branch=main&head_sha=${SHA}&status=completed&per_page=20" --jq '[.workflow_runs[] | select(.name == "00 · CITY GO · CI") | select(.conclusion == "success")] | .[0].id // empty')"
          if [ -z "$RUN_ID" ]; then
            echo "Deploy blocked: no successful full CI run for ${SHA} on main." >&2
            echo "Run '00 · CITY GO · CI' for this commit before production deploy." >&2
            exit 1
          fi
          echo "CI regression success confirmed for ${SHA} (run ${RUN_ID})"
          echo "CI_RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "timing_ci_check_seconds=$(( $(date +%s) - STAGE_START ))" >> "$GITHUB_ENV"

      - name: Download and verify CI validation manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          STAGE_START=$(date +%s)
          mkdir -p /tmp/ci-manifest
          if ! gh run download "$CI_RUN_ID" --name ci-validation-manifest --dir /tmp/ci-manifest --repo "$GITHUB_REPOSITORY"; then
            echo "ERROR: ci-validation-manifest artifact could not be downloaded for CI run ${CI_RUN_ID}." >&2
            echo "Deploy fails closed: an exact-SHA CI run without a validation manifest cannot be trusted." >&2
            exit 1
          fi
          MANIFEST_FILE="/tmp/ci-manifest/ci-validation-manifest.json"
          if [ ! -f "$MANIFEST_FILE" ]; then
            echo "ERROR: ci-validation-manifest.json missing from downloaded artifact." >&2
            exit 1
          fi
          python scripts/ci_validate_manifest.py verify \
            --manifest-file "$MANIFEST_FILE" \
            --expected-sha "${DEPLOY_TARGET_SHA}"
          cat "$MANIFEST_FILE"
          echo "timing_manifest_check_seconds=$(( $(date +%s) - STAGE_START ))" >> "$GITHUB_ENV"

      - name: Set image names
        id: image-names
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=ghcr.io/${OWNER}/city-go-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${OWNER}/city-go-frontend" >> "$GITHUB_OUTPUT"

      - name: Set build metadata
        id: build-metadata
        shell: bash
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Timing summary
        if: always()
        run: |
          {
            echo "### resolve-and-gate timing (seconds)"
            echo "- CI success check: ${timing_ci_check_seconds:-not separately measurable in the previous workflow}"
            echo "- CI validation manifest check: ${timing_manifest_check_seconds:-not separately measurable in the previous workflow}"
          } >> "$GITHUB_STEP_SUMMARY"

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: resolve-and-gate
    timeout-minutes: 20
    steps:
      - name: Checkout deploy target
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_TARGET_SHA }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: |
            ${{ needs.resolve-and-gate.outputs.backend_image }}:latest
            ${{ needs.resolve-and-gate.outputs.backend_image }}:${{ env.DEPLOY_TARGET_SHA }}
          build-args: |
            CITY_GO_BUILD_SHA=${{ env.DEPLOY_TARGET_SHA }}
            CITY_GO_BUILD_RUN_ID=${{ github.run_id }}
            CITY_GO_BUILD_RUN_NUMBER=${{ github.run_number }}
            CITY_GO_BUILD_TIME=${{ needs.resolve-and-gate.outputs.build_time }}
          cache-from: type=gha,scope=city-go-backend
          cache-to: type=gha,mode=max,scope=city-go-backend

      - name: Backend import smoke inside image
        shell: bash
        run: |
          set -euo pipefail
          STAGE_START=$(date +%s)
          mkdir -p /tmp/city-go-build-smoke
          set +e
          docker run --rm -i \
            -e DATABASE_URL='sqlite:///./ci_import_smoke.db' \
            -e ADMIN_API_TOKEN='ci-admin-token' \
            -e APP_ENV='test' \
            "${{ needs.resolve-and-gate.outputs.backend_image }}:latest" \
            python - <<'PY' > /tmp/city-go-build-smoke/backend-import-smoke.log 2>&1
          import importlib
          import traceback
          import sys

          modules = [
              'services.admin_platform_quality',
              'routers.admin_platform',
              'routers.place_verification',
              'core.router_setup',
              'main',
          ]
          for name in modules:
              try:
                  importlib.import_module(name)
                  print(f'import_ok {name}', flush=True)
              except Exception:
                  print(f'import_failed {name}', flush=True)
                  traceback.print_exc()
                  sys.exit(1)

          from core.router_setup import include_app_routers
          import main
          print('backend_image_import_smoke_ok', flush=True)
          print(main.app.title, flush=True)
          print(include_app_routers.__name__, flush=True)
          PY
          status=$?
          set -e
          cat /tmp/city-go-build-smoke/backend-import-smoke.log
          echo "timing_import_smoke_seconds=$(( $(date +%s) - STAGE_START ))" >> "$GITHUB_ENV"
          if [ "$status" -ne 0 ]; then
            echo "Backend import smoke failed with exit code $status" >&2
            exit "$status"
          fi

      - name: Upload backend import smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-import-smoke-log
          path: /tmp/city-go-build-smoke/backend-import-smoke.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Push backend image
        shell: bash
        run: |
          set -euo pipefail
          STAGE_START=$(date +%s)
          docker push "${{ needs.resolve-and-gate.outputs.backend_image }}:latest"
          docker push "${{ needs.resolve-and-gate.outputs.backend_image }}:${{ env.DEPLOY_TARGET_SHA }}"
          echo "timing_publish_seconds=$(( $(date +%s) - STAGE_START ))" >> "$GITHUB_ENV"

      - name: Timing summary
        if: always()
        run: |
          {
            echo "### build-backend timing (seconds)"
            echo "- import smoke: ${timing_import_smoke_seconds:-not separately measurable in the previous workflow}"
            echo "- publish: ${timing_publish_seconds:-not separately measurable in the previous workflow}"
          } >> "$GITHUB_STEP_SUMMARY"

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: resolve-and-gate
    timeout-minutes: 20
    steps:
      - name: Checkout deploy target
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_TARGET_SHA }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ needs.resolve-and-gate.outputs.frontend_image }}:latest
            ${{ needs.resolve-and-gate.outputs.frontend_image }}:${{ env.DEPLOY_TARGET_SHA }}
          build-args: |
            VITE_ADMIN_API_TOKEN=${{ secrets.ADMIN_API_TOKEN }}
            VITE_BUILD_SHA=${{ env.DEPLOY_TARGET_SHA }}
            VITE_BUILD_RUN_ID=${{ github.run_id }}
            VITE_BUILD_RUN_NUMBER=${{ github.run_number }}
            VITE_BUILD_TIME=${{ needs.resolve-and-gate.outputs.build_time }}
          cache-from: type=gha,scope=city-go-frontend
          cache-to: type=gha,mode=max,scope=city-go-frontend

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - resolve-and-gate
      - build-backend
      - build-frontend
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - name: Checkout deploy target
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_TARGET_SHA }}

      - name: Validate production secrets
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)
          test -n "$TELEGRAM_BOT_TOKEN" || (echo "TELEGRAM_BOT_TOKEN secret is missing" >&2; exit 1)
          test -n "$TELEGRAM_CHAT_ID" || (echo "TELEGRAM_CHAT_ID secret is missing" >&2; exit 1)

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh /tmp/city-go-deploy
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          KEYSCAN_LOG=/tmp/city-go-deploy/ssh-keyscan.log
          KEYSCAN_KEYS=/tmp/city-go-deploy/ssh-known-hosts
          KEYSCAN_OK=0
          for attempt in 1 2 3; do
            : > "$KEYSCAN_KEYS"
            if timeout 20s ssh-keyscan -T 8 -p "$SSH_PORT" "$SSH_HOST" > "$KEYSCAN_KEYS" 2>>"$KEYSCAN_LOG" \
              && test -s "$KEYSCAN_KEYS"; then
              cat "$KEYSCAN_KEYS" >> ~/.ssh/known_hosts
              KEYSCAN_OK=1
              echo "SSH host key preflight succeeded attempt=${attempt}"
              break
            fi
            echo "WARN: SSH host key preflight failed attempt=${attempt}/3"
            sleep "$attempt"
          done
          if [ "$KEYSCAN_OK" != "1" ]; then
            {
              echo "WARN: ssh-keyscan could not reach ${SSH_HOST}:${SSH_PORT} after 3 attempts."
              echo "The deployment will continue with StrictHostKeyChecking=accept-new so the SSH client reports the final connection error."
              cat "$KEYSCAN_LOG"
            } | tee /tmp/city-go-deploy/ssh-preflight-warning.log
          fi

      - name: Set image names
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/city-go-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/city-go-frontend" >> "$GITHUB_ENV"

      - name: Download images from GHCR on runner
        shell: bash
        run: |
          set -euo pipefail
          STAGE_START=$(date +%s)
          # Exact-SHA tags, not just mutable :latest — this is the artifact
          # actually deployed, verified by digest below before transport.
          docker pull "$BACKEND_IMAGE:${DEPLOY_TARGET_SHA}"
          docker pull "$FRONTEND_IMAGE:${DEPLOY_TARGET_SHA}"
          BACKEND_DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "$BACKEND_IMAGE:${DEPLOY_TARGET_SHA}")"
          FRONTEND_DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "$FRONTEND_IMAGE:${DEPLOY_TARGET_SHA}")"
          echo "Backend image digest: ${BACKEND_DIGEST}"
          echo "Frontend image digest: ${FRONTEND_DIGEST}"
          docker tag "$BACKEND_IMAGE:${DEPLOY_TARGET_SHA}" "$BACKEND_IMAGE:latest"
          docker tag "$FRONTEND_IMAGE:${DEPLOY_TARGET_SHA}" "$FRONTEND_IMAGE:latest"
          docker save "$BACKEND_IMAGE:latest" "$FRONTEND_IMAGE:latest" | gzip -1 > /tmp/city-go-images.tar.gz
          ARCHIVE_BYTES=$(stat -c%s /tmp/city-go-images.tar.gz 2>/dev/null || stat -f%z /tmp/city-go-images.tar.gz)
          echo "Archive size: ${ARCHIVE_BYTES} bytes ($(awk -v b="$ARCHIVE_BYTES" 'BEGIN { printf "%.2f", b/1048576 }') MiB)"
          echo "archive_size_bytes=${ARCHIVE_BYTES}" >> "$GITHUB_ENV"
          echo "archive_size_mib=$(awk -v b="$ARCHIVE_BYTES" 'BEGIN { printf "%.2f", b/1048576 }')" >> "$GITHUB_ENV"
          echo "timing_download_save_seconds=$(( $(date +%s) - STAGE_START ))" >> "$GITHUB_ENV"

      - name: Copy compose file to server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          scp -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            docker-compose.yml "$SSH_USER@$SSH_HOST:/tmp/city-go-docker-compose.yml"

      - name: Copy images archive to server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          STAGE_START=$(date +%s)
          scp -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            /tmp/city-go-images.tar.gz "$SSH_USER@$SSH_HOST:/tmp/city-go-images.tar.gz"
          echo "timing_transfer_seconds=$(( $(date +%s) - STAGE_START ))" >> "$GITHUB_ENV"

      - name: Deploy on server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_SHA: ${{ env.DEPLOY_TARGET_SHA }}
        run: |
          set -euo pipefail
          STAGE_START=$(date +%s)
          mkdir -p /tmp/city-go-deploy
          DEPLOY_LOG=/tmp/city-go-deploy/deploy-on-server.log

          # Root cause of the previous truthfulness bug: `ssh ... "cmd" | tee
          # "$LOG" <<'REMOTE' ... REMOTE` attaches the heredoc to `tee` (the
          # LAST command in the pipeline), not to `ssh` (the first) — bash
          # binds a heredoc to the command that immediately precedes the
          # `<<` token reading order, which in a pipeline is the final
          # command. `tee` would receive the remote script body as ITS OWN
          # stdin and just echo/log that literal script text, while `ssh`
          # got no stdin for `bash -s` at all. The step could then exit 0
          # while deploy-on-server.log contained the script source, not real
          # execution output. Fix: write the remote script to a real file
          # first, then run `ssh ... < "$SCRIPT_FILE" | tee "$DEPLOY_LOG"` —
          # now the heredoc (writing the temp file) is a fully separate
          # statement from the pipeline, so `ssh` unambiguously reads the
          # script from that file and `tee` only ever sees ssh's real
          # stdout/stderr.
          REMOTE_SCRIPT=$(mktemp /tmp/city-go-deploy-remote.XXXXXX.sh)
          cat > "$REMOTE_SCRIPT" <<'REMOTE'
          set -euo pipefail
          cd /srv/app

          echo "=== Refresh docker-compose.yml from deployed artifact ==="
          install -m 0644 /tmp/city-go-docker-compose.yml /srv/app/docker-compose.yml
          docker compose config --quiet

          echo "=== Ensure TELEGRAM_MINI_APP_URL in production .env ==="
          DEFAULT_MINI_APP_URL="https://citygo.autismishe.online/telegram"
          touch /srv/app/.env
          CURRENT_MINI_APP_URL="$(grep -E '^TELEGRAM_MINI_APP_URL=' /srv/app/.env 2>/dev/null | tail -n1 | cut -d= -f2- || true)"
          if [[ "${CURRENT_MINI_APP_URL}" != https://* ]]; then
            echo "TELEGRAM_MINI_APP_URL missing or invalid in /srv/app/.env — writing default: ${DEFAULT_MINI_APP_URL}"
            sed -i '/^TELEGRAM_MINI_APP_URL=/d' /srv/app/.env
            echo "TELEGRAM_MINI_APP_URL=${DEFAULT_MINI_APP_URL}" >> /srv/app/.env
          fi

          echo "=== Validate TELEGRAM_MINI_APP_URL in production .env ==="
          MINI_APP_URL="$(grep -E '^TELEGRAM_MINI_APP_URL=' /srv/app/.env 2>/dev/null | tail -n1 | cut -d= -f2- || true)"
          if [[ "${MINI_APP_URL}" != https://* ]]; then
            echo "ERROR: TELEGRAM_MINI_APP_URL in /srv/app/.env is missing or invalid (must start with https://)." >&2
            echo "The Telegram bot will refuse to start until this is fixed. Set it before deploying again." >&2
            exit 1
          fi

          echo "=== Recording rollback metadata (previous deployed SHA/images) ==="
          PREVIOUS_SHA="$(cat /srv/app/.last_deployed_sha 2>/dev/null || echo unknown)"
          echo "Previous deployed SHA: ${PREVIOUS_SHA}"
          echo "Attempted SHA: ${DEPLOY_SHA}"

          # Truthful rollback tagging: before the new archive overwrites the
          # `:latest` tags, explicitly re-tag whatever `:latest` currently
          # resolves to as `:rollback` — a name that always means "the last
          # image confirmed running before this deploy attempt", independent
          # of whether the previous deploy's own SHA tag was later pruned.
          # If there is no current `:latest` (first deploy ever), this is a
          # no-op, logged as such rather than silently swallowed.
          for REPO in "$BACKEND_IMAGE" "$FRONTEND_IMAGE"; do
            if docker image inspect "${REPO}:latest" >/dev/null 2>&1; then
              docker tag "${REPO}:latest" "${REPO}:rollback"
              echo "Tagged ${REPO}:latest as ${REPO}:rollback (pre-deploy known-good)."
            else
              echo "No existing ${REPO}:latest to tag as rollback (first deploy on this host)."
            fi
          done

          echo "=== docker load (bounded) — load new images BEFORE touching running containers ==="
          set +e
          timeout 300s docker load -i /tmp/city-go-images.tar.gz
          LOAD_STATUS=$?
          set -e
          if [ "$LOAD_STATUS" -ne 0 ]; then
            echo "ERROR: docker load timed out or failed (exit code ${LOAD_STATUS})" >&2
            echo "Running containers were NOT touched — production is still serving the previous image." >&2
            echo "=== Production disk at failure ===" >&2
            df -h / >&2 || true
            docker system df >&2 || true
            exit "$LOAD_STATUS"
          fi

          echo "=== Stop and remove app containers now that new images are already loaded locally ==="
          # Loading first (above) means this stop/rm window is only as long
          # as `docker compose up` itself needs, not load+up combined — the
          # previous ordering stopped containers, THEN spent the docker-load
          # window with the app already down, adding unnecessary downtime.
          docker compose stop frontend backend import-worker bot || true
          docker compose rm -f frontend backend import-worker bot migrate seed address-backfill place-enrichment-export || true

          echo "=== Safe cleanup before compose up (dangling data only; tagged images incl. :rollback are preserved) ==="
          docker container prune -f || true
          docker builder prune -f || true
          # Deliberately does NOT match /tmp/city-go-deploy-remote.sh — that
          # is THIS running script; deleting it mid-execution would depend
          # on relying on POSIX unlink-of-an-open-file semantics rather than
          # a guarantee, for no benefit (the caller already removes it via
          # `rm -f /tmp/city-go-deploy-remote.sh` right after this SSH
          # session exits, whether it succeeds or fails).
          rm -rf /tmp/city-go-build-* || true

          echo "=== docker compose up (bounded) ==="
          set +e
          timeout 180s docker compose up -d --remove-orphans
          UP_STATUS=$?
          set -e
          if [ "$UP_STATUS" -ne 0 ]; then
            echo "ERROR: docker compose up timed out or failed (exit code ${UP_STATUS})" >&2
            echo "=== Production disk at failure ===" >&2
            df -h / >&2 || true
            docker system df >&2 || true
            echo "=== docker compose ps -a ===" >&2
            docker compose ps -a >&2 || true
            echo "=== migrate container: state and exit code (docker inspect) ===" >&2
            docker inspect app-migrate-1 --format 'State: {{.State.Status}} ExitCode: {{.State.ExitCode}} Error: {{.State.Error}} StartedAt: {{.State.StartedAt}} FinishedAt: {{.State.FinishedAt}}' >&2 || true
            echo "=== full migrate container logs ===" >&2
            docker compose logs --no-color --timestamps migrate >&2 || true
            echo "=== current alembic revision (best-effort, read-only, may be unreachable if migrate never connected) ===" >&2
            timeout 15s docker compose exec -T db psql -U postgres -d city_guide -tA -c "SELECT version_num FROM alembic_version;" >&2 || echo "(could not read alembic_version — table may not exist yet, or db exec failed)" >&2
            exit "$UP_STATUS"
          fi

          echo "=== Docker compose status after deploy up ==="
          docker compose ps

          rm -f /tmp/city-go-images.tar.gz /tmp/city-go-docker-compose.yml || true

          # .last_deployed_sha is deliberately NOT written here anymore.
          # Root cause of the previous bug: this line ran right after
          # `docker compose up` reported containers as started, before the
          # separate "Verify build.json" and "Verify backend ready" steps
          # ran — so a deploy that started containers but never actually
          # became ready/serving the right build would still record itself
          # as the last known-good SHA, corrupting the rollback baseline for
          # every subsequent failure. It is now written by the dedicated
          # "Record verified deployed SHA" step, which only runs after both
          # verification steps have succeeded.
          REMOTE
          chmod 600 "$REMOTE_SCRIPT"
          scp -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            "$REMOTE_SCRIPT" "$SSH_USER@$SSH_HOST:/tmp/city-go-deploy-remote.sh"
          rm -f "$REMOTE_SCRIPT"

          set +e
          ssh -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_SHA='${DEPLOY_SHA}' BACKEND_IMAGE='${BACKEND_IMAGE}' FRONTEND_IMAGE='${FRONTEND_IMAGE}' bash /tmp/city-go-deploy-remote.sh; rc=\$?; rm -f /tmp/city-go-deploy-remote.sh; exit \$rc" \
            2>&1 | tee "$DEPLOY_LOG"
          SSH_EXIT=${PIPESTATUS[0]}
          set -e
          echo "timing_remote_deploy_seconds=$(( $(date +%s) - STAGE_START ))" >> "$GITHUB_ENV"
          if [ "$SSH_EXIT" -ne 0 ]; then
            echo "ERROR: remote deploy script failed with real exit code ${SSH_EXIT}." >&2
            exit "$SSH_EXIT"
          fi

      - name: Verify build.json
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          CITY_GO_BUILD_SHA: ${{ env.DEPLOY_TARGET_SHA }}
        run: |
          set -euo pipefail
          STAGE_START=$(date +%s)
          mkdir -p /tmp/city-go-deploy
          VERIFY_LOG=/tmp/city-go-deploy/verify-build-json.log
          expected="${CITY_GO_BUILD_SHA}"
          echo "Expected build sha (full): ${expected}"

          # Root cause of the previous weak check: a single curl attempt with
          # no retry treated one transient hiccup right after container
          # startup as a hard deploy failure; comparing only the first 7
          # characters of the SHA meant two different commits sharing a
          # short-SHA prefix (rare but possible on a busy repo) would falsely
          # verify; and there was no explicit HTTP-status gate before trying
          # to parse the body as JSON, so a non-200 response (e.g. a 502 from
          # a not-yet-ready reverse proxy) produced a confusing "failed to
          # parse JSON" message instead of a clear "server returned 502".
          # The retry loop runs ON THE REMOTE HOST (curl --resolve targets
          # 127.0.0.1, i.e. this must execute where the app's reverse proxy
          # actually listens), so it is one SSH session with a real bash
          # retry loop, not ten separate SSH connections.
          REMOTE_SCRIPT=$(mktemp /tmp/city-go-deploy-verify.XXXXXX.sh)
          cat > "$REMOTE_SCRIPT" <<'REMOTE'
          set -uo pipefail
          ok=0
          for attempt in $(seq 1 10); do
            echo "--- attempt ${attempt}/10 ---"
            status="$(curl -sS --max-time 10 -o /tmp/build.json -w '%{http_code}' \
              --resolve citygo.autismishe.online:443:127.0.0.1 \
              https://citygo.autismishe.online/build.json 2>&1)"
            curl_exit=$?
            echo "HTTP status: ${status} (curl exit ${curl_exit})"

            if [ "$curl_exit" -ne 0 ] || [ "$status" != "200" ]; then
              echo "Non-200 response or transport error, will retry if attempts remain."
              head -c 500 /tmp/build.json 2>/dev/null || true
              echo
              sleep 3
              continue
            fi

            if ! python3 -c 'import json; json.load(open("/tmp/build.json"))' 2>/tmp/build_json_parse_error.txt; then
              echo "HTTP 200 but body is not valid JSON:"
              cat /tmp/build_json_parse_error.txt
              echo "Body (first 500 bytes):"
              head -c 500 /tmp/build.json
              echo
              sleep 3
              continue
            fi

            actual="$(python3 -c 'import json; print(json.load(open("/tmp/build.json")).get("sha", ""))')"
            echo "Actual sha (full): ${actual}"

            if [ -z "$actual" ]; then
              echo "build.json parsed but has no non-empty \"sha\" field."
              cat /tmp/build.json
              sleep 3
              continue
            fi

            if [ "$actual" != "$EXPECTED_SHA" ]; then
              echo "Deployed build sha does not match expected sha (full-SHA comparison)."
              echo "  expected: ${EXPECTED_SHA}"
              echo "  actual:   ${actual}"
              sleep 3
              continue
            fi

            echo "build.json sha matches expected sha exactly."
            ok=1
            break
          done

          if [ "$ok" != "1" ]; then
            echo "ERROR: build.json did not confirm the expected SHA after 10 attempts (~30s)." >&2
            exit 1
          fi
          REMOTE
          chmod 600 "$REMOTE_SCRIPT"
          scp -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            "$REMOTE_SCRIPT" "$SSH_USER@$SSH_HOST:/tmp/city-go-deploy-verify.sh"
          rm -f "$REMOTE_SCRIPT"

          set +e
          ssh -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "EXPECTED_SHA='${expected}' bash /tmp/city-go-deploy-verify.sh; rc=\$?; rm -f /tmp/city-go-deploy-verify.sh; exit \$rc" \
            2>&1 | tee "$VERIFY_LOG"
          VERIFY_EXIT=${PIPESTATUS[0]}
          set -e
          echo "timing_build_json_verify_seconds=$(( $(date +%s) - STAGE_START ))" >> "$GITHUB_ENV"
          if [ "$VERIFY_EXIT" -ne 0 ]; then
            echo "ERROR: build.json verification failed with exit code ${VERIFY_EXIT}." >&2
            exit "$VERIFY_EXIT"
          fi

      - name: Verify backend ready and final invariants
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_SHA: ${{ env.DEPLOY_TARGET_SHA }}
        run: |
          set -euo pipefail
          STAGE_START=$(date +%s)
          mkdir -p /tmp/city-go-deploy
          READY_LOG=/tmp/city-go-deploy/verify-backend-ready.log
          REMOTE_SCRIPT=$(mktemp /tmp/city-go-deploy-ready.XXXXXX.sh)
          cat > "$REMOTE_SCRIPT" <<'REMOTE'
          set -euo pipefail
          cd /srv/app

          show_logs() {
            service="$1"
            lines="$2"
            echo "=== docker compose logs --tail=${lines} ${service} ==="
            docker compose logs --tail="${lines}" "${service}" || true
          }

          echo "=== Waiting for backend /ready ==="
          ready=0
          for attempt in $(seq 1 36); do
            if curl -fsS --max-time 5 http://localhost:8000/ready; then
              echo
              echo "Backend ready check passed on attempt ${attempt}/36."
              ready=1
              break
            fi
            echo "Backend is not ready yet attempt=${attempt}/36; retrying in 5 seconds..."
            sleep 5
          done

          if [ "$ready" != "1" ]; then
            echo "ERROR: backend /ready did not pass within 180 seconds." >&2
            echo "Attempted SHA: ${DEPLOY_SHA}"
            echo "Previous deployed SHA: $(cat /srv/app/.last_deployed_sha 2>/dev/null || echo unknown)"
            echo "=== docker compose ps ==="
            docker compose ps || true
            echo "=== Disk free ==="
            df -h / || true
            echo "=== Docker image list summary ==="
            docker images --format 'table {{.Repository}}\t{{.Tag}}\t{{.CreatedSince}}\t{{.Size}}' | head -20 || true
            show_logs backend 250
            show_logs migrate 200
            show_logs db 150
            show_logs import-worker 150
            show_logs bot 100
            exit 1
          fi

          # Single, final post-readiness invariant check: import-worker must
          # not be running. Enforced once here rather than repeatedly at every
          # deploy step — if it is unexpectedly running, stop it, collect
          # bounded evidence, and fail the deploy truthfully.
          echo "=== Final invariant: import-worker must not be running ==="
          WORKER_ID="$(docker compose ps -aq import-worker | head -n 1 || true)"
          WORKER_STATE="not_created"
          if [ -n "$WORKER_ID" ]; then
            WORKER_STATE="$(docker inspect -f '{{.State.Status}}' "$WORKER_ID" 2>/dev/null || echo unknown)"
          fi
          if [ "$WORKER_STATE" = "running" ]; then
            echo "ERROR: import-worker is running after deploy; stopping it now and failing deploy." >&2
            docker compose stop import-worker || true
            docker compose ps import-worker || true
            show_logs import-worker 150
            exit 1
          fi
          echo "import-worker invariant holds; state=${WORKER_STATE}."

          echo "=== Final application state ==="
          docker compose ps
          echo "=== Concise disk summary ==="
          df -h / | tail -n 1
          REMOTE
          chmod 600 "$REMOTE_SCRIPT"
          scp -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            "$REMOTE_SCRIPT" "$SSH_USER@$SSH_HOST:/tmp/city-go-deploy-ready.sh"
          rm -f "$REMOTE_SCRIPT"

          set +e
          ssh -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_SHA='${DEPLOY_SHA}' bash /tmp/city-go-deploy-ready.sh; rc=\$?; rm -f /tmp/city-go-deploy-ready.sh; exit \$rc" \
            2>&1 | tee "$READY_LOG"
          READY_EXIT=${PIPESTATUS[0]}
          set -e
          echo "timing_readiness_seconds=$(( $(date +%s) - STAGE_START ))" >> "$GITHUB_ENV"
          if [ "$READY_EXIT" -ne 0 ]; then
            echo "ERROR: backend readiness/invariant check failed with exit code ${READY_EXIT}." >&2
            exit "$READY_EXIT"
          fi

      - name: Record verified deployed SHA
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_SHA: ${{ env.DEPLOY_TARGET_SHA }}
        run: |
          set -euo pipefail
          # Only reached after "Verify build.json" (confirms the deployed
          # build actually serves this exact SHA) and "Verify backend ready
          # and final invariants" (confirms it is actually healthy) have
          # both succeeded. .last_deployed_sha is the rollback baseline that
          # "Deploy on server" reads as PREVIOUS_SHA on the next attempt, so
          # writing it any earlier — as the previous version of this
          # workflow did, immediately after `docker compose up` returned —
          # let an unverified/unhealthy deploy poison that baseline.
          ssh -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_SHA='${DEPLOY_SHA}' bash -s" <<'REMOTE'
          set -euo pipefail
          echo "${DEPLOY_SHA}" > /srv/app/.last_deployed_sha
          echo "Recorded verified deployed SHA: ${DEPLOY_SHA}"
          REMOTE

      - name: Cleanup old images after confirmed healthy deploy
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          # Only reached after "Verify build.json" and "Verify backend ready"
          # both succeeded, so the new image is confirmed running and
          # healthy. Safe to prune older unused images now — the previous
          # deployed image is no longer needed for an emergency rollback via
          # `docker compose up` on a prior tag, since this deploy is already
          # verified good.
          ssh -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" <<'REMOTE'
          set -euo pipefail
          cd /srv/app
          docker image prune -af || true
          docker builder prune -af || true
          echo "=== Concise disk summary after cleanup ==="
          df -h / | tail -n 1
          REMOTE

      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-log
          path: /tmp/city-go-deploy
          if-no-files-found: ignore
          retention-days: 7

      - name: Timing summary
        if: always()
        run: |
          {
            echo "### deploy timing (seconds)"
            echo "- image download/save/compress: ${timing_download_save_seconds:-not separately measurable in the previous workflow}"
            echo "- image transfer (scp): ${timing_transfer_seconds:-not separately measurable in the previous workflow}"
            echo "- archive size: ${archive_size_bytes:-unknown} bytes (${archive_size_mib:-unknown} MiB)"
            echo "- remote load + compose up: ${timing_remote_deploy_seconds:-not separately measurable in the previous workflow}"
            echo "- build.json verify: ${timing_build_json_verify_seconds:-not separately measurable in the previous workflow}"
            echo "- readiness + final invariants: ${timing_readiness_seconds:-not separately measurable in the previous workflow}"
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Notify deploy result
    runs-on: ubuntu-latest
    needs:
      - resolve-and-gate
      - build-backend
      - build-frontend
      - deploy
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout notification helper
        uses: actions/checkout@v4

      - name: Download deploy log
        uses: actions/download-artifact@v4
        with:
          name: production-deploy-log
          path: /tmp/deploy-log
        continue-on-error: true

      - name: Build deploy notification
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build-backend.result == 'success' && needs.build-frontend.result == 'success' && 'success' || 'failure' }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          CITY_GO_DEPLOY_SHA: ${{ env.DEPLOY_TARGET_SHA }}
          CITY_GO_DEPLOY_REF: ${{ env.DEPLOY_TARGET_REF }}
        run: |
          set -euo pipefail
          python scripts/build_deploy_notification.py \
            --build-result "$BUILD_RESULT" \
            --deploy-result "$DEPLOY_RESULT" \
            --run-attempt "$RUN_ATTEMPT" \
            --output /tmp/deploy-notification.txt

      - name: Send Telegram deploy notification
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_telegram_notification.py --text-file /tmp/deploy-notification.txt
