name: Production Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build production images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/city-go-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/city-go-frontend" >> "$GITHUB_ENV"

      - name: Set build metadata
        shell: bash
        run: |
          echo "CITY_GO_BUILD_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_RUN_ID=${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_RUN_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --build-arg CITY_GO_BUILD_SHA="$CITY_GO_BUILD_SHA" \
            --build-arg CITY_GO_BUILD_RUN_ID="$CITY_GO_BUILD_RUN_ID" \
            --build-arg CITY_GO_BUILD_RUN_NUMBER="$CITY_GO_BUILD_RUN_NUMBER" \
            --build-arg CITY_GO_BUILD_TIME="$CITY_GO_BUILD_TIME" \
            -t "$BACKEND_IMAGE:latest" .

      - name: Backend import smoke inside image
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -i \
            -e DATABASE_URL='sqlite:///./ci_import_smoke.db' \
            -e ADMIN_API_TOKEN='ci-admin-token' \
            -e APP_ENV='test' \
            "$BACKEND_IMAGE:latest" \
            python - <<'PY'
          import main
          from core.router_setup import include_app_routers
          print('backend_image_import_smoke_ok')
          print(main.app.title)
          print(include_app_routers.__name__)
          PY

      - name: Push backend image
        shell: bash
        run: |
          set -euo pipefail
          docker push "$BACKEND_IMAGE:latest"

      - name: Build and push frontend image
        shell: bash
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          docker build \
            --build-arg VITE_ADMIN_API_TOKEN="$ADMIN_API_TOKEN" \
            --build-arg VITE_BUILD_SHA="$CITY_GO_BUILD_SHA" \
            --build-arg VITE_BUILD_RUN_ID="$CITY_GO_BUILD_RUN_ID" \
            --build-arg VITE_BUILD_RUN_NUMBER="$CITY_GO_BUILD_RUN_NUMBER" \
            --build-arg VITE_BUILD_TIME="$CITY_GO_BUILD_TIME" \
            -t "$FRONTEND_IMAGE:latest" \
            ./frontend
          docker push "$FRONTEND_IMAGE:latest"

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production secrets
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || 22 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EXPECTED_FRONTEND_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          REMOTE_GH_TOKEN=$(printf '%q' "$GH_TOKEN")
          REMOTE_GH_ACTOR=$(printf '%q' "$GH_ACTOR")
          REMOTE_GH_REPO=$(printf '%q' "$GH_REPO")
          REMOTE_ADMIN_API_TOKEN=$(printf '%q' "${ADMIN_API_TOKEN:-}")
          REMOTE_TELEGRAM_BOT_TOKEN=$(printf '%q' "${TELEGRAM_BOT_TOKEN:-}")
          REMOTE_TELEGRAM_CHAT_ID=$(printf '%q' "${TELEGRAM_CHAT_ID:-}")
          REMOTE_EXPECTED_FRONTEND_SHA=$(printf '%q' "$EXPECTED_FRONTEND_SHA")

          ssh \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            -i ~/.ssh/deploy_key \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "GH_TOKEN=$REMOTE_GH_TOKEN GH_ACTOR=$REMOTE_GH_ACTOR GH_REPO=$REMOTE_GH_REPO ADMIN_API_TOKEN=$REMOTE_ADMIN_API_TOKEN TELEGRAM_BOT_TOKEN=$REMOTE_TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID=$REMOTE_TELEGRAM_CHAT_ID EXPECTED_FRONTEND_SHA=$REMOTE_EXPECTED_FRONTEND_SHA bash -seu -o pipefail" \
            < scripts/deploy_production_remote.sh

  notify:
    name: Notify deploy result
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    if: always()
    steps:
      - name: Telegram deploy notification
        continue-on-error: true
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram deploy notification skipped: missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID."
            exit 0
          fi
          STATUS="✅ City GO: deploy ok"
          if [ "$BUILD_RESULT" != "success" ] || [ "$DEPLOY_RESULT" != "success" ]; then
            STATUS="❌ City GO: deploy failed"
          fi
          TEXT="${STATUS}%0ARepo: ${{ github.repository }}%0ARun: ${{ github.run_number }}%0ABuild: ${BUILD_RESULT}%0ADeploy: ${DEPLOY_RESULT}%0ASHA: ${{ github.sha }}"
          curl -fsS --retry 3 --retry-delay 2 \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${TEXT}"
