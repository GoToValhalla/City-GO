name: Production Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build production images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/city-go-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/city-go-frontend" >> "$GITHUB_ENV"

      - name: Set build metadata
        shell: bash
        run: |
          echo "CITY_GO_BUILD_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_RUN_ID=${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_RUN_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --build-arg CITY_GO_BUILD_SHA="$CITY_GO_BUILD_SHA" \
            --build-arg CITY_GO_BUILD_RUN_ID="$CITY_GO_BUILD_RUN_ID" \
            --build-arg CITY_GO_BUILD_RUN_NUMBER="$CITY_GO_BUILD_RUN_NUMBER" \
            --build-arg CITY_GO_BUILD_TIME="$CITY_GO_BUILD_TIME" \
            -t "$BACKEND_IMAGE:latest" .

      - name: Backend import smoke inside image
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -i \
            -e DATABASE_URL='sqlite:///./ci_import_smoke.db' \
            -e ADMIN_API_TOKEN='ci-admin-token' \
            -e APP_ENV='test' \
            "$BACKEND_IMAGE:latest" \
            python - <<'PY'
          import main
          from core.router_setup import include_app_routers
          print('backend_image_import_smoke_ok')
          print(main.app.title)
          print(include_app_routers.__name__)
          PY

      - name: Push backend image
        shell: bash
        run: |
          set -euo pipefail
          docker push "$BACKEND_IMAGE:latest"

      - name: Build and push frontend image
        shell: bash
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          docker build \
            --build-arg VITE_ADMIN_API_TOKEN="$ADMIN_API_TOKEN" \
            --build-arg VITE_BUILD_SHA="$CITY_GO_BUILD_SHA" \
            --build-arg VITE_BUILD_RUN_ID="$CITY_GO_BUILD_RUN_ID" \
            --build-arg VITE_BUILD_RUN_NUMBER="$CITY_GO_BUILD_RUN_NUMBER" \
            --build-arg VITE_BUILD_TIME="$CITY_GO_BUILD_TIME" \
            -t "$FRONTEND_IMAGE:latest" \
            ./frontend
          docker push "$FRONTEND_IMAGE:latest"

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production secrets
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)
          test -n "$TELEGRAM_BOT_TOKEN" || (echo "TELEGRAM_BOT_TOKEN secret is missing" >&2; exit 1)
          test -n "$TELEGRAM_CHAT_ID" || (echo "TELEGRAM_CHAT_ID secret is missing" >&2; exit 1)

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh /tmp/city-go-deploy
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Key scanning is a best-effort preflight. GitHub-hosted runners can
          # lose a short TCP race here even when SSH itself can still connect.
          KEYSCAN_LOG=/tmp/city-go-deploy/ssh-keyscan.log
          KEYSCAN_KEYS=/tmp/city-go-deploy/ssh-known-hosts
          KEYSCAN_OK=0
          for attempt in 1 2 3; do
            : > "$KEYSCAN_KEYS"
            if timeout 20s ssh-keyscan -T 8 -p "$SSH_PORT" "$SSH_HOST" > "$KEYSCAN_KEYS" 2>>"$KEYSCAN_LOG" \
              && test -s "$KEYSCAN_KEYS"; then
              cat "$KEYSCAN_KEYS" >> ~/.ssh/known_hosts
              KEYSCAN_OK=1
              echo "SSH host key preflight succeeded attempt=${attempt}"
              break
            fi
            echo "WARN: SSH host key preflight failed attempt=${attempt}/3"
            sleep "$attempt"
          done
          if [ "$KEYSCAN_OK" != "1" ]; then
            {
              echo "WARN: ssh-keyscan could not reach ${SSH_HOST}:${SSH_PORT} after 3 attempts."
              echo "The deployment will continue with StrictHostKeyChecking=accept-new so the SSH client reports the final connection error."
              cat "$KEYSCAN_LOG"
            } | tee /tmp/city-go-deploy/ssh-preflight-warning.log
          fi

      - name: Deploy
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || 22 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EXPECTED_FRONTEND_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/city-go-deploy
          REMOTE_GH_TOKEN=$(printf '%q' "$GH_TOKEN")
          REMOTE_GH_ACTOR=$(printf '%q' "$GH_ACTOR")
          REMOTE_GH_REPO=$(printf '%q' "$GH_REPO")
          REMOTE_ADMIN_API_TOKEN=$(printf '%q' "${ADMIN_API_TOKEN:-}")
          REMOTE_TELEGRAM_BOT_TOKEN=$(printf '%q' "${TELEGRAM_BOT_TOKEN:-}")
          REMOTE_TELEGRAM_CHAT_ID=$(printf '%q' "${TELEGRAM_CHAT_ID:-}")
          REMOTE_EXPECTED_FRONTEND_SHA=$(printf '%q' "$EXPECTED_FRONTEND_SHA")

          set +e
          ssh \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -i ~/.ssh/deploy_key \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "GH_TOKEN=$REMOTE_GH_TOKEN GH_ACTOR=$REMOTE_GH_ACTOR GH_REPO=$REMOTE_GH_REPO ADMIN_API_TOKEN=$REMOTE_ADMIN_API_TOKEN TELEGRAM_BOT_TOKEN=$REMOTE_TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID=$REMOTE_TELEGRAM_CHAT_ID EXPECTED_FRONTEND_SHA=$REMOTE_EXPECTED_FRONTEND_SHA bash -seu -o pipefail" \
            < scripts/deploy_production_remote.sh 2>&1 | tee /tmp/city-go-deploy/production-deploy.log
          DEPLOY_EXIT=${PIPESTATUS[0]}
          set -e
          exit "$DEPLOY_EXIT"

      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-log
          path: /tmp/city-go-deploy/
          if-no-files-found: ignore
          retention-days: 7

  notify:
    name: Notify deploy result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - build
      - deploy
    if: always()
    steps:
      - name: Checkout notification helper
        uses: actions/checkout@v4

      - name: Download deploy log
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: production-deploy-log
          path: /tmp/deploy-log
        continue-on-error: true

      - name: Build deploy notification
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail
          DEPLOY_LOG_TAIL=""
          for diagnostic in \
            /tmp/deploy-log/production-deploy.log \
            /tmp/deploy-log/ssh-preflight-warning.log \
            /tmp/deploy-log/ssh-keyscan.log; do
            if [ -f "$diagnostic" ]; then
              DEPLOY_LOG_TAIL="$(tail -n 55 "$diagnostic")"
              break
            fi
          done

          if [ "$BUILD_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            cat > /tmp/deploy-notification.txt <<EOF
          ✅ CITY GO · PRODUCTION DEPLOY
          Статус: прод обновлён
          Прогон: #${{ github.run_number }} · попытка ${{ github.run_attempt }}
          Commit: ${GITHUB_SHA:0:7}
          Сборка образов: ✅ success
          Деплой на сервер: ✅ success
          Проверить: /build.json должен содержать ${GITHUB_SHA:0:7}
          GitHub Actions: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          elif [ "$BUILD_RESULT" != "success" ]; then
            cat > /tmp/deploy-notification.txt <<EOF
          ❌ CITY GO · PRODUCTION DEPLOY
          Статус: прод не обновлён
          Прогон: #${{ github.run_number }} · попытка ${{ github.run_attempt }}
          Commit: ${GITHUB_SHA:0:7}
          Сломанный этап: сборка production-образов
          Сборка образов: ❌ ${BUILD_RESULT}
          Деплой на сервер: ⏭ ${DEPLOY_RESULT}
          Вероятная зона: Docker build, backend image smoke, frontend TypeScript/Vite build или push в GHCR.
          Что делать: открыть job "Build production images" и смотреть первый красный step.
          GitHub Actions: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          else
            cat > /tmp/deploy-notification.txt <<EOF
          ❌ CITY GO · PRODUCTION DEPLOY
          Статус: prod image собран, но сервер не обновлён
          Прогон: #${{ github.run_number }} · попытка ${{ github.run_attempt }}
          Commit: ${GITHUB_SHA:0:7}
          Сломанный этап: деплой на production-сервер
          Сборка образов: ✅ ${BUILD_RESULT}
          Деплой на сервер: ❌ ${DEPLOY_RESULT}
          Вероятная зона: SSH, docker compose pull/up, PostgreSQL readiness, миграции, schema guard, frontend SHA gate или background services.
          GitHub Actions: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
            if [ -n "$DEPLOY_LOG_TAIL" ]; then
              cat >> /tmp/deploy-notification.txt <<EOF

          Последние строки deploy:
          ${DEPLOY_LOG_TAIL}
          EOF
            else
              cat >> /tmp/deploy-notification.txt <<EOF

          Последние строки deploy: лог не найден в artifact production-deploy-log.
          EOF
            fi
          fi
          sed -i 's/^          //' /tmp/deploy-notification.txt

      - name: Send Telegram deploy notification
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_telegram_notification.py --text-file /tmp/deploy-notification.txt
