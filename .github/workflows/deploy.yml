name: Deploy

on:
  workflow_dispatch:
    inputs:
      app_dir:
        description: "Production app directory"
        required: false
        default: "/srv/app"
      branch:
        description: "Branch/ref to deploy"
        required: false
        default: "main"
      run_migrations:
        description: "Run alembic migrations"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      rebuild:
        description: "Rebuild docker images on server"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      prune_images:
        description: "Run docker image prune after deploy"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy production over SSH
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST" || (echo "DEPLOY_HOST secret is missing" >&2; exit 1)
          test -n "$DEPLOY_USER" || (echo "DEPLOY_USER secret is missing" >&2; exit 1)
          test -n "$DEPLOY_SSH_KEY" || (echo "DEPLOY_SSH_KEY secret is missing" >&2; exit 1)

      - name: Prepare SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          APP_DIR: ${{ inputs.app_dir }}
          DEPLOY_REF: ${{ inputs.branch }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
          REBUILD: ${{ inputs.rebuild }}
          PRUNE_IMAGES: ${{ inputs.prune_images }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$APP_DIR' DEPLOY_REF='$DEPLOY_REF' RUN_MIGRATIONS='$RUN_MIGRATIONS' REBUILD='$REBUILD' PRUNE_IMAGES='$PRUNE_IMAGES' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"

          echo "=== server before ==="
          pwd
          git rev-parse HEAD || true
          git status --short || true

          echo "=== fetch/reset ==="
          git fetch origin "$DEPLOY_REF"
          git reset --hard "origin/$DEPLOY_REF"
          git clean -fd
          git rev-parse HEAD
          git log --oneline -3

          echo "=== docker compose config ==="
          docker compose config --services

          if [ "$REBUILD" = "true" ]; then
            echo "=== build backend/frontend ==="
            docker compose build backend frontend
          fi

          if [ "$RUN_MIGRATIONS" = "true" ]; then
            echo "=== migrations ==="
            docker compose up --build --abort-on-container-exit --exit-code-from migrate migrate
            docker compose logs --tail=120 migrate || true
          fi

          echo "=== restart runtime services ==="
          docker compose up -d --remove-orphans backend frontend import-worker bot

          if [ "$PRUNE_IMAGES" = "true" ]; then
            docker image prune -f || true
          fi

          echo "=== health checks ==="
          for attempt in $(seq 1 30); do
            if docker compose exec -T backend curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "backend health OK attempt=$attempt"
              break
            fi
            if [ "$attempt" = "30" ]; then
              echo "ERROR: backend health timeout" >&2
              docker compose ps || true
              docker compose logs --tail=120 backend || true
              exit 1
            fi
            sleep 3
          done

          docker compose exec -T backend curl -sf http://localhost:8000/ready || true
          docker compose exec -T frontend wget -qO- http://127.0.0.1:80/ >/dev/null && echo "frontend OK" || echo "WARN: frontend check failed"

          echo "=== code verification inside backend ==="
          docker compose exec -T backend python - <<'PY'
          import inspect
          from services.route_eligibility import query_filters
          print(inspect.getsource(query_filters.route_eligible_sql_conditions))
          PY

          echo "=== alembic current/head ==="
          docker compose exec -T backend alembic current || true
          docker compose exec -T backend alembic heads || true

          echo "=== containers ==="
          docker compose ps
          REMOTE
