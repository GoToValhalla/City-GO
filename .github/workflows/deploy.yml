name: Production Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build production images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/city-go-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/city-go-frontend" >> "$GITHUB_ENV"

      - name: Set build metadata
        shell: bash
        run: |
          echo "CITY_GO_BUILD_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_RUN_ID=${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_RUN_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --build-arg CITY_GO_BUILD_SHA="$CITY_GO_BUILD_SHA" \
            --build-arg CITY_GO_BUILD_RUN_ID="$CITY_GO_BUILD_RUN_ID" \
            --build-arg CITY_GO_BUILD_RUN_NUMBER="$CITY_GO_BUILD_RUN_NUMBER" \
            --build-arg CITY_GO_BUILD_TIME="$CITY_GO_BUILD_TIME" \
            -t "$BACKEND_IMAGE:latest" .

      - name: Backend import smoke inside image
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -i \
            -e DATABASE_URL='sqlite:///./ci_import_smoke.db' \
            -e ADMIN_API_TOKEN='ci-admin-token' \
            -e APP_ENV='test' \
            "$BACKEND_IMAGE:latest" \
            python - <<'PY'
          import main
          from core.router_setup import include_app_routers
          print('backend_image_import_smoke_ok')
          print(main.app.title)
          print(include_app_routers.__name__)
          PY

      - name: Push backend image
        shell: bash
        run: |
          set -euo pipefail
          docker push "$BACKEND_IMAGE:latest"

      - name: Build and push frontend image
        shell: bash
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          docker build \
            --build-arg VITE_ADMIN_API_TOKEN="$ADMIN_API_TOKEN" \
            --build-arg VITE_BUILD_SHA="$CITY_GO_BUILD_SHA" \
            --build-arg VITE_BUILD_RUN_ID="$CITY_GO_BUILD_RUN_ID" \
            --build-arg VITE_BUILD_RUN_NUMBER="$CITY_GO_BUILD_RUN_NUMBER" \
            --build-arg VITE_BUILD_TIME="$CITY_GO_BUILD_TIME" \
            -t "$FRONTEND_IMAGE:latest" \
            ./frontend
          docker push "$FRONTEND_IMAGE:latest"

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production secrets
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || 22 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EXPECTED_FRONTEND_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          REMOTE_GH_TOKEN=$(printf '%q' "$GH_TOKEN")
          REMOTE_GH_ACTOR=$(printf '%q' "$GH_ACTOR")
          REMOTE_GH_REPO=$(printf '%q' "$GH_REPO")
          REMOTE_ADMIN_API_TOKEN=$(printf '%q' "${ADMIN_API_TOKEN:-}")
          REMOTE_TELEGRAM_BOT_TOKEN=$(printf '%q' "${TELEGRAM_BOT_TOKEN:-}")
          REMOTE_TELEGRAM_CHAT_ID=$(printf '%q' "${TELEGRAM_CHAT_ID:-}")
          REMOTE_EXPECTED_FRONTEND_SHA=$(printf '%q' "$EXPECTED_FRONTEND_SHA")

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "GH_TOKEN=$REMOTE_GH_TOKEN GH_ACTOR=$REMOTE_GH_ACTOR GH_REPO=$REMOTE_GH_REPO ADMIN_API_TOKEN=$REMOTE_ADMIN_API_TOKEN TELEGRAM_BOT_TOKEN=$REMOTE_TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID=$REMOTE_TELEGRAM_CHAT_ID EXPECTED_FRONTEND_SHA=$REMOTE_EXPECTED_FRONTEND_SHA bash -seu -o pipefail" <<'REMOTE_EOF'
            mkdir -p /srv/app

            echo "=== download compose from ${GH_REPO}@main ==="
            curl -sf \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw" \
              -o /srv/app/docker-compose.yml \
              "https://api.github.com/repos/${GH_REPO}/contents/docker-compose.yml?ref=main"

            cd /srv/app
            touch .env
            if ! grep -q '^ADMIN_API_TOKEN=.' .env 2>/dev/null; then
              if [ -n "${ADMIN_API_TOKEN}" ]; then
                printf '%s\n' "ADMIN_API_TOKEN=${ADMIN_API_TOKEN}" >> .env
              else
                echo "WARN: ADMIN_API_TOKEN missing in .env and GitHub secret; admin frontend/backend auth may fail."
              fi
            fi
            if ! grep -q '^TELEGRAM_BOT_TOKEN=.' .env 2>/dev/null; then
              if [ -n "${TELEGRAM_BOT_TOKEN:-}" ]; then
                printf '%s\n' "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" >> .env
              else
                echo "WARN: TELEGRAM_BOT_TOKEN missing in .env and GitHub secret; runtime alerts disabled."
              fi
            fi
            if ! grep -q '^TELEGRAM_CHAT_ID=.' .env 2>/dev/null; then
              if [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
                printf '%s\n' "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}" >> .env
              else
                echo "WARN: TELEGRAM_CHAT_ID missing in .env and GitHub secret; runtime alerts disabled."
              fi
            fi
            if ! grep -q '^APP_ENV=' .env 2>/dev/null; then
              echo "APP_ENV=production" >> .env
            fi

            echo "=== compose config validation ==="
            docker compose config >/dev/null

            echo "=== production diagnostic before deploy ==="
            df -h || true
            docker system df || true
            docker compose ps || true
            docker compose images || true
            echo "--- backend /version before ---"
            curl -sf http://localhost/api/version || curl -sf http://localhost:8000/version || true
            echo
            echo "--- frontend build metadata before ---"
            curl -sf http://localhost/build.json || true
            echo

            echo "=== keep current frontend alive before registry operations ==="
            if ! docker compose ps frontend 2>/dev/null | grep -q "Up"; then
              docker compose up -d --no-deps frontend || true
            fi

            echo "=== docker login and pull fresh images ==="
            REGISTRY_OK=0
            for attempt in 1 2 3; do
              if echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin && docker compose pull; then
                REGISTRY_OK=1
                break
              fi
              echo "WARN: ghcr login/pull failed attempt=${attempt}/3"
              docker image prune -f || true
              sleep 10
            done
            if [ "${REGISTRY_OK}" != "1" ]; then
              echo "ERROR: ghcr.io unavailable from production server. Existing local containers/images were left running."
              docker compose ps || true
              exit 1
            fi

            echo "=== migrations ==="
            docker compose rm -sf migrate || true
            set +e
            docker compose run -T --rm migrate </dev/null
            MIGRATE_EXIT=$?
            set -e
            docker compose logs --tail=160 migrate || true
            if [ "$MIGRATE_EXIT" != "0" ]; then
              echo "ERROR: Migrations failed (exit code $MIGRATE_EXIT). Deploy aborted before runtime restart."
              echo "--- alembic heads in backend image ---"
              docker compose run -T --rm --no-deps backend alembic heads </dev/null || true
              echo "--- alembic current in database ---"
              docker compose run -T --rm --no-deps backend alembic current </dev/null || true
              docker compose ps || true
              exit 1
            fi
            echo "=== migrations OK ==="

            echo "=== production schema guard ==="
            SCHEMA_GUARD_OK=0
            for attempt in 1 2 3; do
              if docker compose run -T --rm --no-deps backend python scripts/prod_schema_guard.py </dev/null; then
                SCHEMA_GUARD_OK=1
                break
              fi
              echo "WARN: schema guard failed attempt=${attempt}/3"
              docker compose ps || true
              docker compose logs --tail=120 db || true
              sleep 5
            done
            if [ "$SCHEMA_GUARD_OK" != "1" ]; then
              echo "ERROR: production schema guard failed after retries."
              exit 1
            fi

            echo "=== stop backend-side services only; keep current frontend alive until backend is healthy ==="
            docker compose stop import-worker bot backend || true

            echo "=== recreate backend ==="
            docker compose up -d --no-deps --force-recreate backend

            echo "=== backend startup diagnostics ==="
            docker compose ps || true
            docker compose logs --tail=160 backend || true

            echo "=== backend health ==="
            BACKEND_OK=0
            for attempt in $(seq 1 30); do
              if docker compose exec -T backend curl -sf http://localhost:8000/health </dev/null >/dev/null 2>&1; then
                BACKEND_OK=1
                echo "Backend health OK attempt=$attempt"
                break
              fi
              echo "Backend not ready yet attempt=$attempt/30"
              docker compose logs --tail=80 backend || true
              sleep 3
            done
            if [ "$BACKEND_OK" != "1" ]; then
              echo "ERROR: Backend health check failed after deploy. Frontend was not restarted."
              echo "=== compose ps ==="
              docker compose ps || true
              echo "=== backend logs ==="
              docker compose logs --tail=300 backend || true
              echo "=== migrate logs ==="
              docker compose logs --tail=160 migrate || true
              exit 1
            fi

            echo "=== recreate frontend from freshly pulled image ==="
            docker compose rm -sf frontend || true
            docker compose up -d --no-deps --force-recreate --pull never frontend

            echo "=== frontend health and build metadata ==="
            FRONTEND_OK=0
            FRONTEND_BUILD_OK=0
            for attempt in $(seq 1 20); do
              if curl -sf http://localhost/ >/dev/null 2>&1; then
                FRONTEND_OK=1
                echo "Frontend health OK attempt=$attempt"
                BUILD_JSON=$(curl -sf http://localhost/build.json || true)
                echo "frontend_build_json=${BUILD_JSON}"
                if printf '%s' "${BUILD_JSON}" | grep -q "${EXPECTED_FRONTEND_SHA}"; then
                  FRONTEND_BUILD_OK=1
                  echo "Frontend build SHA OK: ${EXPECTED_FRONTEND_SHA}"
                  break
                fi
                echo "Frontend build SHA mismatch attempt=$attempt/20 expected=${EXPECTED_FRONTEND_SHA}"
              else
                echo "Frontend not ready yet attempt=$attempt/20"
                docker compose logs --tail=80 frontend || true
              fi
              sleep 3
            done
            if [ "$FRONTEND_OK" != "1" ]; then
              echo "ERROR: Frontend health check failed after deploy."
              docker compose ps || true
              docker compose logs --tail=240 frontend || true
              exit 1
            fi
            if [ "$FRONTEND_BUILD_OK" != "1" ]; then
              echo "ERROR: Frontend restarted, but /build.json does not match this deploy commit."
              echo "Expected SHA: ${EXPECTED_FRONTEND_SHA}"
              echo "Actual /build.json: $(curl -sf http://localhost/build.json || true)"
              docker compose ps || true
              docker compose images || true
              docker compose logs --tail=240 frontend || true
              exit 1
            fi

            echo "=== recreate background services ==="
            docker compose up -d --no-deps --force-recreate bot import-worker

            echo "=== background services health ==="
            BACKGROUND_OK=0
            for attempt in $(seq 1 10); do
              if docker compose ps bot 2>/dev/null | grep -q "Up" && docker compose ps import-worker 2>/dev/null | grep -q "Up"; then
                BACKGROUND_OK=1
                echo "Background services are running attempt=$attempt"
                break
              fi
              echo "Background services not ready yet attempt=$attempt/10"
              docker compose ps || true
              docker compose logs --tail=80 bot import-worker || true
              sleep 3
            done
            if [ "$BACKGROUND_OK" != "1" ]; then
              echo "ERROR: Background services failed to start."
              docker compose ps || true
              docker compose logs --tail=200 bot import-worker || true
              exit 1
            fi

            echo "=== external local api proxy health ==="
            curl -sf http://localhost/api/health >/dev/null || (echo "ERROR: frontend /api/health proxy failed"; docker compose logs --tail=160 frontend backend || true; exit 1)

            echo "=== backend runtime version ==="
            curl -sf http://localhost/api/version || curl -sf http://localhost:8000/version

            echo "=== alembic current/head ==="
            docker compose exec -T backend alembic current </dev/null || true
            docker compose exec -T backend alembic heads </dev/null || true

            echo "=== production diagnostic after deploy ==="
            docker compose ps || true
            docker compose images || true
            echo "--- backend /version after ---"
            curl -sf http://localhost/api/version || curl -sf http://localhost:8000/version || true
            echo
            echo "--- frontend build metadata after ---"
            curl -sf http://localhost/build.json || true
            echo

            echo "=== final logs backend ==="
            docker compose logs --tail=120 backend || true
            echo "=== final logs frontend ==="
            docker compose logs --tail=120 frontend || true
            echo "=== final logs bot/import-worker ==="
            docker compose logs --tail=120 bot import-worker || true
            docker image prune -f || true
            echo "Deploy done: $(date)"
          REMOTE_EOF

  notify:
    name: Notify deploy result
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    if: always()
    steps:
      - name: Telegram deploy notification
        continue-on-error: true
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram deploy notification skipped: missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID."
            exit 0
          fi
          STATUS="✅ City GO: deploy ok"
          if [ "${BUILD_RESULT}" != "success" ] || [ "${DEPLOY_RESULT}" != "success" ]; then
            STATUS="❌ City GO: deploy failed"
          fi
          TEXT="${STATUS}%0ARepo: ${{ github.repository }}%0ARun: ${{ github.run_number }}%0ABuild: ${BUILD_RESULT}%0ADeploy: ${DEPLOY_RESULT}%0ASHA: ${{ github.sha }}"
          curl -fsS --retry 3 --retry-delay 2 \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${TEXT}"
