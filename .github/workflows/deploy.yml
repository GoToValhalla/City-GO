name: 01 · CITY GO · Production Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: Optional exact commit SHA to deploy. Leave empty to deploy the selected main ref.
        required: false
        type: string

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: production-deploy-${{ inputs.deploy_sha || github.sha }}
  cancel-in-progress: false

env:
  DEPLOY_TARGET_SHA: ${{ inputs.deploy_sha || github.sha }}
  DEPLOY_TARGET_REF: ${{ github.ref_name }}

jobs:
  build:
    name: Build production images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout deploy target
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_TARGET_SHA }}

      - name: Verify full regression passed for deploy SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="${DEPLOY_TARGET_SHA}"
          WORKFLOW_ID="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml" --jq .id)"
          CONCLUSION="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/${WORKFLOW_ID}/runs?branch=main&head_sha=${SHA}&status=completed&per_page=20" --jq '[.workflow_runs[] | select(.name == "00 · CITY GO · CI")] | map(.conclusion) | .[0] // empty')"
          if [ "$CONCLUSION" != "success" ]; then
            echo "Deploy blocked: no successful full CI regression for ${SHA} on main." >&2
            echo "Run '00 · CITY GO · CI' for this commit before production deploy." >&2
            exit 1
          fi
          echo "CI regression success confirmed for ${SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image names
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/city-go-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/city-go-frontend" >> "$GITHUB_ENV"

      - name: Set build metadata
        shell: bash
        run: |
          echo "CITY_GO_BUILD_SHA=${DEPLOY_TARGET_SHA}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_RUN_ID=${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_RUN_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        id: backend-image
        with:
          context: .
          load: true
          push: false
          tags: ${{ env.BACKEND_IMAGE }}:latest
          build-args: |
            CITY_GO_BUILD_SHA=${{ env.CITY_GO_BUILD_SHA }}
            CITY_GO_BUILD_RUN_ID=${{ env.CITY_GO_BUILD_RUN_ID }}
            CITY_GO_BUILD_RUN_NUMBER=${{ env.CITY_GO_BUILD_RUN_NUMBER }}
            CITY_GO_BUILD_TIME=${{ env.CITY_GO_BUILD_TIME }}
          cache-from: type=gha,scope=city-go-backend
          cache-to: type=gha,mode=max,scope=city-go-backend

      - name: Backend import smoke inside image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/city-go-build-smoke
          set +e
          docker run --rm -i \
            -e DATABASE_URL='sqlite:///./ci_import_smoke.db' \
            -e ADMIN_API_TOKEN='ci-admin-token' \
            -e APP_ENV='test' \
            "$BACKEND_IMAGE:latest" \
            python - <<'PY' > /tmp/city-go-build-smoke/backend-import-smoke.log 2>&1
          import importlib
          import traceback
          import sys

          modules = [
              'services.admin_platform_quality',
              'routers.admin_platform',
              'routers.place_verification',
              'core.router_setup',
              'main',
          ]
          for name in modules:
              try:
                  importlib.import_module(name)
                  print(f'import_ok {name}', flush=True)
              except Exception:
                  print(f'import_failed {name}', flush=True)
                  traceback.print_exc()
                  sys.exit(1)

          from core.router_setup import include_app_routers
          import main
          print('backend_image_import_smoke_ok', flush=True)
          print(main.app.title, flush=True)
          print(include_app_routers.__name__, flush=True)
          PY
          status=$?
          set -e
          cat /tmp/city-go-build-smoke/backend-import-smoke.log
          if [ "$status" -ne 0 ]; then
            echo "Backend import smoke failed with exit code $status" >&2
            exit "$status"
          fi

      - name: Upload backend import smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-import-smoke-log
          path: /tmp/city-go-build-smoke/backend-import-smoke.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Push backend image
        shell: bash
        run: |
          set -euo pipefail
          docker push "$BACKEND_IMAGE:latest"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_ADMIN_API_TOKEN=${{ secrets.ADMIN_API_TOKEN }}
            VITE_BUILD_SHA=${{ env.CITY_GO_BUILD_SHA }}
            VITE_BUILD_RUN_ID=${{ env.CITY_GO_BUILD_RUN_ID }}
            VITE_BUILD_RUN_NUMBER=${{ env.CITY_GO_BUILD_RUN_NUMBER }}
            VITE_BUILD_TIME=${{ env.CITY_GO_BUILD_TIME }}
          cache-from: type=gha,scope=city-go-frontend
          cache-to: type=gha,mode=max,scope=city-go-frontend

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - name: Checkout deploy target
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_TARGET_SHA }}

      - name: Validate production secrets
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)
          test -n "$TELEGRAM_BOT_TOKEN" || (echo "TELEGRAM_BOT_TOKEN secret is missing" >&2; exit 1)
          test -n "$TELEGRAM_CHAT_ID" || (echo "TELEGRAM_CHAT_ID secret is missing" >&2; exit 1)

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh /tmp/city-go-deploy
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          KEYSCAN_LOG=/tmp/city-go-deploy/ssh-keyscan.log
          KEYSCAN_KEYS=/tmp/city-go-deploy/ssh-known-hosts
          KEYSCAN_OK=0
          for attempt in 1 2 3; do
            : > "$KEYSCAN_KEYS"
            if timeout 20s ssh-keyscan -T 8 -p "$SSH_PORT" "$SSH_HOST" > "$KEYSCAN_KEYS" 2>>"$KEYSCAN_LOG" \
              && test -s "$KEYSCAN_KEYS"; then
              cat "$KEYSCAN_KEYS" >> ~/.ssh/known_hosts
              KEYSCAN_OK=1
              echo "SSH host key preflight succeeded attempt=${attempt}"
              break
            fi
            echo "WARN: SSH host key preflight failed attempt=${attempt}/3"
            sleep "$attempt"
          done
          if [ "$KEYSCAN_OK" != "1" ]; then
            {
              echo "WARN: ssh-keyscan could not reach ${SSH_HOST}:${SSH_PORT} after 3 attempts."
              echo "The deployment will continue with StrictHostKeyChecking=accept-new so the SSH client reports the final connection error."
              cat "$KEYSCAN_LOG"
            } | tee /tmp/city-go-deploy/ssh-preflight-warning.log
          fi

          echo "=== SSH remote shell preflight ===" | tee /tmp/city-go-deploy/ssh-shell-preflight.log
          SHELL_OK=0
          for attempt in 1 2 3; do
            if timeout 20s ssh \
              -o ConnectTimeout=10 \
              -o StrictHostKeyChecking=accept-new \
              -i ~/.ssh/deploy_key \
              -p "$SSH_PORT" \
              "$SSH_USER@$SSH_HOST" \
              'echo ssh_ok' >> /tmp/city-go-deploy/ssh-shell-preflight.log 2>&1; then
              SHELL_OK=1
              echo "SSH remote shell preflight succeeded attempt=${attempt}" | tee -a /tmp/city-go-deploy/ssh-shell-preflight.log
              break
            fi
            echo "WARN: SSH remote shell preflight failed attempt=${attempt}/3" | tee -a /tmp/city-go-deploy/ssh-shell-preflight.log
            sleep "$attempt"
          done
          if [ "$SHELL_OK" != "1" ]; then
            echo "ERROR: SSH remote shell preflight failed" | tee -a /tmp/city-go-deploy/ssh-shell-preflight.log
            exit 1
          fi

      - name: Set image names
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/city-go-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/city-go-frontend" >> "$GITHUB_ENV"

      - name: Download images from GHCR on runner
        shell: bash
        run: |
          set -euo pipefail
          docker pull "$BACKEND_IMAGE:latest"
          docker pull "$FRONTEND_IMAGE:latest"
          docker save "$BACKEND_IMAGE:latest" "$FRONTEND_IMAGE:latest" | gzip -1 > /tmp/city-go-images.tar.gz

      - name: Copy compose file to server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          scp -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            docker-compose.yml "$SSH_USER@$SSH_HOST:/tmp/city-go-docker-compose.yml"

      - name: Copy images archive to server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          scp -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            /tmp/city-go-images.tar.gz "$SSH_USER@$SSH_HOST:/tmp/city-go-images.tar.gz"

      - name: Deploy on server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_SHA: ${{ env.DEPLOY_TARGET_SHA }}
        run: |
          set -euo pipefail
          ssh -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_SHA='${DEPLOY_SHA}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /srv/app

          echo "=== Refresh docker-compose.yml from deployed artifact ==="
          install -m 0644 /tmp/city-go-docker-compose.yml /srv/app/docker-compose.yml
          docker compose config --quiet
          grep -n "WEB_CONCURRENCY\|uvicorn main:app" docker-compose.yml || true

          echo "=== Production disk before deploy cleanup ==="
          df -h /
          docker system df || true

          echo "=== Recording rollback metadata (previous deployed image IDs) ==="
          PREVIOUS_SHA="$(cat /srv/app/.last_deployed_sha 2>/dev/null || echo unknown)"
          echo "Previous deployed SHA: ${PREVIOUS_SHA}"
          echo "Attempted SHA: ${DEPLOY_SHA}" || true
          docker compose images 2>/dev/null || true

          echo "=== Stop and remove app containers before image replacement ==="
          docker compose stop frontend backend import-worker bot || true
          docker compose rm -f frontend backend import-worker bot migrate seed address-backfill place-enrichment-export || true

          echo "=== Safe cleanup before docker load (dangling data only; previous tagged image is preserved for rollback) ==="
          docker container prune -f || true
          docker builder prune -f || true
          rm -rf /tmp/city-go-build-* /tmp/city-go-deploy-* || true

          echo "=== Production disk after deploy cleanup ==="
          df -h /
          docker system df || true

          echo "=== docker load (bounded) ==="
          set +e
          timeout 300s docker load -i /tmp/city-go-images.tar.gz
          LOAD_STATUS=$?
          set -e
          if [ "$LOAD_STATUS" -ne 0 ]; then
            echo "ERROR: docker load timed out or failed (exit code ${LOAD_STATUS})" >&2
            exit "$LOAD_STATUS"
          fi

          echo "=== docker compose up (bounded) ==="
          set +e
          timeout 180s docker compose up -d --remove-orphans
          UP_STATUS=$?
          set -e
          if [ "$UP_STATUS" -ne 0 ]; then
            echo "ERROR: docker compose up timed out or failed (exit code ${UP_STATUS})" >&2
            exit "$UP_STATUS"
          fi

          echo "=== docker compose up import-worker (bounded, explicit ops service only) ==="
          set +e
          timeout 120s docker compose up -d --no-deps import-worker
          WORKER_UP_STATUS=$?
          set -e
          if [ "$WORKER_UP_STATUS" -ne 0 ]; then
            echo "ERROR: import-worker compose up timed out or failed (exit code ${WORKER_UP_STATUS})" >&2
            exit "$WORKER_UP_STATUS"
          fi

          WORKER_ID="$(docker compose ps -aq import-worker | head -n 1 || true)"
          if [ -z "$WORKER_ID" ]; then
            echo "ERROR: import-worker container is missing after deploy." >&2
            docker compose ps || true
            exit 1
          fi
          WORKER_STATE="$(docker inspect -f '{{.State.Status}}' "$WORKER_ID" 2>/dev/null || true)"
          if [ "$WORKER_STATE" != "running" ]; then
            echo "ERROR: import-worker is not running after deploy; state=${WORKER_STATE:-unknown}." >&2
            docker compose ps import-worker || true
            docker compose logs --tail=150 import-worker || true
            exit 1
          fi
          echo "import-worker running: ${WORKER_ID}"

          echo "=== Docker compose status after deploy up ==="
          docker compose ps

          rm -f /tmp/city-go-images.tar.gz /tmp/city-go-docker-compose.yml || true

          echo "${DEPLOY_SHA}" > /srv/app/.last_deployed_sha || true

          echo "=== Production disk after deploy ==="
          df -h /
          docker system df || true
          REMOTE

      - name: Verify build.json
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          CITY_GO_BUILD_SHA: ${{ env.DEPLOY_TARGET_SHA }}
        run: |
          set -euo pipefail
          expected="${CITY_GO_BUILD_SHA:0:7}"
          echo "Expected build sha prefix: ${expected}"

          remote_out="$(ssh -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash <<'REMOTE'
            set -uo pipefail
            status="$(curl -sS --max-time 10 -o /tmp/build.json -w '%{http_code}' \
              --resolve citygo.autismishe.online:443:127.0.0.1 \
              https://citygo.autismishe.online/build.json)"
            echo "HTTP_STATUS=${status}"
            echo "BODY_PREVIEW_BASE64=$(head -c 300 /tmp/build.json | base64 | tr -d '\n')"
            actual_sha="$(python3 -c 'import json; print(json.load(open("/tmp/build.json")).get("sha", "")[:7])' 2>/dev/null || true)"
            echo "ACTUAL_SHA=${actual_sha}"
          REMOTE
          )"

          echo "$remote_out"

          status="$(grep '^HTTP_STATUS=' <<<"$remote_out" | cut -d= -f2-)"
          body_preview="$(grep '^BODY_PREVIEW_BASE64=' <<<"$remote_out" | cut -d= -f2- | base64 -d 2>/dev/null || true)"
          actual="$(grep '^ACTUAL_SHA=' <<<"$remote_out" | cut -d= -f2-)"

          echo "HTTP status: ${status}"
          echo "Expected sha: ${expected}"
          echo "Actual sha: ${actual}"

          if [ -z "$actual" ]; then
            echo "Failed to parse build.json as JSON. Body preview:"
            echo "${body_preview}"
            exit 1
          fi

          if [ "$actual" != "$expected" ]; then
            echo "Deployed build sha does not match expected sha."
            exit 1
          fi

      - name: Verify backend ready
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_SHA: ${{ env.DEPLOY_TARGET_SHA }}
        run: |
          set -euo pipefail
          ssh -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_SHA='${DEPLOY_SHA}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /srv/app

          show_logs() {
            service="$1"
            lines="$2"
            echo "=== docker compose logs --tail=${lines} ${service} ==="
            docker compose logs --tail="${lines}" "${service}" || true
          }

          echo "=== Waiting for backend /ready ==="
          ready=0
          for attempt in $(seq 1 36); do
            if curl -fsS --max-time 5 http://localhost:8000/ready; then
              echo
              echo "Backend ready check passed on attempt ${attempt}/36."
              ready=1
              break
            fi
            echo "Backend is not ready yet attempt=${attempt}/36; retrying in 5 seconds..."
            sleep 5
          done

          if [ "$ready" != "1" ]; then
            echo "ERROR: backend /ready did not pass within 180 seconds." >&2
            echo "Attempted SHA: ${DEPLOY_SHA}"
            echo "Previous deployed SHA: $(cat /srv/app/.last_deployed_sha 2>/dev/null || echo unknown)"
            echo "=== docker compose ps ==="
            docker compose ps || true
            echo "=== Disk free ==="
            df -h / || true
            echo "=== Docker image list summary ==="
            docker images --format 'table {{.Repository}}\t{{.Tag}}\t{{.CreatedSince}}\t{{.Size}}' | head -20 || true
            show_logs backend 250
            show_logs migrate 200
            show_logs db 150
            show_logs import-worker 150
            show_logs bot 100
            exit 1
          fi

          echo "=== Verifying import-worker runtime state ==="
          WORKER_ID="$(docker compose ps -aq import-worker | head -n 1 || true)"
          if [ -z "$WORKER_ID" ]; then
            echo "ERROR: import-worker container is missing after backend readiness passed." >&2
            docker compose ps || true
            exit 1
          fi
          WORKER_STATE="$(docker inspect -f '{{.State.Status}}' "$WORKER_ID" 2>/dev/null || true)"
          if [ "$WORKER_STATE" != "running" ]; then
            echo "ERROR: import-worker is not running after backend readiness passed; state=${WORKER_STATE:-unknown}." >&2
            docker compose ps import-worker || true
            show_logs import-worker 150
            exit 1
          fi
          echo "Backend /ready and import-worker runtime checks passed."
          REMOTE

      - name: Cleanup old images after confirmed healthy deploy
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          # Only reached after "Verify build.json" and "Verify backend ready" both
          # succeeded, so the new image is confirmed running and healthy. Safe to
          # prune older unused images now — the previous deployed image is no
          # longer needed for an emergency rollback via `docker compose up` on a
          # prior tag, since this deploy is already verified good.
          ssh -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" <<'REMOTE'
          set -euo pipefail
          cd /srv/app
          echo "=== Pruning unused images after confirmed healthy deploy ==="
          docker image prune -af || true
          docker builder prune -af || true
          echo "=== Production disk after post-deploy cleanup ==="
          df -h /
          docker system df || true
          REMOTE

      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-log
          path: /tmp/city-go-deploy
          if-no-files-found: ignore
          retention-days: 7

  notify:
    name: Notify deploy result
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout notification helper
        uses: actions/checkout@v4

      - name: Download deploy log
        uses: actions/download-artifact@v4
        with:
          name: production-deploy-log
          path: /tmp/deploy-log
        continue-on-error: true

      - name: Build deploy notification
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          CITY_GO_DEPLOY_SHA: ${{ env.DEPLOY_TARGET_SHA }}
          CITY_GO_DEPLOY_REF: ${{ env.DEPLOY_TARGET_REF }}
        run: |
          set -euo pipefail
          python scripts/build_deploy_notification.py \
            --build-result "$BUILD_RESULT" \
            --deploy-result "$DEPLOY_RESULT" \
            --run-attempt "$RUN_ATTEMPT" \
            --output /tmp/deploy-notification.txt

      - name: Send Telegram deploy notification
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_telegram_notification.py --text-file /tmp/deploy-notification.txt
