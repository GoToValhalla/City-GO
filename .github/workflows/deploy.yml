name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  build:
    name: Build and push production images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/city-go-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/city-go-frontend" >> "$GITHUB_ENV"

      - name: Set build metadata
        shell: bash
        run: |
          echo "CITY_GO_BUILD_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_RUN_ID=${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_RUN_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "CITY_GO_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --build-arg CITY_GO_BUILD_SHA="$CITY_GO_BUILD_SHA" \
            --build-arg CITY_GO_BUILD_RUN_ID="$CITY_GO_BUILD_RUN_ID" \
            --build-arg CITY_GO_BUILD_RUN_NUMBER="$CITY_GO_BUILD_RUN_NUMBER" \
            --build-arg CITY_GO_BUILD_TIME="$CITY_GO_BUILD_TIME" \
            -t "$BACKEND_IMAGE:latest" .

      - name: Backend import smoke inside image
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -e DATABASE_URL='sqlite:///./ci_import_smoke.db' \
            -e ADMIN_API_TOKEN='ci-admin-token' \
            -e APP_ENV='test' \
            "$BACKEND_IMAGE:latest" \
            python - <<'PY'
          import main
          from core.router_setup import include_app_routers
          print('backend_image_import_smoke_ok')
          print(main.app.title)
          print(include_app_routers.__name__)
          PY

      - name: Push backend image
        shell: bash
        run: |
          set -euo pipefail
          docker push "$BACKEND_IMAGE:latest"

      - name: Build and push frontend image
        shell: bash
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          docker build \
            --build-arg VITE_ADMIN_API_TOKEN="$ADMIN_API_TOKEN" \
            --build-arg VITE_BUILD_SHA="$CITY_GO_BUILD_SHA" \
            --build-arg VITE_BUILD_RUN_ID="$CITY_GO_BUILD_RUN_ID" \
            --build-arg VITE_BUILD_RUN_NUMBER="$CITY_GO_BUILD_RUN_NUMBER" \
            --build-arg VITE_BUILD_TIME="$CITY_GO_BUILD_TIME" \
            -t "$FRONTEND_IMAGE:latest" \
            ./frontend
          docker push "$FRONTEND_IMAGE:latest"

      - name: Write build mini report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/messages
          short_sha="${GITHUB_SHA:0:7}"
          status="${{ job.status }}"
          {
            echo "Build worker"
            echo "Status: ${status}"
            echo "Run type: Production image build"
            echo "Backend image: ${BACKEND_IMAGE:-ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/city-go-backend}:latest"
            echo "Frontend image: ${FRONTEND_IMAGE:-ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/city-go-frontend}:latest"
            echo "Commit: ${short_sha}"
            echo "Run: #${GITHUB_RUN_NUMBER} attempt ${GITHUB_RUN_ATTEMPT}"
            echo "GitHub: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > artifacts/messages/deploy-build.txt
          cat artifacts/messages/deploy-build.txt

      - name: Upload build mini report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-build-report
          path: artifacts/messages/deploy-build.txt
          if-no-files-found: warn

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate existing production secrets
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || 22 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          REMOTE_GH_TOKEN=$(printf '%q' "$GH_TOKEN")
          REMOTE_GH_ACTOR=$(printf '%q' "$GH_ACTOR")
          REMOTE_GH_REPO=$(printf '%q' "$GH_REPO")
          REMOTE_ADMIN_API_TOKEN=$(printf '%q' "${ADMIN_API_TOKEN:-}")

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "GH_TOKEN=$REMOTE_GH_TOKEN GH_ACTOR=$REMOTE_GH_ACTOR GH_REPO=$REMOTE_GH_REPO ADMIN_API_TOKEN=$REMOTE_ADMIN_API_TOKEN bash -seu -o pipefail" <<'REMOTE_EOF'
            mkdir -p /srv/app

            echo "=== download compose from ${GH_REPO}@main ==="
            curl -sf \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw" \
              -o /srv/app/docker-compose.yml \
              "https://api.github.com/repos/${GH_REPO}/contents/docker-compose.yml?ref=main"

            cd /srv/app
            touch .env
            if ! grep -q '^ADMIN_API_TOKEN=.' .env 2>/dev/null; then
              if [ -n "${ADMIN_API_TOKEN}" ]; then
                printf '%s\n' "ADMIN_API_TOKEN=${ADMIN_API_TOKEN}" >> .env
              else
                echo "WARN: ADMIN_API_TOKEN missing in .env and GitHub secret; admin frontend/backend auth may fail."
              fi
            fi
            if ! grep -q '^APP_ENV=' .env 2>/dev/null; then
              echo "APP_ENV=production" >> .env
            fi

            echo "=== compose config validation ==="
            docker compose config >/dev/null

            echo "=== production diagnostic before deploy ==="
            df -h || true
            docker system df || true
            docker compose ps || true
            docker compose images || true
            echo "--- backend /version before ---"
            curl -sf http://localhost/api/version || curl -sf http://localhost:8000/version || true
            echo
            echo "--- frontend debug marker before ---"
            if curl -sf http://localhost/ | grep -q "City Go Debug"; then
              echo "frontend_debug_marker=present"
            else
              echo "frontend_debug_marker=missing"
            fi

            echo "=== rescue frontend with local image before registry operations ==="
            if ! docker compose ps frontend 2>/dev/null | grep -q "Up"; then
              docker compose up -d --no-deps frontend || true
            fi

            echo "=== docker login / pull ==="
            REGISTRY_OK=0
            for attempt in 1 2 3; do
              if echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin && docker compose pull; then
                REGISTRY_OK=1
                break
              fi
              echo "WARN: ghcr login/pull failed attempt=${attempt}/3"
              docker image prune -f || true
              sleep 10
            done
            if [ "${REGISTRY_OK}" != "1" ]; then
              echo "ERROR: ghcr.io unavailable from production server. Existing local containers/images were left running."
              docker compose ps || true
              exit 1
            fi

            echo "=== migrations ==="
            set +e
            docker compose up migrate
            MIGRATE_EXIT=$?
            set -e
            docker compose logs --tail=160 migrate || true
            if [ "$MIGRATE_EXIT" != "0" ]; then
              echo "ERROR: Migrations failed (exit code $MIGRATE_EXIT). Deploy aborted before runtime restart."
              docker compose ps || true
              exit 1
            fi
            echo "=== migrations OK ==="

            echo "=== production schema guard ==="
            docker compose run --rm --no-deps backend python scripts/prod_schema_guard.py

            echo "=== stop backend-side services only; keep current frontend alive until backend is healthy ==="
            docker compose stop import-worker bot backend || true

            echo "=== force recreate backend ==="
            docker compose up -d --no-deps --force-recreate backend

            echo "=== backend startup diagnostics ==="
            docker compose ps || true
            docker compose logs --tail=160 backend || true

            echo "=== backend health ==="
            BACKEND_OK=0
            for attempt in $(seq 1 30); do
              if docker compose exec -T backend curl -sf http://localhost:8000/health >/dev/null 2>&1; then
                BACKEND_OK=1
                echo "Backend health OK attempt=$attempt"
                break
              fi
              echo "Backend not ready yet attempt=$attempt/30"
              docker compose logs --tail=80 backend || true
              sleep 3
            done
            if [ "$BACKEND_OK" != "1" ]; then
              echo "ERROR: Backend health check failed after deploy. Frontend was not restarted."
              echo "=== compose ps ==="
              docker compose ps || true
              echo "=== backend logs ==="
              docker compose logs --tail=300 backend || true
              echo "=== migrate logs ==="
              docker compose logs --tail=160 migrate || true
              exit 1
            fi

            echo "=== force recreate remaining services ==="
            docker compose up -d --no-deps --force-recreate frontend bot import-worker

            echo "=== frontend health ==="
            FRONTEND_OK=0
            for attempt in $(seq 1 20); do
              if curl -sf http://localhost/ >/dev/null 2>&1; then
                FRONTEND_OK=1
                echo "Frontend health OK attempt=$attempt"
                break
              fi
              echo "Frontend not ready yet attempt=$attempt/20"
              docker compose logs --tail=80 frontend || true
              sleep 3
            done
            if [ "$FRONTEND_OK" != "1" ]; then
              echo "ERROR: Frontend health check failed after deploy."
              docker compose ps || true
              docker compose logs --tail=240 frontend || true
              exit 1
            fi

            echo "=== external local api proxy health ==="
            curl -sf http://localhost/api/health >/dev/null || (echo "ERROR: frontend /api/health proxy failed"; docker compose logs --tail=160 frontend backend || true; exit 1)

            echo "=== verify backend import inside running container ==="
            docker compose exec -T backend python - <<'PY'
          import main
          from core.router_setup import include_app_routers
          print('running_backend_import_smoke_ok')
          print(main.app.title)
          print(include_app_routers.__name__)
          PY

            echo "=== alembic current/head ==="
            docker compose exec -T backend alembic current || true
            docker compose exec -T backend alembic heads || true

            echo "=== production diagnostic after deploy ==="
            docker compose ps || true
            docker compose images || true
            echo "--- backend /version after ---"
            curl -sf http://localhost/api/version || curl -sf http://localhost:8000/version || true
            echo
            echo "--- frontend debug marker after ---"
            if curl -sf http://localhost/ | grep -q "City Go Debug"; then
              echo "frontend_debug_marker=present"
            else
              echo "frontend_debug_marker=missing"
            fi

            echo "=== final logs backend ==="
            docker compose logs --tail=120 backend || true
            echo "=== final logs frontend ==="
            docker compose logs --tail=120 frontend || true
            docker image prune -f || true
            echo "Deploy done: $(date)"
          REMOTE_EOF

      - name: Write deploy mini report
        if: always()
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/messages
          short_sha="${GITHUB_SHA:0:7}"
          status="${{ job.status }}"
          {
            echo "Deploy worker"
            echo "Status: ${status}"
            echo "Build dependency: ${BUILD_RESULT}"
            echo "Run type: Production server deploy"
            echo "Health checks: backend, frontend, /api/health"
            echo "Commit: ${short_sha}"
            echo "Run: #${GITHUB_RUN_NUMBER} attempt ${GITHUB_RUN_ATTEMPT}"
            echo "GitHub: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > artifacts/messages/deploy-server.txt
          cat artifacts/messages/deploy-server.txt

      - name: Upload deploy mini report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-server-report
          path: artifacts/messages/deploy-server.txt
          if-no-files-found: warn

  notify:
    name: Notify deploy result
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    if: always()
    steps:
      - name: Download deploy mini reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts/deploy

      - name: Telegram deploy notification
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/deploy
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram notification skipped: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is missing"
            exit 0
          fi

          overall="OK"
          icon="✅"
          if [ "$BUILD_RESULT" != "success" ] || [ "$DEPLOY_RESULT" != "success" ]; then
            overall="FAILED"
            icon="❌"
          fi

          short_sha="${GITHUB_SHA:0:7}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          header="${icon} City Go deploy ${overall}
Build: ${BUILD_RESULT}
Deploy: ${DEPLOY_RESULT}
Branch: ${GITHUB_REF_NAME}
Commit: ${short_sha}
Run: ${GITHUB_RUN_NUMBER} attempt ${GITHUB_RUN_ATTEMPT}
${run_url}"

          mapfile -t files < <(find artifacts/deploy -type f -name '*.txt' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${header}" \
              -d "disable_web_page_preview=true"
            exit 0
          fi

          for file in "${files[@]}"; do
            body="$(cat "$file")"
            message="${header}

${body}"
            if [ "${#message}" -gt 3900 ]; then
              message="$(printf '%s' "$message" | head -c 3900)

… trimmed; see GitHub Actions logs."
            fi
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${message}" \
              -d "disable_web_page_preview=true"
          done
