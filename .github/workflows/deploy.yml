name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push production images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/city-go-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/city-go-frontend" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        shell: bash
        run: |
          set -euo pipefail
          docker build -t "$BACKEND_IMAGE:latest" .
          docker push "$BACKEND_IMAGE:latest"

      - name: Build and push frontend image
        shell: bash
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          docker build \
            --build-arg VITE_ADMIN_API_TOKEN="$ADMIN_API_TOKEN" \
            -t "$FRONTEND_IMAGE:latest" \
            ./frontend
          docker push "$FRONTEND_IMAGE:latest"

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate existing production secrets
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT || 22 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" bash <<EOF
            set -euo pipefail
            mkdir -p /srv/app

            echo "=== download compose from ${GH_REPO}@main ==="
            curl -sf \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw" \
              -o /srv/app/docker-compose.yml \
              "https://api.github.com/repos/${GH_REPO}/contents/docker-compose.yml?ref=main"

            cd /srv/app
            touch .env
            if ! grep -q '^ADMIN_API_TOKEN=.' .env 2>/dev/null; then
              if [ -n "${ADMIN_API_TOKEN}" ]; then
                printf '%s\n' "ADMIN_API_TOKEN=${ADMIN_API_TOKEN}" >> .env
              else
                echo "WARN: ADMIN_API_TOKEN missing in .env and GitHub secret; admin frontend/backend auth may fail."
              fi
            fi
            if ! grep -q '^APP_ENV=' .env 2>/dev/null; then
              echo "APP_ENV=production" >> .env
            fi

            echo "=== docker login ==="
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            echo "=== docker pull ==="
            docker compose pull

            echo "=== migrations ==="
            set +e
            docker compose up migrate
            MIGRATE_EXIT=\$?
            set -e
            docker compose logs --tail=120 migrate || true
            if [ "\$MIGRATE_EXIT" != "0" ]; then
              echo "ERROR: Migrations failed (exit code \$MIGRATE_EXIT). Deploy aborted."
              exit 1
            fi
            echo "=== migrations OK ==="

            echo "=== stop runtime services before staged restart ==="
            docker compose stop frontend import-worker bot backend || true

            echo "=== start backend only ==="
            docker compose up -d --no-deps backend

            echo "=== backend startup diagnostics ==="
            docker compose ps || true
            docker compose logs --tail=120 backend || true

            echo "=== backend health ==="
            BACKEND_OK=0
            for attempt in \$(seq 1 30); do
              if docker compose exec -T backend curl -sf http://localhost:8000/health >/dev/null 2>&1; then
                BACKEND_OK=1
                echo "Backend health OK attempt=\$attempt"
                break
              fi
              echo "Backend not ready yet attempt=\$attempt/30"
              docker compose logs --tail=60 backend || true
              sleep 3
            done
            if [ "\$BACKEND_OK" != "1" ]; then
              echo "ERROR: Backend health check failed after deploy."
              echo "=== compose ps ==="
              docker compose ps || true
              echo "=== backend logs ==="
              docker compose logs --tail=240 backend || true
              echo "=== migrate logs ==="
              docker compose logs --tail=120 migrate || true
              echo "=== seed logs ==="
              docker compose logs --tail=120 seed || true
              echo "=== enrichment export logs ==="
              docker compose logs --tail=120 place-enrichment-export || true
              exit 1
            fi

            echo "=== start remaining services ==="
            docker compose up -d --no-deps frontend bot import-worker
            docker image prune -f || true

            echo "=== verify route eligibility code inside backend ==="
            docker compose exec -T backend python - <<'PY'
          import inspect
          from services.route_eligibility import query_filters
          print(inspect.getsource(query_filters.route_eligible_sql_conditions))
          PY

            echo "=== alembic current/head ==="
            docker compose exec -T backend alembic current || true
            docker compose exec -T backend alembic heads || true

            echo "=== containers ==="
            docker compose ps
            echo "Deploy done: \$(date)"
          EOF
