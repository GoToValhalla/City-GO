name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: sqlite:///./ci_test.db
      ADMIN_API_TOKEN: ci-admin-token
      APP_ENV: test
      CITY_GO_TEST_RUN_TYPE: regression
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Backend import smoke
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import main
          from core.router_setup import include_app_routers
          print('backend_import_smoke_ok')
          print(main.app.title)
          print(include_app_routers.__name__)
          PY

      - name: Run backend regression tests with Allure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/junit artifacts/allure-results/backend artifacts/messages
          set +e
          python -m pytest -q --no-cov --junitxml=artifacts/junit/backend.xml --alluredir=artifacts/allure-results/backend
          TEST_EXIT=$?
          set -e
          python scripts/ci_test_summary.py --junit artifacts/junit/backend.xml --output artifacts/messages/backend.txt --job-name "Backend tests" --run-type "Regression" --artifact-hint "backend-test-artifacts" --exit-code "$TEST_EXIT"
          exit "$TEST_EXIT"

      - name: Generate Allure HTML report if available
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if command -v allure >/dev/null 2>&1; then
            allure generate artifacts/allure-results/backend -o artifacts/allure-report/backend --clean || echo "WARN: Allure HTML generation failed"
          else
            echo "Allure CLI is not installed; raw allure-results will be uploaded."
          fi

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            artifacts/junit/backend.xml
            artifacts/allure-results/backend
            artifacts/allure-report/backend
            artifacts/messages/backend.txt
          if-no-files-found: warn

  frontend-tests:
    name: Frontend lint, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: npm ci

      - name: Run frontend lint, tests and build with report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../artifacts/junit ../artifacts/messages
          set +e
          npm run lint
          LINT_EXIT=$?
          npm run test:ci
          TEST_EXIT=$?
          npm run build
          BUILD_EXIT=$?
          set -e
          OVERALL_EXIT=0
          if [ "$LINT_EXIT" != "0" ] || [ "$TEST_EXIT" != "0" ] || [ "$BUILD_EXIT" != "0" ]; then
            OVERALL_EXIT=1
          fi
          python ../scripts/ci_test_summary.py --junit ../artifacts/junit/frontend.xml --output ../artifacts/messages/frontend.txt --job-name "Frontend lint/tests/build" --run-type "Frontend Regression" --artifact-hint "frontend-test-artifacts" --exit-code 0
          {
            echo ""
            echo "Stages:"
            if [ "$LINT_EXIT" = "0" ]; then echo "Lint: PASSED"; else echo "Lint: FAILED"; fi
            if [ "$TEST_EXIT" = "0" ]; then echo "Vitest: PASSED"; else echo "Vitest: FAILED"; fi
            if [ "$BUILD_EXIT" = "0" ]; then echo "Build: PASSED"; else echo "Build: FAILED"; fi
          } >> ../artifacts/messages/frontend.txt
          cat ../artifacts/messages/frontend.txt
          exit "$OVERALL_EXIT"

      - name: Upload frontend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-artifacts
          path: |
            artifacts/junit/frontend.xml
            artifacts/messages/frontend.txt
          if-no-files-found: warn

  notify:
    name: Notify CI result
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    if: always()
    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: downloaded-artifacts

      - name: Build notification summary
        shell: bash
        env:
          BACKEND_RESULT: ${{ needs.backend-tests.result }}
          FRONTEND_RESULT: ${{ needs.frontend-tests.result }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/messages
          BACKEND_SUMMARY=$(find downloaded-artifacts -name backend.txt -print -quit 2>/dev/null || true)
          FRONTEND_SUMMARY=$(find downloaded-artifacts -name frontend.txt -print -quit 2>/dev/null || true)
          {
            echo "City GO CI"
            echo "Backend job: ${BACKEND_RESULT}"
            if [ -n "${BACKEND_SUMMARY}" ]; then cat "${BACKEND_SUMMARY}"; else echo "Backend summary artifact missing"; fi
            echo ""
            echo "Frontend job: ${FRONTEND_RESULT}"
            if [ -n "${FRONTEND_SUMMARY}" ]; then cat "${FRONTEND_SUMMARY}"; else echo "Frontend summary artifact missing"; fi
            echo ""
            echo "Commit: ${GITHUB_SHA}"
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > artifacts/messages/telegram-ci.txt
          cat artifacts/messages/telegram-ci.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Telegram CI notification
        continue-on-error: true
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram notification skipped: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is missing"
            exit 0
          fi
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@artifacts/messages/telegram-ci.txt" \
            -d "disable_web_page_preview=true"
