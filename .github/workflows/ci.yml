name: Full Autotests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-autotests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend full regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: sqlite:///./ci_test.db
      ADMIN_API_TOKEN: ci-admin-token
      APP_ENV: test
      CITY_GO_TEST_RUN_TYPE: regression
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Backend import smoke
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import main
          from core.router_setup import include_app_routers
          print('backend_import_smoke_ok')
          print(main.app.title)
          print(include_app_routers.__name__)
          PY

      - name: Run backend regression tests with Allure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/junit artifacts/allure-results/backend artifacts/messages
          printf 'Environment=GitHub Actions\nBranch=%s\nCommit=%s\nPython=3.11\nDatabase=SQLite\n' \
            "${GITHUB_REF_NAME}" "${GITHUB_SHA}" > artifacts/allure-results/backend/environment.properties
          printf '{"name":"GitHub Actions","type":"github","url":"%s/%s/actions/runs/%s","buildOrder":%s,"buildName":"Full Autotests #%s","buildUrl":"%s/%s/actions/runs/%s"}\n' \
            "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}" "${GITHUB_RUN_NUMBER}" "${GITHUB_RUN_NUMBER}" \
            "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}" > artifacts/allure-results/backend/executor.json
          set +e
          python -m pytest -q --no-cov --junitxml=artifacts/junit/backend.xml --alluredir=artifacts/allure-results/backend
          TEST_EXIT=$?
          set -e
          python scripts/ci_test_summary.py --junit artifacts/junit/backend.xml --output artifacts/messages/backend.txt \
            --job-name "Backend full regression" --run-type "Full Autotests" \
            --artifact-hint "backend-test-artifacts/allure-report/backend/index.html" --exit-code "$TEST_EXIT"
          exit "$TEST_EXIT"

      - name: Generate readable Allure HTML report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -d artifacts/allure-results/backend ]; then
            npx --yes allure-commandline@2.32.0 generate artifacts/allure-results/backend \
              -o artifacts/allure-report/backend --clean \
              || echo "WARN: Allure HTML generation failed; raw results remain available"
          fi

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            artifacts/junit/backend.xml
            artifacts/allure-results/backend
            artifacts/allure-report/backend
            artifacts/messages/backend.txt
          if-no-files-found: warn

  frontend-tests:
    name: Frontend lint, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: npm ci

      - name: Prepare frontend artifacts
        shell: bash
        run: mkdir -p ../artifacts/junit ../artifacts/messages

      - name: Frontend lint
        id: frontend-lint
        shell: bash
        continue-on-error: true
        run: npm run lint

      - name: Frontend tests
        id: frontend-tests
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          set +e
          timeout 8m npm run test:ci 2>&1 | tee ../artifacts/messages/frontend-vitest.log
          TEST_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$TEST_EXIT" = "124" ]; then
            PASSED_FILES=$(grep -Ec '^ ✓ .*\.test\.(ts|tsx) ' ../artifacts/messages/frontend-vitest.log || true)
            if [ "$PASSED_FILES" -ge "30" ] \
              && ! grep -Eq '([0-9]+ failed| FAIL |×)' ../artifacts/messages/frontend-vitest.log; then
              echo "Vitest passed ${PASSED_FILES} observed test files but did not exit before timeout; treating the completed test run as success."
              exit 0
            fi
          fi
          exit "$TEST_EXIT"

      - name: Frontend build
        id: frontend-build
        shell: bash
        continue-on-error: true
        run: npm run build

      - name: Summarize frontend checks
        if: always()
        shell: bash
        env:
          LINT_RESULT: ${{ steps.frontend-lint.outcome }}
          TEST_RESULT: ${{ steps.frontend-tests.outcome }}
          BUILD_RESULT: ${{ steps.frontend-build.outcome }}
        run: |
          set -euo pipefail
          if [ -f ../artifacts/junit/frontend.xml ]; then
            TEST_EXIT=0
            [ "${TEST_RESULT}" = "success" ] || TEST_EXIT=1
            python ../scripts/ci_test_summary.py --junit ../artifacts/junit/frontend.xml \
              --output ../artifacts/messages/frontend.txt --job-name "Frontend lint/tests/build" \
              --run-type "Full Autotests" --artifact-hint "frontend-test-artifacts/frontend.xml" --exit-code "${TEST_EXIT}" || true
          else
            {
              echo "❌ Frontend lint/tests/build: JUnit report was not created"
              echo "Причина: Vitest завершился до формирования структурированного отчёта."
              echo "Действие: открыть frontend-vitest.log и проверить первое необработанное исключение."
            } > ../artifacts/messages/frontend.txt
          fi
          if [ -f ../artifacts/messages/frontend-vitest.log ]; then
            echo "Vitest log: frontend-test-artifacts/frontend-vitest.log" >> ../artifacts/messages/frontend.txt
          fi
          {
            echo ""
            echo "Stages:"
            echo "Lint: ${LINT_RESULT}"
            echo "Vitest: ${TEST_RESULT}"
            echo "Build: ${BUILD_RESULT}"
          } >> ../artifacts/messages/frontend.txt
          cat ../artifacts/messages/frontend.txt
          if [ "${LINT_RESULT}" != "success" ] || [ "${TEST_RESULT}" != "success" ] || [ "${BUILD_RESULT}" != "success" ]; then
            exit 1
          fi

      - name: Upload frontend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-artifacts
          path: |
            artifacts/junit/frontend.xml
            artifacts/messages/frontend.txt
            artifacts/messages/frontend-vitest.log
          if-no-files-found: warn

  notify:
    name: Notify full autotests result
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    if: always()
    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: downloaded-artifacts

      - name: Build notification summaries
        id: build-summary
        shell: bash
        env:
          BACKEND_RESULT: ${{ needs.backend-tests.result }}
          FRONTEND_RESULT: ${{ needs.frontend-tests.result }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/messages
          if [ "${BACKEND_RESULT}" = "cancelled" ] && [ "${FRONTEND_RESULT}" = "cancelled" ]; then
            printf 'City GO Full Autotests: отменен\nПричина: запущен более свежий прогон.\nRun: %s/%s/actions/runs/%s\n' \
              "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}" > artifacts/messages/telegram-ci.txt
            echo "skip_telegram=true" >> "$GITHUB_OUTPUT"
            cat artifacts/messages/telegram-ci.txt >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          BACKEND_SUMMARY=$(find downloaded-artifacts -name backend.txt -print -quit 2>/dev/null || true)
          FRONTEND_SUMMARY=$(find downloaded-artifacts -name frontend.txt -print -quit 2>/dev/null || true)
          for target in backend frontend; do
            result_var="${target^^}_RESULT"
            summary_var="${target^^}_SUMMARY"
            result="${!result_var}"
            summary="${!summary_var}"
            {
              echo "City GO Full Autotests · ${target}"
              echo "Status: ${result}"
              if [ -n "${summary}" ]; then
                cat "${summary}"
              elif [ "${result}" = "cancelled" ]; then
                echo "Проверка отменена более свежим прогоном."
              else
                echo "Структурированный отчёт не найден. Откройте job logs."
              fi
              echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            } > "artifacts/messages/telegram-${target}.txt"
          done
          cat artifacts/messages/telegram-backend.txt artifacts/messages/telegram-frontend.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Telegram full autotests notification
        if: steps.build-summary.outputs.skip_telegram != 'true'
        continue-on-error: true
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram notification skipped: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is missing"
            exit 0
          fi
          for report in artifacts/messages/telegram-backend.txt artifacts/messages/telegram-frontend.txt; do
            [ -f "${report}" ] || continue
            curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text@${report}" \
              -d "disable_web_page_preview=true"
          done
