name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: sqlite:///./ci_test.db
      ADMIN_API_TOKEN: ci-admin-token
      APP_ENV: test
      CITY_GO_TEST_RUN_TYPE: regression
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Backend import smoke
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import main
          from core.router_setup import include_app_routers
          print('backend_import_smoke_ok')
          print(main.app.title)
          print(include_app_routers.__name__)
          PY

      - name: Run backend regression tests with Allure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/junit artifacts/allure-results/backend artifacts/messages
          set +e
          python -m pytest -q --no-cov --junitxml=artifacts/junit/backend.xml --alluredir=artifacts/allure-results/backend
          TEST_EXIT=$?
          set -e
          python scripts/ci_test_summary.py --junit artifacts/junit/backend.xml --output artifacts/messages/backend.txt --job-name "Backend tests" --run-type "Regression" --artifact-hint "backend-test-artifacts" --exit-code "$TEST_EXIT"

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            artifacts/junit/backend.xml
            artifacts/allure-results/backend
            artifacts/messages/backend.txt
          if-no-files-found: warn

  frontend-tests:
    name: Frontend lint, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: npm ci

      - name: Run frontend lint, tests and build with report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../artifacts/junit ../artifacts/messages
          set +e
          npm run lint
          LINT_EXIT=$?
          npm run test:ci
          TEST_EXIT=$?
          npm run build
          BUILD_EXIT=$?
          set -e
          OVERALL_EXIT=0
          if [ "$LINT_EXIT" != "0" ] || [ "$TEST_EXIT" != "0" ] || [ "$BUILD_EXIT" != "0" ]; then
            OVERALL_EXIT=1
          fi
          python ../scripts/ci_test_summary.py --junit ../artifacts/junit/frontend.xml --output ../artifacts/messages/frontend.txt --job-name "Frontend lint/tests/build" --run-type "Frontend Regression" --artifact-hint "frontend-test-artifacts" --exit-code 0
          {
            echo ""
            echo "Stages:"
            if [ "$LINT_EXIT" = "0" ]; then echo "Lint: PASSED"; else echo "Lint: FAILED"; fi
            if [ "$TEST_EXIT" = "0" ]; then echo "Vitest: PASSED"; else echo "Vitest: FAILED"; fi
            if [ "$BUILD_EXIT" = "0" ]; then echo "Build: PASSED"; else echo "Build: FAILED"; fi
          } >> ../artifacts/messages/frontend.txt
          cat ../artifacts/messages/frontend.txt
          exit "$OVERALL_EXIT"

      - name: Upload frontend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-artifacts
          path: |
            artifacts/junit/frontend.xml
            artifacts/messages/frontend.txt
          if-no-files-found: warn

  notify:
    name: Notify CI result
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    if: always()
    steps:
      - name: Download CI message artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts/ci

      - name: Send Telegram CI summary
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BACKEND_RESULT: ${{ needs.backend-tests.result }}
          FRONTEND_RESULT: ${{ needs.frontend-tests.result }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/ci

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets are not configured; skipping CI notification."
            exit 0
          fi

          overall="PASSED"
          icon="✅"
          if [ "$BACKEND_RESULT" != "success" ] || [ "$FRONTEND_RESULT" != "success" ]; then
            overall="FAILED"
            icon="❌"
          fi

          short_sha="${GITHUB_SHA:0:7}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          header="${icon} City Go CI ${overall}
Backend: ${BACKEND_RESULT}
Frontend: ${FRONTEND_RESULT}
Branch: ${GITHUB_REF_NAME}
Commit: ${short_sha}
Run: ${GITHUB_RUN_NUMBER} attempt ${GITHUB_RUN_ATTEMPT}
${run_url}"

          mapfile -t files < <(find artifacts/ci -type f -name '*.txt' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${header}"
            exit 0
          fi

          for file in "${files[@]}"; do
            body="$(cat "$file")"
            message="${header}

${body}"
            if [ "${#message}" -gt 3900 ]; then
              message="$(printf '%s' "$message" | head -c 3900)

… trimmed; see artifacts in GitHub Actions."
            fi
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${message}"
          done
