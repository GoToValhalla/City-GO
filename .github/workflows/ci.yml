name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: sqlite:///./ci_test.db
      ADMIN_API_TOKEN: ci-admin-token
      APP_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Backend import smoke
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import main
          from core.router_setup import include_app_routers
          print('backend_import_smoke_ok')
          print(main.app.title)
          print(include_app_routers.__name__)
          PY

      - name: Run backend tests
        shell: bash
        run: |
          python -m pytest -q --no-cov

      - name: Telegram alert on backend CI failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TG_TOKEN:-}" ] || [ -z "${TG_CHAT:-}" ]; then
            echo "Telegram notification skipped: missing Telegram secrets"
            exit 0
          fi
          MESSAGE="❌ City Go CI failed
          Job: Backend tests
          Branch: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "disable_web_page_preview=true"

  frontend-tests:
    name: Frontend lint, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: npm ci

      - name: Run frontend lint
        shell: bash
        run: npm run lint

      - name: Run frontend tests
        shell: bash
        run: npm run test

      - name: Build frontend
        shell: bash
        run: npm run build

      - name: Telegram alert on frontend CI failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TG_TOKEN:-}" ] || [ -z "${TG_CHAT:-}" ]; then
            echo "Telegram notification skipped: missing Telegram secrets"
            exit 0
          fi
          MESSAGE="❌ City Go CI failed
          Job: Frontend lint/tests/build
          Branch: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "disable_web_page_preview=true"
