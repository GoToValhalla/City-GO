name: Full Autotests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-autotests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend full regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: sqlite:///./ci_test.db
      ADMIN_API_TOKEN: ci-admin-token
      APP_ENV: test
      CITY_GO_TEST_RUN_TYPE: regression
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Backend import smoke
        run: |
          python - <<'PY'
          import main
          from core.router_setup import include_app_routers
          print('backend_import_smoke_ok')
          print(main.app.title)
          print(include_app_routers.__name__)
          PY
      - name: Backend tests and coverage
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/junit artifacts/allure-results/backend artifacts/messages artifacts/coverage
          python -m pytest -q \
            --cov=core --cov=routers --cov=services --cov=models --cov=scripts \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:artifacts/coverage/backend.xml \
            --junitxml=artifacts/junit/backend.xml \
            --alluredir=artifacts/allure-results/backend
          TEST_EXIT=$?
          python scripts/ci_coverage_summary.py \
            --suite backend \
            --format cobertura \
            --input artifacts/coverage/backend.xml \
            --output artifacts/messages/backend-coverage.txt \
            --json-output artifacts/coverage/backend-metrics.json \
            --target backend_platform=90 \
            --target backend_admin=90 \
            --target backend_overall=90
          COVERAGE_EXIT=$?
          python scripts/ci_test_summary.py \
            --junit artifacts/junit/backend.xml \
            --output artifacts/messages/backend.txt \
            --job-name "Backend full regression" \
            --run-type "Full Autotests" \
            --artifact-hint "backend-test-artifacts/allure-report/backend/index.html" \
            --exit-code "$TEST_EXIT" || true
          [ "$TEST_EXIT" = "0" ] && exit "$COVERAGE_EXIT"
          exit "$TEST_EXIT"
      - name: Generate backend Allure report
        if: always()
        run: |
          if [ -d artifacts/allure-results/backend ]; then
            npx --yes allure-commandline@2.32.0 generate artifacts/allure-results/backend -o artifacts/allure-report/backend --clean || true
          fi
      - name: Upload backend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            artifacts/junit/backend.xml
            artifacts/allure-results/backend
            artifacts/allure-report/backend
            artifacts/coverage/backend.xml
            artifacts/coverage/backend-metrics.json
            artifacts/messages/backend.txt
            artifacts/messages/backend-coverage.txt
          if-no-files-found: warn

  frontend-tests:
    name: Frontend lint, tests, coverage and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        shell: bash
        run: |
          npm ci
          VITEST_VERSION=$(node -p "require('./node_modules/vitest/package.json').version")
          npm install --no-save --package-lock=false "@vitest/coverage-v8@${VITEST_VERSION}"
      - name: Frontend checks and coverage
        shell: bash
        run: |
          set +e
          mkdir -p ../artifacts/junit ../artifacts/messages ../artifacts/coverage/frontend
          npm run lint
          LINT_EXIT=$?
          timeout 8m npm run test:ci 2>&1 | tee ../artifacts/messages/frontend-vitest.log
          TEST_EXIT=${PIPESTATUS[0]}
          timeout 8m npx vitest run \
            --coverage \
            --coverage.provider=v8 \
            --coverage.reporter=text \
            --coverage.reporter=json-summary \
            --coverage.reportsDirectory=../artifacts/coverage/frontend \
            --coverage.include='src/**/*.{ts,tsx}' \
            --coverage.exclude='src/**/*.test.{ts,tsx}' \
            --coverage.exclude='src/**/__tests__/**'
          COVERAGE_RUN_EXIT=$?
          python ../scripts/ci_coverage_summary.py \
            --suite frontend \
            --format vitest-json-summary \
            --input ../artifacts/coverage/frontend/coverage-summary.json \
            --output ../artifacts/messages/frontend-coverage.txt \
            --json-output ../artifacts/coverage/frontend-metrics.json \
            --target frontend_ui=90 \
            --target frontend_admin=90 \
            --target frontend_overall=90
          COVERAGE_EXIT=$?
          npm run build
          BUILD_EXIT=$?
          python - <<PY
          import json
          from pathlib import Path
          stages = {'lint': $LINT_EXIT, 'tests': $TEST_EXIT, 'coverage': max($COVERAGE_RUN_EXIT, $COVERAGE_EXIT), 'build': $BUILD_EXIT}
          Path('../artifacts/messages/frontend-stages.json').write_text(json.dumps(stages), encoding='utf-8')
          failed = [name for name, code in stages.items() if code != 0]
          if failed:
              Path('../artifacts/messages/frontend.txt').write_text('❌ City Go Frontend lint/tests/coverage/build FAILED\nПровалены этапы: ' + ', '.join(failed) + '\n', encoding='utf-8')
          PY
          if [ -f ../artifacts/junit/frontend.xml ] && [ "$TEST_EXIT" = "0" ] && [ "$LINT_EXIT" = "0" ] && [ "$BUILD_EXIT" = "0" ]; then
            python ../scripts/ci_test_summary.py \
              --junit ../artifacts/junit/frontend.xml \
              --output ../artifacts/messages/frontend.txt \
              --job-name "Frontend lint/tests/build" \
              --run-type "Full Autotests" \
              --artifact-hint "frontend-test-artifacts/frontend.xml" \
              --exit-code "$TEST_EXIT" || true
          fi
          [ -f ../artifacts/messages/frontend.txt ] && cat ../artifacts/messages/frontend.txt
          [ -f ../artifacts/messages/frontend-coverage.txt ] && cat ../artifacts/messages/frontend-coverage.txt
          if [ "$LINT_EXIT" != "0" ] || [ "$TEST_EXIT" != "0" ] || [ "$COVERAGE_RUN_EXIT" != "0" ] || [ "$COVERAGE_EXIT" != "0" ] || [ "$BUILD_EXIT" != "0" ]; then
            exit 1
          fi
      - name: Upload frontend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-artifacts
          path: |
            artifacts/junit/frontend.xml
            artifacts/coverage/frontend
            artifacts/coverage/frontend-metrics.json
            artifacts/messages/frontend.txt
            artifacts/messages/frontend-coverage.txt
            artifacts/messages/frontend-vitest.log
            artifacts/messages/frontend-stages.json
          if-no-files-found: warn

  notify:
    name: Notify full autotests result
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/downloaded
        continue-on-error: true
      - name: Build total autotest report
        run: |
          python scripts/build_total_autotest_report.py \
            --messages-dir artifacts/downloaded \
            --output artifacts/total-autotest-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: total-autotest-report
          path: artifacts/total-autotest-report.txt
          if-no-files-found: error
      - name: Telegram full autotests notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_telegram_notification.py --text-file artifacts/total-autotest-report.txt
