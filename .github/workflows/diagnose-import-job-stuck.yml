name: 90 · CITY GO · DIAG · Stuck Import Job

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'city_admin_import_jobs.id to inspect'
        required: true
        default: '4'

permissions:
  contents: read

jobs:
  diagnose:
    name: Read-only stuck-job diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
      JOB_ID: ${{ github.event.inputs.job_id }}
    steps:
      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Run read-only diagnostics
        timeout-minutes: 4
        shell: bash
        run: |
          set -euo pipefail
          timeout --preserve-status 180s ssh \
            -o BatchMode=yes \
            -o RequestTTY=no \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=6 \
            -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "JOB_ID=$JOB_ID bash -uo pipefail" <<'EOF'
            cd /srv/app

            echo "=== 1. active queries older than 5 minutes ==="
            timeout 15s docker compose exec -T db psql -U postgres -d city_guide -P pager=off -c \
              "SELECT pid, state, wait_event_type, wait_event, age(clock_timestamp(), query_start) AS query_age, age(clock_timestamp(), xact_start) AS txn_age, left(query, 200) AS query FROM pg_stat_activity WHERE datname=current_database() AND pid<>pg_backend_pid() AND query_start < now() - interval '5 minutes' ORDER BY query_start NULLS LAST;" < /dev/null
            echo "--- check 1 exit=$? ---"

            echo
            echo "=== 2. pg_stat_activity rows touching places/source_observations/import jobs ==="
            timeout 15s docker compose exec -T db psql -U postgres -d city_guide -P pager=off -c \
              "SELECT pid, state, wait_event_type, wait_event, age(clock_timestamp(), query_start) AS query_age, left(query, 200) AS query FROM pg_stat_activity WHERE datname=current_database() AND pid<>pg_backend_pid() AND (query ILIKE '%places%' OR query ILIKE '%source_observations%' OR query ILIKE '%city_admin_import_jobs%') ORDER BY query_start NULLS LAST;" < /dev/null
            echo "--- check 2 exit=$? ---"

            echo
            echo "=== 3. ungranted locks / blocking pids ==="
            timeout 15s docker compose exec -T db psql -U postgres -d city_guide -P pager=off -c \
              "SELECT blocked_locks.pid AS blocked_pid, blocked_activity.query AS blocked_query, blocking_locks.pid AS blocking_pid, blocking_activity.query AS blocking_query FROM pg_catalog.pg_locks blocked_locks JOIN pg_catalog.pg_stat_activity blocked_activity ON blocked_activity.pid = blocked_locks.pid JOIN pg_catalog.pg_locks blocking_locks ON blocking_locks.locktype = blocked_locks.locktype AND blocking_locks.database IS NOT DISTINCT FROM blocked_locks.database AND blocking_locks.relation IS NOT DISTINCT FROM blocked_locks.relation AND blocking_locks.pid != blocked_locks.pid JOIN pg_catalog.pg_stat_activity blocking_activity ON blocking_activity.pid = blocking_locks.pid WHERE NOT blocked_locks.granted;" < /dev/null
            echo "--- check 3 exit=$? ---"

            echo
            echo "=== 4. job row status/current_step/updated_at/step_details ==="
            timeout 15s docker compose exec -T db psql -U postgres -d city_guide -P pager=off -c \
              "SELECT id, status, current_step, started_at, updated_at, now() - updated_at AS since_heartbeat, step_details->>'current_scope_code' AS current_scope_code, step_details->>'step_started_at' AS step_started_at, last_error FROM city_admin_import_jobs WHERE id = ${JOB_ID};" < /dev/null
            echo "--- check 4 exit=$? ---"

            echo
            echo "=== 5. container state and restart/start times ==="
            timeout 20s docker compose ps < /dev/null
            timeout 20s docker inspect app-backend-1 --format 'backend started_at={{.State.StartedAt}} restarts={{.RestartCount}} oom_killed={{.State.OOMKilled}}' < /dev/null
            timeout 20s docker inspect app-db-1 --format 'db started_at={{.State.StartedAt}} restarts={{.RestartCount}} oom_killed={{.State.OOMKilled}}' < /dev/null
            timeout 10s free -m < /dev/null
            timeout 20s docker stats --no-stream < /dev/null
            echo "--- check 5 exit=$? ---"

            echo "=== diagnostics complete ==="
          EOF
