name: Backend Error Diagnostics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/backend-error-diagnostics.yml

permissions:
  contents: read

jobs:
  backend-error-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
    steps:
      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Inspect production city activation
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash <<'REMOTE_EOF'
            set -euo pipefail
            cd /srv/app
            docker compose exec -T db psql -U postgres -d city_guide -P pager=off -c \
              "SELECT id, slug, name, launch_status, is_active, readiness_score, quality_status FROM cities ORDER BY id;"
          REMOTE_EOF
