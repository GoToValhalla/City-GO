name: Backend Error Diagnostics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/backend-error-diagnostics.yml

permissions:
  contents: read

jobs:
  backend-error-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Inspect production visibility state
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=2 \
            -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" bash <<'REMOTE_EOF'
            set -euo pipefail
            cd /srv/app

            echo "=== feature toggles ==="
            docker compose exec -T db psql -U postgres -d city_guide -P pager=off -c \
              "SELECT id, scope, coalesce(scope_id, '<global>') AS scope_id, key, value_bool, updated_by, change_reason, updated_at FROM feature_toggles ORDER BY updated_at DESC, id DESC;"

            echo "=== city publication and public-place counts ==="
            docker compose exec -T db psql -U postgres -d city_guide -P pager=off -c \
              "SELECT c.slug, c.launch_status, c.is_active, count(p.id) AS places_total, count(p.id) FILTER (WHERE p.is_visible = true) AS visible_places FROM cities c LEFT JOIN places p ON p.city_id = c.id GROUP BY c.id, c.slug, c.launch_status, c.is_active ORDER BY c.slug;"

            echo "=== public endpoint ==="
            curl --fail --silent --show-error --max-time 20 \
              'http://localhost:8000/cities/available?include_draft=true'
            echo
          REMOTE_EOF

      - name: Telegram diagnostics result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            exit 0
          fi
          TEXT="🧪 City Go visibility diagnostics finished%0AStatus: ${{ job.status }}%0ARun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
