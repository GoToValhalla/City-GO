name: Backend Error Diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-error-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Run backend diagnostics on production server
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_ADMIN_API_TOKEN=$(printf '%q' "${ADMIN_API_TOKEN:-}")
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "ADMIN_API_TOKEN=$REMOTE_ADMIN_API_TOKEN bash -seu -o pipefail" <<'REMOTE_EOF'
            cd /srv/app

            echo "=== compose ps ==="
            docker compose ps || true

            echo "=== backend health ==="
            curl -sS -i --connect-timeout 5 --max-time 15 http://localhost:8000/health || true

            echo "=== frontend proxy health ==="
            curl -sS -i --connect-timeout 5 --max-time 15 http://localhost/api/health || true

            echo "=== API endpoint probes: direct backend ==="
            probe_get() {
              name="$1"
              path="$2"
              echo "--- ${name}: ${path} ---"
              curl -sS -i --connect-timeout 5 --max-time 25 \
                -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
                "http://localhost:8000${path}" || true
              echo
            }

            probe_post() {
              name="$1"
              path="$2"
              body="$3"
              echo "--- ${name}: ${path} ---"
              curl -sS -i --connect-timeout 5 --max-time 35 \
                -H 'Content-Type: application/json' \
                -d "$body" \
                "http://localhost:8000${path}" || true
              echo
            }

            probe_get "admin_overview" "/admin/overview"
            probe_get "admin_metrics" "/admin/metrics/summary"
            probe_get "admin_coverage" "/admin/coverage/summary?limit=5"
            probe_get "admin_verification" "/admin/place-verifications/summary"
            probe_get "admin_route_eligibility" "/admin/routes/eligibility?limit=1"
            probe_get "admin_route_readiness" "/admin/routes/readiness?limit=10"

            ROUTE_BODY='{"lat":40.1792,"lng":44.4991,"start_address":null,"start_source":"city_center","start":{"type":"city_center","lat":40.1792,"lng":44.4991,"address":null},"build_mode":"by_categories","time_budget_minutes":240,"time_of_day":null,"route_time_mode":"flexible","interests":["coffee","food","walk"],"avoided_categories":[],"excluded_place_ids":[],"budget_level":null,"pace_mode":null,"is_visiting":false,"city_id":"yerevan","visit_city_id":null,"visit_days":null,"user_id":"monitor"}'
            probe_post "route_preview_yerevan" "/v1/user-routes/preview" "$ROUTE_BODY"

            echo "=== backend import smoke ==="
            docker compose exec -T backend python - <<'PY' || true
          import main
          from core.router_setup import include_app_routers
          print('backend_import_ok')
          print(main.app.title)
          print(include_app_routers.__name__)
          PY

            echo "=== db connectivity ==="
            docker compose exec -T backend python - <<'PY' || true
          from sqlalchemy import text
          from db.session import SessionLocal
          db = SessionLocal()
          try:
              print('db_select_1=', db.execute(text('select 1')).scalar())
          finally:
              db.close()
          PY

            echo "=== alembic current/head ==="
            docker compose exec -T backend alembic current || true
            docker compose exec -T backend alembic heads || true

            echo "=== recent backend logs ==="
            docker compose logs --tail=700 backend || true

            echo "=== extracted backend errors ==="
            docker compose logs --tail=1200 backend | grep -Ei -A 35 -B 15 'traceback|exception|error|critical|undefinedcolumn|undefinedtable|programmingerror|operationalerror|integrityerror|validationerror' || true
          REMOTE_EOF

      - name: Telegram diagnostics result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram notification skipped"
            exit 0
          fi
          TEXT="🧪 City Go backend diagnostics finished%0AStatus: ${{ job.status }}%0AHost: ${SSH_HOST}%0ARun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
