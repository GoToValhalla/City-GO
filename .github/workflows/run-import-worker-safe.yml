name: CITY GO · OPS · Run Import Worker Safely

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: safe_one_job processes at most one queued job. dry_run and diagnostics_only never mutate anything.
        required: false
        type: choice
        default: safe_one_job
        options:
          - safe_one_job
          - dry_run
          - diagnostics_only
      city_slug:
        description: Restrict to this city's queued job only. Leave empty to target any queued city.
        required: false
        type: string
      max_runtime_seconds:
        description: Maximum worker runtime before automatic stop, in seconds.
        required: false
        type: string
        default: "300"

permissions:
  contents: read

jobs:
  run-import-worker-safe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MAX_RUNTIME_SECONDS: ${{ inputs.max_runtime_seconds || '300' }}
      RUN_MODE: ${{ inputs.run_mode || 'safe_one_job' }}
      CITY_SLUG: ${{ inputs.city_slug || '' }}
      WORKFLOW_NAME: ${{ github.workflow }}
      WORKFLOW_RUN_ID: ${{ github.run_id }}
      WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Validate run_mode input and normalize city_slug
        shell: bash
        run: |
          set -euo pipefail
          case "$RUN_MODE" in
            safe_one_job|dry_run|diagnostics_only) ;;
            *)
              echo "ERROR: run_mode must be one of safe_one_job, dry_run, diagnostics_only (got: '${RUN_MODE}')." >&2
              exit 1
              ;;
          esac

          # Trim leading/trailing whitespace from the city_slug input here,
          # once, before it is forwarded anywhere — the worker also trims
          # its own copy defensively, but a workflow input like
          # "        almaty" must already read as "almaty" by the time it
          # reaches printf '%q' quoting, SSH, and docker compose.
          TRIMMED_CITY_SLUG="$(echo "$CITY_SLUG" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          echo "CITY_SLUG=${TRIMMED_CITY_SLUG}" >> "$GITHUB_ENV"
          echo "city_slug normalized: '${CITY_SLUG}' -> '${TRIMMED_CITY_SLUG}'"

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY secret is missing" >&2; exit 1)
          test -n "$SSH_HOST" || (echo "SSH_HOST secret is missing" >&2; exit 1)
          test -n "$SSH_USER" || (echo "SSH_USER secret is missing" >&2; exit 1)
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode --ignore-garbage > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Preflight, run, monitor, and always stop import-worker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/safe-import-worker-run
          LOG=/tmp/safe-import-worker-run/report.log

          # WORKFLOW_NAME (github.workflow) contains spaces and Unicode
          # ("CITY GO · OPS · Run Import Worker Safely") — passing it as a
          # bare NAME="$VALUE" word to `ssh host word1 word2 ...` breaks,
          # since ssh rejoins all trailing argv words with a single space
          # before handing them to the remote shell for re-parsing: the
          # remote shell then sees WORKFLOW_NAME=CITY GO · ... and tries to
          # run "GO" as a command. printf '%q' shell-quotes each value (same
          # pattern already used for ADMIN_API_TOKEN in
          # production-health.yml) so the whole assignment list survives as
          # one safely re-parseable string, regardless of spaces/Unicode.
          REMOTE_MAX_RUNTIME_SECONDS=$(printf '%q' "$MAX_RUNTIME_SECONDS")
          REMOTE_ADMIN_API_TOKEN=$(printf '%q' "$ADMIN_API_TOKEN")
          REMOTE_WORKFLOW_NAME=$(printf '%q' "$WORKFLOW_NAME")
          REMOTE_WORKFLOW_RUN_ID=$(printf '%q' "$WORKFLOW_RUN_ID")
          REMOTE_WORKFLOW_RUN_URL=$(printf '%q' "$WORKFLOW_RUN_URL")
          REMOTE_RUN_MODE=$(printf '%q' "$RUN_MODE")
          REMOTE_CITY_SLUG=$(printf '%q' "$CITY_SLUG")

          ssh \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=2 \
            -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "MAX_RUNTIME_SECONDS=$REMOTE_MAX_RUNTIME_SECONDS ADMIN_API_TOKEN=$REMOTE_ADMIN_API_TOKEN WORKFLOW_NAME=$REMOTE_WORKFLOW_NAME WORKFLOW_RUN_ID=$REMOTE_WORKFLOW_RUN_ID WORKFLOW_RUN_URL=$REMOTE_WORKFLOW_RUN_URL RUN_MODE=$REMOTE_RUN_MODE CITY_SLUG=$REMOTE_CITY_SLUG bash -s" <<'REMOTE_EOF' | tee "$LOG"
          set -uo pipefail
          cd /srv/app

          section() { echo; echo "=== $1 ==="; }
          MAX_RUNTIME_SECONDS="${MAX_RUNTIME_SECONDS:-300}"
          RUN_MODE="${RUN_MODE:-safe_one_job}"
          CITY_SLUG="${CITY_SLUG:-}"
          STARTUP_HOST_FLOOR_MB=550
          RUNTIME_HOST_FLOOR_MB=256
          RUNTIME_CGROUP_PERCENT=85
          FAIL=0
          WORKER_ID=""
          CLAIMED_JOB_ID=""

          # Reports one structured worker-lifecycle event to the existing
          # backend logging endpoint (POST /admin/system-logs/worker-event,
          # which reuses write_system_log — no new logging system). Silent,
          # best-effort: a failed report must never fail or slow down the
          # worker run itself. job_id is included only when a job has
          # actually been claimed (CLAIMED_JOB_ID set) — never invented.
          report_worker_event() {
            local event="$1"; shift
            [ -n "${ADMIN_API_TOKEN:-}" ] || return 0
            local extra_json="$1"
            local job_field=""
            if [ -n "${CLAIMED_JOB_ID:-}" ]; then
              job_field="\"job_id\": ${CLAIMED_JOB_ID}, "
            fi
            curl -sS --max-time 8 -o /dev/null \
              -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST "https://citygo.autismishe.online/api/admin/system-logs/worker-event" \
              -d "{\"event\": \"${event}\", ${job_field}\"worker_run_id\": \"${WORKFLOW_RUN_ID:-}\", \"workflow_name\": \"${WORKFLOW_NAME:-}\", \"github_run_id\": \"${WORKFLOW_RUN_ID:-}\", \"github_run_url\": \"${WORKFLOW_RUN_URL:-}\"${extra_json}}" \
              2>&1 || true
          }

          # Best-effort: pick up the job_id the worker actually claimed (if
          # any) from the existing queue summary endpoint, so subsequent
          # lifecycle events can be associated with it. No job is invented
          # if nothing is running yet.
          refresh_claimed_job_id() {
            [ -n "${ADMIN_API_TOKEN:-}" ] || return 0
            CLAIMED_JOB_ID="$(curl -sS --max-time 8 \
              -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
              "https://citygo.autismishe.online/api/admin/import-jobs/queue" 2>/dev/null \
              | python3 -c 'import json,sys; data=json.load(sys.stdin); ids=data.get("running_job_ids") or []; print(ids[0] if ids else "")' 2>/dev/null || true)"
          }

          cleanup() {
            section "cleanup: always stop and remove import-worker"
            report_worker_event "workflow_cleanup" ", \"stop_reason\": \"${STOP_REASON:-unknown}\""
            docker compose stop -t 30 import-worker 2>&1 || echo "(stop failed or already stopped)"
            # Remove the container, not just stop it: a leftover stopped
            # container can be reused as-is by a later `docker compose up`
            # instead of being recreated with that run's env vars — this is
            # exactly how CITY_SLUG previously reached the worker as empty
            # on a run that requested a specific city.
            docker compose rm -f import-worker 2>&1 || echo "(rm failed or already removed)"
          }
          trap cleanup EXIT

          section "preflight: public health/ready"
          HEALTH_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 https://citygo.autismishe.online/api/health || echo "000")
          READY_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 https://citygo.autismishe.online/api/ready || echo "000")
          echo "health=${HEALTH_CODE} ready=${READY_CODE}"
          if [ "$HEALTH_CODE" != "200" ] || [ "$READY_CODE" != "200" ]; then
            echo "ERROR: backend is not healthy; refusing to start import-worker." >&2
            FAIL=1
          fi

          section "preflight: host memory"
          free -h
          AVAILABLE_MB=$(awk '/MemAvailable/ {print int($2/1024)}' /proc/meminfo 2>/dev/null || echo 0)
          echo "available_mb=${AVAILABLE_MB} startup_floor_mb=${STARTUP_HOST_FLOOR_MB}"
          if [ "$AVAILABLE_MB" -lt "$STARTUP_HOST_FLOOR_MB" ]; then
            echo "ERROR: available memory is below the heavy-job startup floor; refusing to start import-worker." >&2
            FAIL=1
          fi

          section "preflight: import-worker must not already be running"
          EXISTING_ID="$(docker compose ps -q import-worker 2>/dev/null || true)"
          if [ -n "$EXISTING_ID" ]; then
            EXISTING_STATE="$(docker inspect -f '{{.State.Status}}' "$EXISTING_ID" 2>/dev/null || echo unknown)"
            if [ "$EXISTING_STATE" = "running" ]; then
              echo "ERROR: import-worker is already running; refusing a second instance." >&2
              FAIL=1
            fi
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo "=== PREFLIGHT FAILED — import-worker was NOT started ==="
            exit 1
          fi

          section "starting import-worker (run_mode=${RUN_MODE} city_slug=${CITY_SLUG:-any})"
          # --force-recreate: belt-and-suspenders alongside the cleanup rm
          # above — guarantees this run's IMPORT_WORKER_CITY_SLUG/RUN_MODE
          # are always applied to a fresh container, never a reused one.
          IMPORT_WORKER_RUN_MODE="$RUN_MODE" IMPORT_WORKER_CITY_SLUG="$CITY_SLUG" timeout 60s docker compose up -d --no-deps --force-recreate import-worker
          START_RC=$?
          if [ "$START_RC" -ne 0 ]; then
            echo "ERROR: docker compose failed to start import-worker (rc=${START_RC})." >&2
            exit 1
          fi
          WORKER_ID="$(docker compose ps -aq import-worker 2>/dev/null || true)"
          test -n "$WORKER_ID" || (echo "ERROR: worker container was not created" >&2; exit 1)
          report_worker_event "worker_run_started" ""

          section "effective worker limits"
          docker inspect -f 'memory_limit={{.HostConfig.Memory}} memory_swap={{.HostConfig.MemorySwap}} nano_cpus={{.HostConfig.NanoCpus}} restart={{.HostConfig.RestartPolicy.Name}}' "$WORKER_ID"

          section "monitor loop"
          ELAPSED=0
          STOP_REASON="timeout"
          # A single transient DNS/connect failure on the public health check
          # must not stop the worker (CI run 29192806410: "curl: (28) Resolving
          # timed out" was misread as a confirmed unhealthy backend and killed
          # a worker that was otherwise running fine). Only a run of consecutive
          # failed checks is treated as a confirmed outage. /ready and
          # container-state checks are unaffected: they still break immediately.
          HEALTH_FAIL_STREAK=0
          HEALTH_FAIL_THRESHOLD=3
          while [ "$ELAPSED" -lt "$MAX_RUNTIME_SECONDS" ]; do
            sleep 5
            ELAPSED=$((ELAPSED + 5))

            WORKER_STATE="$(docker inspect -f '{{.State.Status}}' "$WORKER_ID" 2>/dev/null || echo unknown)"
            HEALTH_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 3 https://citygo.autismishe.online/api/health || echo "000")
            READY_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 3 https://citygo.autismishe.online/api/ready || echo "000")
            AVAILABLE_MB=$(awk '/MemAvailable/ {print int($2/1024)}' /proc/meminfo 2>/dev/null || echo 0)
            MEM_USAGE=$(docker stats --no-stream --format '{{.MemUsage}}' "$WORKER_ID" 2>/dev/null | head -n1 || true)
            MEM_PERCENT_RAW=$(docker stats --no-stream --format '{{.MemPerc}}' "$WORKER_ID" 2>/dev/null | head -n1 | tr -d '%' || true)
            MEM_PERCENT=${MEM_PERCENT_RAW%.*}
            MEM_PERCENT=${MEM_PERCENT:-999}

            if [ "$HEALTH_CODE" != "200" ] || [ "$READY_CODE" != "200" ]; then
              HEALTH_FAIL_STREAK=$((HEALTH_FAIL_STREAK + 1))
              refresh_claimed_job_id
              report_worker_event "worker_health_check_failed" ", \"stop_reason\": \"health_check_failed_health=${HEALTH_CODE}_ready=${READY_CODE}_streak=${HEALTH_FAIL_STREAK}\""
            else
              HEALTH_FAIL_STREAK=0
            fi

            echo "t=${ELAPSED}s worker_state=${WORKER_STATE} health=${HEALTH_CODE} ready=${READY_CODE} health_fail_streak=${HEALTH_FAIL_STREAK} host_available_mb=${AVAILABLE_MB} worker_mem='${MEM_USAGE}' worker_mem_percent=${MEM_PERCENT}"

            if [ "$WORKER_STATE" != "running" ]; then
              STOP_REASON="worker_exited_state_${WORKER_STATE}"
              refresh_claimed_job_id
              report_worker_event "worker_stop_requested" ", \"stop_reason\": \"${STOP_REASON}\", \"stop_source\": \"monitor_loop\""
              break
            fi
            if [ "$HEALTH_FAIL_STREAK" -ge "$HEALTH_FAIL_THRESHOLD" ]; then
              STOP_REASON="public_health_degraded"
              echo "ERROR: public health degraded for ${HEALTH_FAIL_STREAK} consecutive checks; stopping worker." >&2
              report_worker_event "worker_stop_requested" ", \"stop_reason\": \"${STOP_REASON}\", \"stop_source\": \"monitor_loop\""
              break
            fi
            if [ "$AVAILABLE_MB" -lt "$RUNTIME_HOST_FLOOR_MB" ]; then
              STOP_REASON="host_memory_floor"
              echo "ERROR: host memory crossed runtime floor; stopping worker." >&2
              report_worker_event "worker_stop_requested" ", \"stop_reason\": \"${STOP_REASON}\", \"stop_source\": \"monitor_loop\""
              break
            fi
            case "$MEM_PERCENT" in
              ''|*[!0-9]*)
                STOP_REASON="worker_memory_reading_unknown"
                echo "ERROR: worker memory percentage is unknown; stopping worker fail-closed." >&2
                report_worker_event "worker_stop_requested" ", \"stop_reason\": \"${STOP_REASON}\", \"stop_source\": \"monitor_loop\""
                break
                ;;
            esac
            if [ "$MEM_PERCENT" -ge "$RUNTIME_CGROUP_PERCENT" ]; then
              STOP_REASON="worker_cgroup_soft_limit"
              echo "ERROR: worker reached cgroup soft limit; stopping worker." >&2
              report_worker_event "worker_stop_requested" ", \"stop_reason\": \"${STOP_REASON}\", \"stop_source\": \"monitor_loop\""
              break
            fi
          done

          if [ "$ELAPSED" -ge "$MAX_RUNTIME_SECONDS" ]; then
            STOP_REASON="max_runtime_reached"
            report_worker_event "worker_stop_requested" ", \"stop_reason\": \"${STOP_REASON}\", \"stop_source\": \"monitor_loop\""
          fi
          echo "monitor loop ended: reason=${STOP_REASON} elapsed=${ELAPSED}s"

          # Capture the real worker outcome — logs, exit code, OOM state —
          # BEFORE stop/remove. `docker compose rm -f` in cleanup() deletes
          # the container, and `docker inspect`/`docker compose logs` on an
          # already-removed container return nothing: exit code and OOM
          # state silently become "unknown" and logs are lost. Everything
          # the workflow's pass/fail decision depends on must be read while
          # the container still exists.
          section "final diagnostics (container still present)"
          docker compose ps -a 2>&1 || true
          docker compose logs --tail=250 import-worker 2>&1 || true
          docker compose logs --tail=100 backend 2>&1 || true
          docker compose logs --tail=100 db 2>&1 || true
          docker stats --no-stream 2>&1 || true
          free -h 2>&1 || true

          WORKER_EXIT_CODE=$(docker inspect -f '{{.State.ExitCode}}' "$WORKER_ID" 2>/dev/null || echo unknown)
          WORKER_OOM=$(docker inspect -f '{{.State.OOMKilled}}' "$WORKER_ID" 2>/dev/null || echo unknown)
          echo "worker_exit_code=${WORKER_EXIT_CODE} worker_oom_killed=${WORKER_OOM}"
          echo "STOP_REASON=${STOP_REASON}"

          cleanup
          trap - EXIT

          EXIT_CODE_JSON="null"
          case "$WORKER_EXIT_CODE" in ''|*[!0-9]*) ;; *) EXIT_CODE_JSON="$WORKER_EXIT_CODE" ;; esac
          OOM_JSON="null"
          [ "$WORKER_OOM" = "true" ] && OOM_JSON="true"
          [ "$WORKER_OOM" = "false" ] && OOM_JSON="false"
          report_worker_event "worker_run_finished" ", \"stop_reason\": \"${STOP_REASON}\", \"stop_source\": \"monitor_loop\", \"exit_code\": ${EXIT_CODE_JSON}, \"oom_killed\": ${OOM_JSON}"

          if [ "$WORKER_OOM" = "true" ] || [ "$WORKER_EXIT_CODE" = "137" ]; then
            echo "ERROR: worker was OOM-killed." >&2
            exit 1
          fi
          case "$WORKER_EXIT_CODE" in
            ''|*[!0-9]*)
              echo "ERROR: worker exit code is unknown; failing closed." >&2
              exit 1
              ;;
          esac
          if [ "$WORKER_EXIT_CODE" -ne 0 ]; then
            echo "ERROR: worker exited with code ${WORKER_EXIT_CODE}." >&2
            exit 1
          fi
          if [ "$STOP_REASON" = "public_health_degraded" ] || [ "$STOP_REASON" = "host_memory_floor" ] || [ "$STOP_REASON" = "worker_cgroup_soft_limit" ] || [ "$STOP_REASON" = "worker_memory_reading_unknown" ] || [ "$STOP_REASON" = "max_runtime_reached" ]; then
            echo "ERROR: worker run ended by safety guard (${STOP_REASON})." >&2
            exit 1
          fi
          REMOTE_EOF

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safe-import-worker-run-report
          path: /tmp/safe-import-worker-run
          if-no-files-found: ignore
          retention-days: 7

      - name: Telegram run summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            exit 0
          fi
          STOP_REASON="$(grep '^STOP_REASON=' /tmp/safe-import-worker-run/report.log 2>/dev/null | tail -n1 | cut -d= -f2- || echo unknown)"
          LAST_MEMORY="$(grep -o 'host_available_mb=[0-9]*' /tmp/safe-import-worker-run/report.log 2>/dev/null | tail -n1 || echo 'host_available_mb=unknown')"
          TEXT="🧰 City Go safe import-worker run finished%0AStatus: ${{ job.status }}%0AStop reason: ${STOP_REASON}%0A${LAST_MEMORY}%0ARun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
