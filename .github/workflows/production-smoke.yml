name: 02 · CITY GO · Production Smoke

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Expected production commit SHA. Defaults to current workflow SHA.
        required: false
        type: string
  workflow_run:
    workflows:
      - 01 · CITY GO · Production Deploy
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: production-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Production smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      EXPECTED_SHA: ${{ github.event.workflow_run.head_sha || inputs.expected_sha || github.sha }}
      CITY_GO_ROUTE_SMOKE_ENABLED: ${{ vars.CITY_GO_ROUTE_SMOKE_ENABLED || 'false' }}
      CITY_GO_ROUTE_SMOKE_CITY_ID: ${{ vars.CITY_GO_ROUTE_SMOKE_CITY_ID }}
      CITY_GO_ROUTE_SMOKE_LAT: ${{ vars.CITY_GO_ROUTE_SMOKE_LAT }}
      CITY_GO_ROUTE_SMOKE_LNG: ${{ vars.CITY_GO_ROUTE_SMOKE_LNG }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve smoke target
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${PRODUCTION_BASE_URL:-}" ]; then
            echo "production_smoke_target=PRODUCTION_BASE_URL"
          elif [ -n "${SSH_HOST:-}" ]; then
            echo "production_smoke_target=SSH_HOST_HTTP_FALLBACK"
          else
            echo "production_smoke_target=not_configured"
          fi

      - name: Run production smoke
        shell: bash
        run: |
          set -euo pipefail
          python scripts/production_smoke.py \
            --summary-file /tmp/production-smoke/summary.txt \
            --json-report /tmp/production-smoke/report.json

      - name: Upload production smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-report
          path: /tmp/production-smoke
          if-no-files-found: ignore
          retention-days: 7

      - name: Send Telegram smoke notification
        if: always()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [ -s /tmp/production-smoke/summary.txt ]; then
            python scripts/send_telegram_notification.py --text-file /tmp/production-smoke/summary.txt --allow-missing
          else
            printf '❌ CITY GO · PRODUCTION SMOKE\nCommit: %s\nFailed checks:\n- smoke workflow did not produce summary\n%s\n' "${EXPECTED_SHA:0:7}" "$GITHUB_RUN_URL" > /tmp/production-smoke-fallback.txt
            python scripts/send_telegram_notification.py --text-file /tmp/production-smoke-fallback.txt --allow-missing
          fi
