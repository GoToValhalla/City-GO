services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: city_guide
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d city_guide"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  migrate:
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command:
      - bash
      - -c
      - |
        python - <<'PY'
        from sqlalchemy import create_engine, inspect, text
        from core.config import settings

        engine = create_engine(settings.database_url)
        if inspect(engine).has_table("alembic_version"):
            with engine.begin() as connection:
                revisions = set(connection.execute(text("SELECT version_num FROM alembic_version")).scalars())
                if {"9d0e1f2a3b4c", "fb7e3c2a91d4"}.issubset(revisions):
                    connection.execute(
                        text("DELETE FROM alembic_version WHERE version_num = :revision"),
                        {"revision": "9d0e1f2a3b4c"},
                    )
                    print("Alembic overlapping heads repaired")
        PY
        alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      DB_POOL_SIZE: 2
      DB_MAX_OVERFLOW: 1
      DB_POOL_TIMEOUT_SECONDS: 10
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed:
    profiles: ["ops"]
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: bash -c "PYTHONPATH=/app python scripts/seed_minimal_data.py"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  address-backfill:
    profiles: ["ops"]
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: bash -c "PYTHONPATH=/app python data/scripts/run_address_recovery_flow.py --all-cities --limit 500 --sleep 1.0 --no-apply"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      LOCAL_CACHE_DIR: /app/.cache/city-go
    volumes:
      - local_cache:/app/.cache/city-go
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  place-enrichment-export:
    profiles: ["ops"]
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: bash -c "PYTHONPATH=/app python data/scripts/run_place_enrichment_export.py --limit 100 --missing-fields address,photo,description --git-artifact"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      LOCAL_CACHE_DIR: /app/.cache/city-go
    volumes:
      - enrichment_exports:/app/data/exports/place_enrichment
      - local_cache:/app/.cache/city-go
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  backend:
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      DB_POOL_SIZE: 10
      DB_MAX_OVERFLOW: 10
      DB_POOL_TIMEOUT_SECONDS: 10
      APP_HOST: 0.0.0.0
      BACKEND_BASE_URL: http://backend:8000
      LOCAL_CACHE_DIR: /app/.cache/city-go
    ports:
      - "8000:8000"
    volumes:
      - enrichment_exports:/app/data/exports/place_enrichment
      - local_cache:/app/.cache/city-go
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  import-worker:
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: python data/scripts/run_admin_import_worker.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      DB_POOL_SIZE: 3
      DB_MAX_OVERFLOW: 2
      DB_POOL_TIMEOUT_SECONDS: 10
      LOCAL_CACHE_DIR: /app/.cache/city-go
      IMPORT_WORKER_BATCH_LIMIT: 1
      IMPORT_WORKER_SLEEP_SECONDS: 60
    volumes:
      - local_cache:/app/.cache/city-go
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  bot:
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: >
      sh -c "
        EFFECTIVE_BOT_TOKEN=\"$${BOT_TOKEN:-$${TELEGRAM_BOT_TOKEN:-}}\";
        if [ -z \"$$EFFECTIVE_BOT_TOKEN\" ]; then
          echo 'BOT_TOKEN/TELEGRAM_BOT_TOKEN не задан — бот не запущен. Добавь токен в .env и перезапусти.';
          exit 0;
        fi;
        export BOT_TOKEN=\"$$EFFECTIVE_BOT_TOKEN\";
        python telegram_bot_main.py
      "
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      DB_POOL_SIZE: 3
      DB_MAX_OVERFLOW: 2
      DB_POOL_TIMEOUT_SECONDS: 10
      BACKEND_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "EFFECTIVE_BOT_TOKEN=\"$${BOT_TOKEN:-$${TELEGRAM_BOT_TOKEN:-}}\"; test -n \"$$EFFECTIVE_BOT_TOKEN\" && curl -sf https://api.telegram.org/bot$$EFFECTIVE_BOT_TOKEN/getMe | grep -q '\"ok\":true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/gotovalhalla/city-go-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  enrichment_exports:
  local_cache:
