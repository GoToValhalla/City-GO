services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: city_guide
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d city_guide"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  migrate:
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command:
      - bash
      - -c
      - |
        set -e
        python - <<'PY'
        from sqlalchemy import create_engine, inspect, text
        from core.config import settings

        engine = create_engine(settings.database_url)
        if inspect(engine).has_table("alembic_version"):
            with engine.begin() as connection:
                revisions = set(connection.execute(text("SELECT version_num FROM alembic_version")).scalars())
                if {"9d0e1f2a3b4c", "fb7e3c2a91d4"}.issubset(revisions):
                    connection.execute(
                        text("DELETE FROM alembic_version WHERE version_num = :revision"),
                        {"revision": "9d0e1f2a3b4c"},
                    )
                    print("Alembic overlapping heads repaired")
        PY
        python scripts/migration_preflight.py
        alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      DB_POOL_SIZE: 1
      DB_MAX_OVERFLOW: 1
      DB_POOL_TIMEOUT_SECONDS: 10
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed:
    profiles: ["ops"]
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: bash -c "PYTHONPATH=/app python scripts/seed_minimal_data.py"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  address-backfill:
    profiles: ["ops"]
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: bash -c "PYTHONPATH=/app python data/scripts/run_address_recovery_flow.py --all-cities --limit 500 --sleep 1.0 --no-apply"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      LOCAL_CACHE_DIR: /app/.cache/city-go
    volumes:
      - local_cache:/app/.cache/city-go
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  place-enrichment-export:
    profiles: ["ops"]
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: bash -c "PYTHONPATH=/app python data/scripts/run_place_enrichment_export.py --limit 100 --missing-fields address,photo,description --git-artifact"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      LOCAL_CACHE_DIR: /app/.cache/city-go
    volumes:
      - enrichment_exports:/app/data/exports/place_enrichment
      - local_cache:/app/.cache/city-go
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  backend:
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 10
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      WEB_CONCURRENCY: 1
      DB_POOL_SIZE: 3
      DB_MAX_OVERFLOW: 2
      DB_POOL_TIMEOUT_SECONDS: 5
      DB_STATEMENT_TIMEOUT_MS: 10000
      DB_LOCK_TIMEOUT_MS: 3000
      APP_HOST: 0.0.0.0
      BACKEND_BASE_URL: http://backend:8000
      LOCAL_CACHE_DIR: /app/.cache/city-go
    ports:
      - "8000:8000"
    volumes:
      - enrichment_exports:/app/data/exports/place_enrichment
      - local_cache:/app/.cache/city-go
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 3 http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  import-worker:
    profiles: ["ops"]
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: bash -c "python data/scripts/check_import_worker_resources.py && exec python data/scripts/run_admin_import_worker.py"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      DB_POOL_SIZE: 1
      DB_MAX_OVERFLOW: 1
      DB_POOL_TIMEOUT_SECONDS: 10
      DB_STATEMENT_TIMEOUT_MS: 60000
      DB_LOCK_TIMEOUT_MS: 5000
      LOCAL_CACHE_DIR: /app/.cache/city-go
      IMPORT_WORKER_BATCH_LIMIT: 1
      IMPORT_WORKER_SLEEP_SECONDS: 60
      # Set from the shell environment of the `docker compose up` invocation
      # (see .github/workflows/run-import-worker-safe.yml), not from .env:
      # each manual run picks its own run_mode/city_slug via workflow_dispatch
      # inputs. Defaults preserve the always-safe, unattended posture.
      IMPORT_WORKER_RUN_MODE: ${IMPORT_WORKER_RUN_MODE:-safe_one_job}
      IMPORT_WORKER_CITY_SLUG: ${IMPORT_WORKER_CITY_SLUG:-}
      # Upgraded production VM: ~1.8 GiB RAM, no swap. Heavy execution stays
      # manual-only and requires both host and cgroup headroom.
      IMPORT_WORKER_SAFE_MODE: "true"
      IMPORT_WORKER_MAX_RUNTIME_SECONDS: 300
      IMPORT_WORKER_BACKEND_HEALTH_URL: http://backend:8000/ready
      IMPORT_WORKER_MIN_AVAILABLE_MEMORY_MB: 550
      IMPORT_WORKER_MIN_CONTAINER_MEMORY_MB: 512
      IMPORT_WORKER_MIN_CONTAINER_HEADROOM_MB: 400
      IMPORT_WORKER_RUNTIME_HOST_FLOOR_MB: 256
      IMPORT_WORKER_RUNTIME_CGROUP_PERCENT: 85
      # Legacy explicit heavy-job enable switch. Positive means enabled after
      # resource preflight; this is not represented as a live place-count cap.
      IMPORT_WORKER_MAX_FULL_IMPORT_PLACES_LOW_MEMORY: 1
    volumes:
      - local_cache:/app/.cache/city-go
    depends_on:
      backend:
        condition: service_healthy
    # Manual-only; a hard failure or OOM must never create a restart loop.
    restart: "no"
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "0.50"
    stop_grace_period: 30s

  bot:
    image: ghcr.io/gotovalhalla/city-go-backend:latest
    build: .
    command: python telegram_bot_main.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/city_guide
      DB_POOL_SIZE: 1
      DB_MAX_OVERFLOW: 1
      DB_POOL_TIMEOUT_SECONDS: 10
      BACKEND_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure

  frontend:
    image: ghcr.io/gotovalhalla/city-go-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  enrichment_exports:
  local_cache:
