[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=75
markers =
    admin: Admin platform tests
    api: API contract tests
    auth: Authentication and authorization tests
    taxonomy: Admin taxonomy tests
    cities: City operations tests
    places: Place management tests
    import_pipeline: Import and enrichment pipeline tests
    enrichment: Data enrichment tests
    routing: Route planning tests
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests (>1s)
    critical: Critical path tests
    smoke: Smoke tests
    regression: Regression tests
    allure_scenario: Functional test with explicit Russian Allure title and Given/When/Then steps
    metadata_db: Unit/model tests that intentionally use Base.metadata.create_all test DB
    alembic_db: Integration tests that must validate Alembic-created schema
    publication: Publication state and policy tests
    import_jobs: City admin import job tests
    telegram: Telegram bot and moderation tests
    performance: Query budget and runtime performance tests
    health: Health/readiness/deploy smoke tests
    migration: Migration and schema contract tests
