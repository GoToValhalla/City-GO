[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=75
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests (>1s)
    critical: Critical path tests
    smoke: Smoke tests
    regression: Regression tests
